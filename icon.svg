<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo negro editorial con esquinas redondeadas tipo iOS -->
  <rect width="512" height="512" rx="112" fill="#111111"/>

  <!-- Gorro de chef minimalista en marfil cálido.
       Una sola silueta: corona en forma de nube + banda. -->

  <!-- Corona (nube superior con 3 bultos suaves) -->
  <path d="M 130 240
           Q 130 178 178 162
           Q 178 110 234 102
           Q 256 78 290 90
           Q 326 88 342 122
           Q 392 124 396 178
           Q 410 196 410 232
           Q 410 268 392 296
           L 138 296
           Q 122 270 130 240 Z"
        fill="#fafaf7"/>

  <!-- Banda inferior del gorro: rectángulo con esquinas redondeadas -->
  <rect x="148" y="306" width="216" height="80" rx="10" fill="#fafaf7"/>

  <!-- Sombra sutil entre corona y banda (línea oscura) -->
  <rect x="148" y="306" width="216" height="3" fill="#111111" opacity="0.08"/>

  <!-- Pliegues finos en la banda -->
  <line x1="200" y1="320" x2="200" y2="372" stroke="#111111" stroke-width="3" stroke-linecap="round" opacity="0.16"/>
  <line x1="256" y1="320" x2="256" y2="372" stroke="#111111" stroke-width="3" stroke-linecap="round" opacity="0.16"/>
  <line x1="312" y1="320" x2="312" y2="372" stroke="#111111" stroke-width="3" stroke-linecap="round" opacity="0.16"/>
</svg>

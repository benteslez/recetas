<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>Recetas</title>

  <!-- PWA: manifest + iconos para instalar en pantalla de inicio -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

  <!-- iOS: comportamiento app nativa al "Añadir a pantalla de inicio" -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Recetas">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Google Fonts: Manrope (UI + títulos) y JetBrains Mono (números) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap">

  <style>
    /* ========================================================================
       SISTEMA DE DISENO
       Variables CSS, modo claro/oscuro, color por tipo de receta.
       Movil-first; breakpoint a 720px para tablet/desktop.
       ======================================================================== */

    /* ---- Variables base (independientes del tema) ------------------------- */
    :root {
      /* tipografias — Manrope para todo (UI + titulos), JetBrains Mono para numeros */
      --font-titulo: 'Manrope', system-ui, -apple-system, 'Segoe UI', sans-serif;
      --font-ui:     'Manrope', system-ui, -apple-system, 'Segoe UI', sans-serif;
      --font-num:    'JetBrains Mono', ui-monospace, 'SF Mono', monospace;

      /* radios */
      --r-sm: 8px;
      --r-md: 14px;
      --r-lg: 20px;
      --r-pill: 999px;

      /* sombras suaves */
      --sh-1: 0 1px 2px rgba(0,0,0,0.04), 0 1px 1px rgba(0,0,0,0.03);
      --sh-2: 0 2px 10px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --sh-3: 0 12px 28px rgba(0,0,0,0.10);

      /* espaciado */
      --gap-1: 4px;
      --gap-2: 8px;
      --gap-3: 12px;
      --gap-4: 16px;
      --gap-5: 24px;
      --gap-6: 32px;
      --gap-7: 48px;

      /* tamano cuerpo accesibilidad (se sube en modo cocina en fases posteriores) */
      --fs-body: 16px;
    }

    /* ---- Tema claro (por defecto) — paleta slate/azul, frío y limpio ---- */
    :root, :root[data-tema="claro"] {
      --bg:        #f8fafc;       /* slate-50, fondo casi blanco frío */
      --bg-elev:   #ffffff;       /* tarjetas */
      --bg-soft:   #f1f5f9;       /* slate-100, hover/zonas */
      --bg-input:  #ffffff;
      --text:      #0f172a;       /* slate-900 */
      --text-muted:#64748b;       /* slate-500 */
      --text-inv:  #ffffff;
      --line:      #e2e8f0;       /* slate-200 */
      --line-soft: #f1f5f9;
      --accent:    #2563eb;       /* blue-600 */
      --accent-bg: #dbeafe;       /* blue-100 */
      --focus:     #2563eb;
      --danger:    #dc2626;
    }

    /* ---- Tema oscuro ------------------------------------------------------ */
    :root[data-tema="oscuro"] {
      --bg:        #0b1220;       /* slate-950 más profundo */
      --bg-elev:   #111a2e;
      --bg-soft:   #1e293b;       /* slate-800 */
      --bg-input:  #111a2e;
      --text:      #f1f5f9;
      --text-muted:#94a3b8;       /* slate-400 */
      --text-inv:  #0b1220;
      --line:      #334155;       /* slate-700 */
      --line-soft: #1e293b;
      --accent:    #60a5fa;       /* blue-400, mejor contraste oscuro */
      --accent-bg: #1e3a5f;
      --focus:     #93c5fd;
      --danger:    #f87171;
    }

    /* ---- Colores por tipo de receta — paleta variada y distinguible ----
       En claro: -fg es el color saturado (se usa como fondo de tarjeta).
       En oscuro: -bg es el oscuro saturado (se usa como fondo). */
    :root {
      --tipo-reposteria-bg:           #fce7f3; --tipo-reposteria-fg:           #a8497e;  /* rosa apagado */
      --tipo-panaderia-bg:            #fef3c7; --tipo-panaderia-fg:            #8c5018;  /* ámbar tierra */
      --tipo-pizzas-bg:               #fee2e2; --tipo-pizzas-fg:               #a83838;  /* terracota */
      --tipo-pasta-bg:                #fef9c3; --tipo-pasta-fg:                #997816;  /* mostaza apagado */
      --tipo-arroces-bg:              #ffedd5; --tipo-arroces-fg:              #ad551f;  /* ámbar quemado */
      --tipo-sopas_cremas-bg:         #ffe4d0; --tipo-sopas_cremas-fg:         #8d4022;  /* rust apagado */
      --tipo-legumbres-bg:            #f0e3d4; --tipo-legumbres-fg:            #6f4422;  /* marrón tierra */
      --tipo-carnes-bg:               #fecaca; --tipo-carnes-fg:               #7c2c2c;  /* vino apagado */
      --tipo-pescados_mariscos-bg:    #dbeafe; --tipo-pescados_mariscos-fg:    #34528f;  /* azul muted */
      --tipo-huevos-bg:               #fef3c7; --tipo-huevos-fg:               #7d5814;  /* dorado apagado */
      --tipo-verduras_ensaladas-bg:   #dcfce7; --tipo-verduras_ensaladas-fg:   #356d40;  /* verde bosque */
      --tipo-salsas_fondos-bg:        #ffe4e6; --tipo-salsas_fondos-fg:        #7a2a44;  /* rose oscuro muted */
      --tipo-desayunos-bg:            #ede9fe; --tipo-desayunos-fg:            #604390;  /* violeta apagado */
      --tipo-aperitivos_tapas-bg:     #ccfbf1; --tipo-aperitivos_tapas-fg:     #2e6864;  /* teal apagado */
      --tipo-bebidas-bg:              #cffafe; --tipo-bebidas-fg:              #2d6680;  /* cyan apagado */
      --tipo-conservas-bg:            #d9f99d; --tipo-conservas-fg:            #506f28;  /* oliva apagado */
    }
    /* Modo oscuro: -bg saturado oscuro, -fg pastel claro */
    :root[data-tema="oscuro"] {
      --tipo-reposteria-bg:           #500724; --tipo-reposteria-fg:           #fbcfe8;
      --tipo-panaderia-bg:            #451a03; --tipo-panaderia-fg:            #fde68a;
      --tipo-pizzas-bg:               #450a0a; --tipo-pizzas-fg:               #fecaca;
      --tipo-pasta-bg:                #422006; --tipo-pasta-fg:                #fde68a;
      --tipo-arroces-bg:              #431407; --tipo-arroces-fg:              #fdba74;
      --tipo-sopas_cremas-bg:         #431407; --tipo-sopas_cremas-fg:         #fdba74;
      --tipo-legumbres-bg:            #3a2a1c; --tipo-legumbres-fg:            #e3c9a8;
      --tipo-carnes-bg:               #450a0a; --tipo-carnes-fg:               #fca5a5;
      --tipo-pescados_mariscos-bg:    #172554; --tipo-pescados_mariscos-fg:    #93c5fd;
      --tipo-huevos-bg:               #422006; --tipo-huevos-fg:               #fde68a;
      --tipo-verduras_ensaladas-bg:   #052e16; --tipo-verduras_ensaladas-fg:   #86efac;
      --tipo-salsas_fondos-bg:        #4c0519; --tipo-salsas_fondos-fg:        #fda4af;
      --tipo-desayunos-bg:            #2e1065; --tipo-desayunos-fg:            #c4b5fd;
      --tipo-aperitivos_tapas-bg:     #042f2e; --tipo-aperitivos_tapas-fg:     #5eead4;
      --tipo-bebidas-bg:              #083344; --tipo-bebidas-fg:              #67e8f9;
      --tipo-conservas-bg:            #1a2e05; --tipo-conservas-fg:            #bef264;
    }

    /* ---- Reset minimo ---------------------------------------------------- */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
    input, select, textarea { font: inherit; color: inherit; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    /* CRITICO: respetar siempre el atributo hidden, incluso cuando otras reglas
       definen display:flex/grid (overlays de cocina, panel timers, modales).
       Sin esto, esos overlays tapan toda la pantalla en estado inicial. */
    [hidden] { display: none !important; }

    /* ---- Base ------------------------------------------------------------ */
    html { color-scheme: light dark; }
    body {
      font-family: var(--font-ui);
      font-size: var(--fs-body);
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }
    h1, h2, h3, h4 {
      font-family: var(--font-titulo);
      font-weight: 500;
      letter-spacing: -0.02em;
      margin: 0;
    }
    h1 { font-weight: 600; letter-spacing: -0.03em; }
    .num { font-family: var(--font-num); font-variant-numeric: tabular-nums; }

    /* ---- Header ---------------------------------------------------------- */
    .cabecera {
      position: sticky; top: 0; z-index: 30;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: saturate(140%) blur(8px);
      -webkit-backdrop-filter: saturate(140%) blur(8px);
      border-bottom: 1px solid var(--line-soft);
    }
    .cabecera-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: var(--gap-3) var(--gap-4);
      display: flex;
      align-items: center;
      gap: var(--gap-3);
    }
    .marca {
      font-family: var(--font-titulo);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-right: auto;
      display: flex; align-items: center; gap: var(--gap-2);
    }
    .marca-icono { font-size: 22px; }

    /* etiqueta del usuario logueado (sustituye al switch de perfiles) */
    .usuario-actual {
      display: inline-flex;
      align-items: center;
      padding: 6px 14px;
      background: var(--bg-soft);
      border-radius: var(--r-pill);
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .usuario-actual::before {
      content: "";
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent-2);
      margin-right: 8px;
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent-2) 30%, transparent);
    }

    /* boton de tema */
    .icon-btn {
      width: 38px; height: 38px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: var(--r-pill);
      color: var(--text-muted);
      transition: background .15s, color .15s;
    }
    .icon-btn:hover { background: var(--bg-soft); color: var(--text); }

    /* ---- Nav de secciones (chips) ---------------------------------------- */
    .nav {
      max-width: 1100px;
      margin: 0 auto;
      padding: var(--gap-2) var(--gap-4) var(--gap-3);
      display: flex;
      gap: var(--gap-2);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .nav::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--r-pill);
      color: var(--text-muted);
      background: var(--bg-soft);
      border: 1px solid transparent;
      transition: background .15s, color .15s, border-color .15s;
      white-space: nowrap;
    }
    .chip:hover { color: var(--text); }
    .chip[aria-current="page"] {
      background: var(--accent);
      color: var(--text-inv);
    }

    /* ---- Main / secciones ------------------------------------------------ */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: var(--gap-4) var(--gap-4) var(--gap-7);
    }
    .vista { display: none; animation: fadeIn .18s ease-out; }
    .vista[data-activa="true"] { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .vista-titulo {
      font-size: 28px;
      margin-bottom: var(--gap-2);
    }
    .vista-subtitulo {
      color: var(--text-muted);
      margin-bottom: var(--gap-5);
    }

    /* placeholder de fases siguientes */
    .placeholder {
      background: var(--bg-elev);
      border: 1px dashed var(--line);
      border-radius: var(--r-lg);
      padding: var(--gap-6);
      text-align: center;
      color: var(--text-muted);
      box-shadow: var(--sh-1);
    }
    .placeholder strong { color: var(--text); font-weight: 600; }

    /* ========================================================================
       BIBLIOTECA — lista de tarjetas + detalle de receta
       Aplica color-por-tipo via variables --chip-bg/--chip-fg fijadas inline.
       ======================================================================== */

    /* ---- Toolbar (titulo + selector de orden) ---------------------------- */
    .biblio-toolbar {
      display: flex; align-items: flex-end; flex-wrap: wrap;
      gap: var(--gap-3);
      margin-bottom: var(--gap-5);
    }
    .biblio-toolbar .titulo-grupo h1 { font-size: 28px; }
    .biblio-toolbar .titulo-grupo p {
      margin: 4px 0 0; color: var(--text-muted); font-size: 14px;
    }
    @media (min-width: 720px) { .biblio-toolbar .titulo-grupo h1 { font-size: 34px; } }
    .biblio-toolbar .orden {
      margin-left: auto;
      display: inline-flex; align-items: center; gap: var(--gap-2);
      font-size: 13px; color: var(--text-muted);
    }
    .biblio-toolbar select {
      background: var(--bg-elev);
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      padding: 8px 32px 8px 12px;
      font-weight: 500;
      color: var(--text);
      appearance: none;
      -webkit-appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, currentColor 50%),
        linear-gradient(135deg, currentColor 50%, transparent 50%);
      background-position:
        calc(100% - 14px) 16px,
        calc(100% - 9px) 16px;
      background-size: 5px 5px;
      background-repeat: no-repeat;
    }

    /* ---- Grid de tarjetas ------------------------------------------------- */
    .tarjetas {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--gap-3);
    }
    @media (min-width: 600px) { .tarjetas { grid-template-columns: 1fr 1fr; gap: var(--gap-4); } }
    @media (min-width: 900px) { .tarjetas { grid-template-columns: 1fr 1fr 1fr; } }

    .tarjeta {
      position: relative;
      background: var(--bg-elev);
      border: 1px solid var(--line-soft);
      border-radius: var(--r-lg);
      padding: var(--gap-4);
      box-shadow: var(--sh-1);
      text-align: left;
      width: 100%;
      transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
      display: flex; flex-direction: column; gap: var(--gap-2);
      min-height: 170px;
    }
    .tarjeta:hover { transform: translateY(-1px); box-shadow: var(--sh-2); border-color: var(--line); }

    .tarjeta-head {
      display: flex; align-items: center; gap: var(--gap-2);
    }
    .chip-tipo {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: var(--r-pill);
      background: var(--chip-bg, var(--bg-soft));
      color: var(--chip-fg, var(--text-muted));
    }
    .tarjeta-fav {
      margin-left: auto;
      width: 32px; height: 32px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: var(--r-pill);
      color: var(--text-muted);
      font-size: 18px;
      transition: background .12s, color .12s, transform .12s;
    }
    .tarjeta-fav:hover { background: var(--bg-soft); }
    .tarjeta-fav[aria-pressed="true"] { color: var(--accent); }
    .tarjeta-fav[aria-pressed="true"]:hover { transform: scale(1.08); }
    .tarjeta-nombre {
      font-family: var(--font-titulo);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }
    .tarjeta-meta {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: var(--gap-2) var(--gap-3);
      font-size: 13px;
      margin-top: auto;
    }
    .tarjeta-meta dt {
      font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--text-muted);
      font-family: var(--font-ui);
    }
    .tarjeta-meta dd {
      margin: 0; color: var(--text); font-weight: 500;
      font-family: var(--font-ui);
    }
    .tarjeta-meta dd.num {
      font-family: var(--font-ui);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
    }
    .estrellas { letter-spacing: 1px; color: var(--accent); }
    .estrellas .vacia { color: var(--line); }

    /* ---- Detalle de receta ----------------------------------------------- */
    .detalle { display: flex; flex-direction: column; gap: var(--gap-4); }
    .detalle-volver {
      align-self: flex-start;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px;
      border-radius: var(--r-pill);
      background: var(--bg-soft);
      color: var(--text);
      font-size: 14px; font-weight: 500;
      transition: background .12s, box-shadow .12s;
    }
    .detalle-volver:hover { background: var(--bg-elev); box-shadow: var(--sh-1); }
    .detalle-acciones-top {
      display: flex; align-items: center; gap: var(--gap-2);
      flex-wrap: wrap;
    }
    .detalle-editar {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px;
      border-radius: var(--r-pill);
      background: var(--bg-soft);
      color: var(--accent);
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: background .12s, box-shadow .12s;
      margin-left: auto;
    }
    .detalle-editar:hover { background: var(--accent-bg); box-shadow: var(--sh-1); }

    .detalle-cabecera {
      background: var(--bg-elev);
      border: 1px solid var(--line-soft);
      border-left: 4px solid var(--chip-fg, var(--accent));
      border-radius: var(--r-lg);
      padding: var(--gap-5);
      box-shadow: var(--sh-1);
    }
    .detalle-cabecera .chip-tipo { margin-bottom: var(--gap-2); }
    .detalle h1 {
      font-size: 30px;
      letter-spacing: -0.02em;
      margin-bottom: var(--gap-3);
    }
    @media (min-width: 720px) { .detalle h1 { font-size: 38px; } }
    .detalle-tags {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-bottom: var(--gap-3);
    }
    .pill {
      display: inline-block;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 500;
      background: var(--bg-soft);
      color: var(--text-muted);
      border-radius: var(--r-pill);
    }
    .pill-tag { background: var(--bg-soft); color: var(--text-muted); }
    .pill-dieta {
      background: var(--tipo-verduras_ensaladas-bg);
      color: var(--tipo-verduras_ensaladas-fg);
    }
    .detalle-tiempos {
      display: flex; flex-wrap: wrap; gap: 8px;
      color: var(--text-muted);
    }
    .detalle-tiempos > span {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      padding: 8px 14px;
      background: var(--bg-soft);
      border-radius: 12px;
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      line-height: 1;
    }
    .detalle-tiempos > span b {
      display: block;
      font-family: var(--font-ui);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
      font-weight: 600;
      font-size: 16px;
      letter-spacing: -0.015em;
      color: var(--text);
      text-transform: none;
      margin-left: 0;
      margin-top: 2px;
    }

    /* ---- Tarjeta de "tu cocina" (estado del perfil activo) -------------- */
    .tarjeta-usuario {
      background: var(--bg-elev);
      border: 1px solid var(--line-soft);
      border-radius: var(--r-lg);
      padding: var(--gap-4) var(--gap-5);
      box-shadow: var(--sh-1);
      display: flex; flex-wrap: wrap; align-items: center;
      gap: var(--gap-4) var(--gap-5);
    }
    .grupo-usuario { display: flex; flex-direction: column; gap: 4px; }
    .grupo-usuario .et {
      font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--text-muted);
    }
    .estado-select {
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      padding: 6px 10px;
      font-size: 14px;
    }
    .estrellas-edit {
      display: inline-flex;
      gap: 2px;
      align-items: center;
    }
    .estrellas-edit button {
      font-size: 22px; line-height: 1;
      width: 26px; height: 26px;
      color: var(--line);
      transition: color .12s, transform .12s;
    }
    .estrellas-edit button.activa { color: var(--accent); }
    .estrellas-edit button:hover { transform: scale(1.1); }
    .estrellas-edit .borrar {
      font-size: 12px; color: var(--text-muted); margin-left: 6px;
      width: auto; height: auto;
    }
    .toggle-fav {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      border-radius: var(--r-pill);
      background: var(--bg-soft);
      color: var(--text);
      font-size: 14px; font-weight: 500;
      transition: background .12s, color .12s;
    }
    .toggle-fav[aria-pressed="true"] {
      background: var(--accent-bg);
      color: var(--accent);
    }
    .cocinado-info {
      font-size: 13px; color: var(--text-muted);
      margin-left: auto;
      text-align: right;
    }
    .cocinado-info b {
      color: var(--text);
      font-family: var(--font-num); font-variant-numeric: tabular-nums;
      font-weight: 600;
    }

    /* ---- Control de raciones --------------------------------------------- */
    .raciones {
      display: inline-flex; align-items: center; gap: var(--gap-2);
      padding: 6px;
      background: var(--bg-soft);
      border-radius: var(--r-pill);
    }
    .raciones-et { font-size: 13px; color: var(--text-muted); padding: 0 6px; }
    .raciones-num {
      min-width: 36px; text-align: center;
      font-family: var(--font-num); font-weight: 600;
      font-size: 17px;
    }
    .raciones-btn {
      width: 34px; height: 34px;
      border-radius: var(--r-pill);
      background: var(--bg-elev);
      color: var(--text);
      font-size: 18px; font-weight: 700;
      box-shadow: var(--sh-1);
      transition: background .12s, color .12s, transform .12s;
    }
    .raciones-btn:hover:not([disabled]) { background: var(--accent); color: var(--text-inv); }
    .raciones-btn:active { transform: scale(0.94); }
    .raciones-btn[disabled] { opacity: 0.4; cursor: not-allowed; }
    .raciones-info {
      font-size: 12px; color: var(--text-muted);
      margin-left: var(--gap-3);
    }

    /* ---- Bloque (ingredientes/pasos) ------------------------------------ */
    .bloque {
      background: var(--bg-elev);
      border: 1px solid var(--line-soft);
      border-radius: var(--r-lg);
      padding: var(--gap-4) var(--gap-5);
      box-shadow: var(--sh-1);
    }
    .bloque-head {
      display: flex; align-items: center; gap: var(--gap-3);
      margin-bottom: var(--gap-3);
      flex-wrap: wrap;
    }
    .bloque-head h2 { font-size: 20px; }
    .bloque-head .accion {
      margin-left: auto;
      font-size: 13px; color: var(--text-muted); font-weight: 500;
      padding: 6px 12px; border-radius: var(--r-pill);
      background: var(--bg-soft);
      transition: background .12s, color .12s;
    }
    .bloque-head .accion:hover { color: var(--text); background: var(--bg); }

    .grupo-ing { margin-bottom: var(--gap-3); }
    .grupo-ing:last-child { margin-bottom: 0; }
    .grupo-ing-titulo {
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 6px;
      padding: 0 10px;
    }
    .lista-ing, .lista-paso {
      list-style: none; margin: 0; padding: 0;
      display: flex; flex-direction: column; gap: 2px;
    }
    .lista-ing li, .lista-paso li {
      display: flex; align-items: flex-start; gap: var(--gap-3);
      padding: 8px 10px;
      border-radius: var(--r-md);
      transition: background .12s, opacity .12s;
      cursor: pointer;
    }
    .lista-ing li:hover, .lista-paso li:hover { background: var(--bg-soft); }
    .lista-ing input[type="checkbox"], .lista-paso input[type="checkbox"] {
      width: 18px; height: 18px;
      margin-top: 2px;
      accent-color: var(--accent);
      flex-shrink: 0;
      cursor: pointer;
    }
    .ing-texto, .paso-texto { flex: 1; min-width: 0; }
    .ing-cant {
      font-family: var(--font-num);
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      color: var(--text);
      margin-right: 6px;
    }
    .ing-aviso {
      color: var(--danger);
      font-size: 11px;
      font-family: var(--font-ui);
      font-weight: 500;
      margin-left: 4px;
    }
    .ing-unidad { color: var(--text-muted); font-size: 13px; margin-right: 4px; }
    .ing-nombre { color: var(--text); }
    .ing-opcional {
      font-size: 10.5px;
      text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--text-muted);
      background: var(--bg-soft);
      padding: 1px 8px;
      border-radius: var(--r-pill);
      margin-left: 6px;
      vertical-align: 2px;
    }
    .ing-nota {
      display: block;
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 2px;
      font-style: italic;
    }
    .tachado { opacity: 0.4; }
    .tachado .ing-texto, .tachado .paso-texto {
      text-decoration: line-through;
      text-decoration-thickness: 1px;
    }

    .lista-paso li { align-items: flex-start; }
    .paso-num {
      width: 26px; height: 26px;
      flex-shrink: 0;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--bg-soft);
      color: var(--text-muted);
      font-family: var(--font-num);
      font-weight: 600; font-size: 13px;
      border-radius: var(--r-pill);
      margin-top: 0;
    }
    .paso-titulo { font-weight: 600; color: var(--text); display: block; margin-bottom: 2px; }
    .paso-meta {
      font-size: 12px; color: var(--text-muted);
      margin-top: 6px;
      display: flex; gap: var(--gap-3); flex-wrap: wrap;
    }
    .paso-meta b {
      color: var(--text);
      font-family: var(--font-num); font-variant-numeric: tabular-nums;
    }

    /* ---- Notas globales de la receta ----------------------------------- */
    .receta-notas {
      font-style: italic;
      color: var(--text-muted);
      background: var(--bg-soft);
      border-radius: var(--r-md);
      padding: var(--gap-3) var(--gap-4);
      margin-top: var(--gap-3);
      font-size: 14px;
    }

    /* ---- Bloque de personales ------------------------------------------- */
    .personal-grid {
      display: grid; gap: var(--gap-3);
      grid-template-columns: 1fr;
    }
    @media (min-width: 720px) {
      .personal-grid { grid-template-columns: 1fr 1fr; }
      .personal-grid .col-completo { grid-column: 1 / -1; }
    }
    .campo { display: flex; flex-direction: column; gap: 4px; }
    .campo label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--text-muted); font-weight: 600;
    }
    .campo textarea, .campo input[type="text"] {
      background: var(--bg-input);
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      padding: 10px 12px;
      font-size: 14px;
      resize: vertical;
      color: var(--text);
    }
    .campo textarea { min-height: 64px; font-family: var(--font-ui); }
    .campo textarea:focus, .campo input:focus { outline: none; border-color: var(--accent); }
    .campo .hint { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ---- Boton principal y barra inferior ------------------------------- */
    .btn-principal {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 22px;
      font-size: 15px; font-weight: 600;
      background: var(--accent);
      color: var(--text-inv);
      border-radius: var(--r-pill);
      box-shadow: var(--sh-2);
      transition: transform .12s, box-shadow .12s;
    }
    .btn-principal:hover { transform: translateY(-1px); box-shadow: var(--sh-3); }
    .btn-principal:active { transform: translateY(0); }
    .barra-acciones {
      display: flex; justify-content: center;
      margin-top: var(--gap-3);
    }

    /* ---- Vacio (sin recetas) ------------------------------------------- */
    .vacio {
      text-align: center;
      padding: var(--gap-7) var(--gap-4);
      color: var(--text-muted);
    }

    /* ---- Responsive ------------------------------------------------------ */
    @media (min-width: 720px) {
      :root { --fs-body: 16px; }
      .cabecera-inner { padding: var(--gap-4) var(--gap-5); }
      .nav { padding: var(--gap-2) var(--gap-5) var(--gap-4); }
      main { padding: var(--gap-5) var(--gap-5) var(--gap-7); }
      .vista-titulo { font-size: 34px; }
    }

    /* ---- Foco accesible -------------------------------------------------- */
    :focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
      border-radius: var(--r-sm);
    }

    /* ========================================================================
       BUSCAR — caja, filtros (chips multiselect) y multiselect de ingredientes
       ======================================================================== */
    .busc-caja {
      background: var(--bg-elev);
      border: 1px solid var(--line-soft);
      border-radius: var(--r-lg);
      box-shadow: var(--sh-1);
      padding: var(--gap-4);
      margin-bottom: var(--gap-4);
    }
    .busc-input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      padding: 12px 16px;
      font-size: 16px;
      color: var(--text);
    }
    .busc-input:focus { outline: none; border-color: var(--accent); }

    .filtros { display: flex; flex-direction: column; gap: var(--gap-3); }
    .filtro-grupo {
      display: flex; flex-direction: column; gap: 6px;
    }
    .filtro-grupo > .et {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--text-muted);
      font-weight: 600;
    }
    .filtro-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .filtro-chip {
      font-size: 13px; font-weight: 500;
      padding: 6px 12px;
      border-radius: var(--r-pill);
      background: var(--bg-soft);
      color: var(--text-muted);
      border: 1px solid transparent;
      transition: background .12s, color .12s;
      cursor: pointer;
      line-height: 1.2;
    }
    .filtro-chip:hover { color: var(--text); }
    .filtro-chip[aria-pressed="true"] {
      background: var(--accent);
      color: var(--text-inv);
    }

    /* multiselect de ingredientes (incluir/excluir) */
    .filtros-doble {
      display: grid; grid-template-columns: 1fr; gap: var(--gap-3);
    }
    @media (min-width: 720px) {
      .filtros-doble { grid-template-columns: 1fr 1fr; }
    }
    .busc-ing {
      display: flex; flex-direction: column; gap: 6px;
      background: var(--bg-soft);
      border-radius: var(--r-md);
      padding: 10px 12px;
    }
    .busc-ing-cabecera {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--text-muted); font-weight: 600;
    }
    .busc-ing-sel {
      display: flex; flex-wrap: wrap; gap: 4px;
      min-height: 24px;
    }
    .busc-ing-sel:empty::before {
      content: "—";
      color: var(--text-muted);
      font-size: 13px;
      align-self: center;
    }
    .busc-ing-sel .filtro-chip { cursor: pointer; }
    .busc-ing[data-grupo="incluir"] .busc-ing-sel .filtro-chip {
      background: var(--tipo-verduras_ensaladas-bg);
      color: var(--tipo-verduras_ensaladas-fg);
    }
    .busc-ing[data-grupo="excluir"] .busc-ing-sel .filtro-chip {
      background: var(--tipo-carnes-bg);
      color: var(--tipo-carnes-fg);
    }
    .busc-ing-sel .filtro-chip::after {
      content: " ×";
      opacity: 0.7;
    }
    .busc-ing-input {
      background: var(--bg-elev);
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      padding: 7px 10px;
      font-size: 13px;
      color: var(--text);
    }
    .busc-ing-input:focus { outline: none; border-color: var(--accent); }
    .busc-ing-sug {
      display: flex; flex-wrap: wrap; gap: 4px;
      max-height: 130px;
      overflow-y: auto;
    }
    .busc-ing-sug .filtro-chip { background: var(--bg-elev); }
    .busc-ing-sug .filtro-chip:hover { background: var(--accent); color: var(--text-inv); }
    .busc-ing-sug .vacio-sug { color: var(--text-muted); font-size: 13px; padding: 4px; }

    .busc-acciones {
      display: flex; align-items: center; gap: var(--gap-3);
      margin-bottom: var(--gap-3);
      flex-wrap: wrap;
    }
    .busc-contador { font-size: 14px; color: var(--text-muted); }
    .busc-contador b { color: var(--text); font-family: var(--font-num); }
    .busc-limpiar {
      margin-left: auto;
      font-size: 13px; color: var(--text-muted); font-weight: 500;
      padding: 6px 12px; border-radius: var(--r-pill);
      background: var(--bg-soft);
      transition: background .12s, color .12s;
    }
    .busc-limpiar:hover { color: var(--text); background: var(--bg-elev); box-shadow: var(--sh-1); }

    /* ========================================================================
       INVERSA — nevera, modo y tarjetas con cobertura
       ======================================================================== */
    /* Mi nevera: layout ligero, sin tarjeta enmarcada, chips con contorno fino */
    .nevera {
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      padding: 0;
      margin-bottom: var(--gap-5);
    }
    .nevera-bar {
      display: flex; align-items: center;
      margin-bottom: var(--gap-5);
      flex-wrap: wrap; gap: var(--gap-2);
      padding-bottom: var(--gap-3);
      border-bottom: 1px solid var(--line-soft);
    }
    .nevera-bar h2 {
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -0.025em;
      margin-right: var(--gap-3);
    }
    .nevera-contador {
      font-size: 13px;
      color: var(--text-muted);
      margin-right: auto;
    }
    .nevera-bar .busc-limpiar {
      background: transparent;
      padding: 6px 12px;
      font-size: 12.5px;
    }
    .nevera-bar .busc-limpiar:hover {
      background: var(--bg-soft);
      box-shadow: none;
    }
    .nevera-cats {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    /* Cada categoría es un <details>: solo cabecera por defecto */
    .nevera-cat {
      border-bottom: 1px solid var(--line-soft);
    }
    .nevera-cat:first-child { border-top: 1px solid var(--line-soft); }
    .nevera-cat summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 4px;
      user-select: none;
      transition: background .12s;
    }
    .nevera-cat summary::-webkit-details-marker { display: none; }
    .nevera-cat summary::before {
      content: "›";
      color: var(--text-muted);
      font-size: 16px;
      font-weight: 600;
      width: 12px;
      display: inline-block;
      transition: transform .15s ease;
      line-height: 1;
    }
    .nevera-cat[open] summary::before { transform: rotate(90deg); }
    .nevera-cat summary:hover { background: var(--bg-soft); }
    .nevera-cat-titulo {
      flex: 1;
      font-size: 13.5px;
      text-transform: none;
      letter-spacing: -0.005em;
      color: var(--text);
      font-weight: 500;
      margin-bottom: 0;
      opacity: 1;
    }
    .nevera-cat-count {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      font-family: var(--font-ui);
      font-variant-numeric: tabular-nums;
      padding: 2px 8px;
      border-radius: var(--r-pill);
      background: var(--bg-soft);
      min-width: 24px;
      text-align: center;
    }
    .nevera-cat-count.activo {
      background: var(--accent);
      color: var(--text-inv);
    }
    .nevera-cat[open] .nevera-items {
      padding: 4px 4px 16px;
    }
    .nevera-items {
      display: flex; flex-wrap: wrap; gap: 5px;
    }
    /* Chips fineros: contorno por defecto, fill al activarse */
    .nevera-items .filtro-chip {
      padding: 5px 12px;
      font-size: 12.5px;
      font-weight: 500;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text-muted);
      transition: background .12s, color .12s, border-color .12s, transform .12s;
    }
    .nevera-items .filtro-chip:hover {
      border-color: var(--text-muted);
      color: var(--text);
      background: transparent;
    }
    .nevera-items .filtro-chip[aria-pressed="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--text-inv);
    }
    .nevera-items .filtro-chip[aria-pressed="true"]:hover {
      transform: translateY(-1px);
    }

    .inversa-modo {
      display: inline-flex;
      background: var(--bg-soft);
      border-radius: var(--r-pill);
      padding: 2px;
    }
    .inversa-modo button {
      padding: 6px 14px;
      font-size: 13px; font-weight: 500;
      border-radius: var(--r-pill);
      color: var(--text-muted);
      transition: background .15s, color .15s;
    }
    .inversa-modo button[aria-pressed="true"] {
      background: var(--bg-elev); color: var(--text);
      box-shadow: var(--sh-1);
    }

    .tarjeta-cobertura { margin-top: var(--gap-2); }
    .tarjeta-cobertura-row {
      display: flex; align-items: center; gap: var(--gap-2);
      font-size: 12px; color: var(--text-muted);
      margin-bottom: 4px;
    }
    .tarjeta-cobertura-row b {
      color: var(--text); font-family: var(--font-num);
      font-variant-numeric: tabular-nums;
    }
    .tarjeta-cobertura-barra {
      flex: 1;
      height: 6px;
      background: var(--bg-soft);
      border-radius: var(--r-pill);
      overflow: hidden;
    }
    .tarjeta-cobertura-rell {
      height: 100%;
      background: var(--accent);
      border-radius: var(--r-pill);
      transition: width .25s;
    }
    .tarjeta-faltan {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
    }
    .tarjeta-faltan b { color: var(--text); font-weight: 600; }

    /* ========================================================================
       MODO COCINA — overlay full-screen, paso a paso, botones grandes
       ======================================================================== */
    body.modo-cocina-activo { overflow: hidden; }
    .modo-cocina {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 100;
      display: flex; flex-direction: column;
      overflow: hidden;
      animation: fadeIn .2s;
    }
    .mc-head {
      display: flex; align-items: center; gap: var(--gap-3);
      padding: var(--gap-3) var(--gap-4);
      border-bottom: 1px solid var(--line-soft);
      background: var(--bg-elev);
      padding-top: calc(var(--gap-3) + env(safe-area-inset-top));
    }
    .mc-head h1 {
      font-size: 18px;
      flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mc-head .pasos-contador {
      font-family: var(--font-num);
      font-variant-numeric: tabular-nums;
      font-size: 14px; font-weight: 600;
      color: var(--text-muted);
    }
    .mc-progreso {
      height: 4px;
      background: var(--bg-soft);
      position: relative;
      overflow: hidden;
    }
    .mc-progreso-rell {
      position: absolute; left: 0; top: 0; height: 100%;
      background: var(--accent);
      transition: width .25s;
    }
    .mc-cerrar {
      width: 40px; height: 40px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: var(--r-pill);
      color: var(--text-muted);
      font-size: 20px;
    }
    .mc-cerrar:hover { background: var(--bg-soft); color: var(--text); }

    .mc-body {
      flex: 1; overflow-y: auto;
      padding: var(--gap-5) var(--gap-4);
    }
    .mc-paso {
      max-width: 720px; width: 100%;
      margin: 0 auto;
    }
    .mc-paso-num {
      display: inline-block;
      font-family: var(--font-num); font-weight: 600;
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: var(--gap-2);
    }
    .mc-paso-titulo {
      font-family: var(--font-titulo);
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: var(--gap-3);
    }
    @media (min-width: 720px) { .mc-paso-titulo { font-size: 36px; } }
    .mc-paso-texto {
      font-size: 19px;
      line-height: 1.55;
      margin-bottom: var(--gap-4);
    }
    @media (min-width: 720px) { .mc-paso-texto { font-size: 22px; } }
    .mc-paso-meta {
      display: flex; gap: var(--gap-2); flex-wrap: wrap;
      margin-bottom: var(--gap-4);
    }
    .mc-paso-meta .pill {
      font-size: 14px;
      padding: 8px 14px;
      background: var(--bg-soft);
    }
    .mc-paso-meta .pill b {
      font-family: var(--font-num);
      color: var(--accent);
      margin-left: 6px;
    }
    .mc-paso-ings {
      background: var(--bg-elev);
      border: 1px solid var(--line-soft);
      border-radius: var(--r-lg);
      padding: var(--gap-4);
      margin-bottom: var(--gap-4);
      box-shadow: var(--sh-1);
    }
    .mc-paso-ings h3 {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--text-muted); font-weight: 600;
      margin-bottom: var(--gap-2);
    }
    .mc-paso-ings ul {
      list-style: none; margin: 0; padding: 0;
      display: flex; flex-direction: column;
      font-size: 16px;
    }
    .mc-paso-ings li {
      padding: 8px 0;
      border-bottom: 1px solid var(--line-soft);
      display: flex; align-items: baseline; flex-wrap: wrap; gap: 4px;
    }
    .mc-paso-ings li:last-child { border-bottom: 0; }
    .mc-paso-ings .ing-cant { font-size: 17px; }

    .mc-btn-temp {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 20px;
      background: var(--accent);
      color: var(--text-inv);
      border-radius: var(--r-pill);
      font-weight: 600; font-size: 16px;
      box-shadow: var(--sh-2);
      transition: transform .12s, box-shadow .12s;
    }
    .mc-btn-temp:hover { transform: translateY(-1px); box-shadow: var(--sh-3); }

    .mc-foot {
      display: flex; align-items: center; gap: var(--gap-3);
      padding: var(--gap-3) var(--gap-4);
      padding-bottom: calc(var(--gap-3) + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line-soft);
      background: var(--bg-elev);
    }
    .mc-btn-nav {
      flex: 1;
      padding: 16px 20px;
      background: var(--bg-soft);
      color: var(--text);
      font-size: 16px; font-weight: 600;
      border-radius: var(--r-pill);
      text-align: center;
      min-height: 56px;
      transition: background .12s, box-shadow .12s, opacity .12s;
    }
    .mc-btn-nav[disabled] { opacity: 0.35; cursor: not-allowed; }
    .mc-btn-nav:not([disabled]):hover { box-shadow: var(--sh-1); }
    .mc-btn-nav.principal { background: var(--accent); color: var(--text-inv); }
    .mc-btn-nav.principal:not([disabled]):hover { box-shadow: var(--sh-2); }

    /* Boton "Modo cocina" en el detalle */
    .btn-cocina-iniciar {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 22px;
      font-size: 15px; font-weight: 600;
      background: var(--bg-elev);
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: var(--r-pill);
      transition: background .12s, transform .12s, box-shadow .12s;
    }
    .btn-cocina-iniciar:hover {
      background: var(--accent-bg);
      transform: translateY(-1px);
      box-shadow: var(--sh-2);
    }

    /* ========================================================================
       TEMPORIZADORES — panel flotante + FAB + modal
       T1: la cuenta atras se renderiza desde finMs - Date.now() (sin acumulacion).
       ======================================================================== */
    .panel-timers {
      position: fixed;
      bottom: calc(var(--gap-4) + env(safe-area-inset-bottom));
      right: var(--gap-3);
      z-index: 110;
      display: flex; flex-direction: column-reverse; gap: var(--gap-2);
      max-height: 70vh;
      overflow-y: auto;
      width: min(320px, calc(100vw - var(--gap-3) * 2));
    }
    /* En modo cocina movemos el panel arriba para no chocar con .mc-foot */
    body.modo-cocina-activo .panel-timers {
      bottom: auto;
      top: calc(60px + env(safe-area-inset-top));
    }
    .timer {
      background: var(--bg-elev);
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      border-radius: var(--r-md);
      padding: var(--gap-3);
      box-shadow: var(--sh-2);
      display: flex; align-items: center; gap: var(--gap-2);
    }
    .timer-info { flex: 1; min-width: 0; }
    .timer-etiqueta {
      font-size: 12px; font-weight: 500;
      color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .timer-restante {
      font-family: var(--font-num);
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      font-size: 22px;
      color: var(--text);
      line-height: 1.1;
    }
    .timer.pausado { border-left-color: var(--text-muted); opacity: 0.85; }
    .timer.pausado .timer-restante { color: var(--text-muted); }
    .timer.vencido {
      border-left-color: var(--danger);
      animation: timerAlerta 0.55s ease-in-out 6;
    }
    .timer.vencido .timer-restante { color: var(--danger); }
    @keyframes timerAlerta {
      0%, 100% { background: var(--bg-elev); transform: scale(1); }
      50%      { background: var(--accent-bg); transform: scale(1.03); }
    }
    .timer-btn {
      width: 32px; height: 32px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: var(--r-pill);
      background: var(--bg-soft);
      color: var(--text);
      font-size: 14px;
      transition: background .12s, color .12s;
    }
    .timer-btn:hover { background: var(--bg); box-shadow: var(--sh-1); }
    .timer-btn.peligro { color: var(--danger); }

    /* FAB para crear timer manual */
    .fab-timer {
      position: fixed;
      bottom: calc(var(--gap-4) + env(safe-area-inset-bottom));
      left: var(--gap-3);
      z-index: 89;
      width: 52px; height: 52px;
      border-radius: var(--r-pill);
      background: var(--bg-elev);
      color: var(--accent);
      box-shadow: var(--sh-3);
      display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid var(--line);
      transition: transform .12s, box-shadow .12s;
      padding: 0;
    }
    .fab-timer svg {
      width: 24px; height: 24px;
      display: block;
    }
    .fab-timer:hover { transform: translateY(-1px); box-shadow: var(--sh-3); }
    body.modo-cocina-activo .fab-timer { display: none; }

    /* Modal de nuevo temporizador */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      padding: var(--gap-4);
      z-index: 200;
      animation: fadeIn .15s;
    }
    .modal {
      background: var(--bg-elev);
      border-radius: var(--r-lg);
      padding: var(--gap-5);
      width: min(420px, 100%);
      box-shadow: var(--sh-3);
      display: flex; flex-direction: column; gap: var(--gap-3);
    }
    .modal h3 { font-size: 20px; }
    .modal .campo input { font-size: 16px; }
    .modal-fila { display: flex; gap: var(--gap-2); }
    .modal-fila .campo { flex: 1; }
    .modal-acciones {
      display: flex; gap: var(--gap-2);
      justify-content: flex-end;
      margin-top: var(--gap-2);
    }
    .modal-acciones button {
      padding: 10px 18px;
      border-radius: var(--r-pill);
      font-weight: 600;
      font-size: 14px;
      transition: transform .12s, box-shadow .12s;
    }
    .modal-acciones .secundario {
      background: var(--bg-soft);
      color: var(--text);
    }
    .modal-acciones .principal {
      background: var(--accent);
      color: var(--text-inv);
    }
    .modal-acciones .principal:hover { transform: translateY(-1px); box-shadow: var(--sh-2); }

    /* Barra-acciones (Modo cocina): SOLO visible en móvil, sticky abajo */
    .barra-acciones {
      display: none;
    }
    @media (max-width: 720px) {
      .barra-acciones {
        display: flex;
        gap: var(--gap-2);
        justify-content: center;
        flex-wrap: wrap;
      }
    }

    /* ========================================================================
       COMPRA — seleccion de recetas, lista agrupada por categoria
       Tics persisten (KEY_COMPRA). T3: suma por ref+unidad; ref:null no suma.
       ======================================================================== */
    .compra-panel {
      background: var(--bg-elev);
      border: 1px solid var(--line-soft);
      border-radius: var(--r-lg);
      padding: var(--gap-4);
      box-shadow: var(--sh-1);
      margin-bottom: var(--gap-4);
    }
    .compra-panel-titulo {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--text-muted); font-weight: 600;
      margin-bottom: var(--gap-2);
    }
    .compra-recetas {
      display: flex; flex-wrap: wrap; gap: var(--gap-2);
      align-items: center;
    }
    .compra-receta {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--bg-soft);
      border-radius: var(--r-pill);
      padding: 4px 6px 4px 12px;
      font-size: 13px;
    }
    .compra-receta .nombre {
      max-width: 180px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .compra-receta .raciones-mini {
      display: inline-flex; align-items: center; gap: 2px;
      background: var(--bg-elev);
      border-radius: var(--r-pill);
      padding: 2px;
      margin-left: var(--gap-2);
    }
    .compra-receta .raciones-mini button {
      width: 24px; height: 24px;
      border-radius: var(--r-pill);
      font-weight: 700; font-size: 13px;
      color: var(--text);
      transition: background .12s, color .12s;
    }
    .compra-receta .raciones-mini button:hover:not([disabled]) {
      background: var(--accent); color: var(--text-inv);
    }
    .compra-receta .raciones-mini button[disabled] { opacity: 0.35; cursor: not-allowed; }
    .compra-receta .raciones-mini .num {
      font-family: var(--font-num); font-weight: 600;
      min-width: 22px; text-align: center;
      font-size: 13px;
    }
    .compra-receta .quitar {
      width: 26px; height: 26px;
      border-radius: var(--r-pill);
      color: var(--text-muted);
      font-size: 16px;
      transition: background .12s, color .12s;
    }
    .compra-receta .quitar:hover { background: var(--bg); color: var(--danger); }

    .compra-anyadir {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 12px;
      border-radius: var(--r-pill);
      background: var(--bg-soft);
      color: var(--text);
      font-size: 13px; font-weight: 500;
      border: 1px dashed var(--line);
      transition: background .12s;
    }
    .compra-anyadir:hover { background: var(--bg); }

    .compra-opciones {
      display: flex; flex-wrap: wrap; gap: var(--gap-3);
      align-items: center;
      margin-top: var(--gap-3);
      padding-top: var(--gap-3);
      border-top: 1px solid var(--line-soft);
      font-size: 13px;
      color: var(--text-muted);
    }
    .compra-opciones label {
      display: inline-flex; align-items: center; gap: 6px;
      cursor: pointer;
    }
    .compra-opciones input[type="checkbox"] {
      width: 16px; height: 16px; accent-color: var(--accent);
    }

    .lista-grupo {
      background: var(--bg-elev);
      border: 1px solid var(--line-soft);
      border-radius: var(--r-lg);
      padding: var(--gap-4);
      box-shadow: var(--sh-1);
      margin-bottom: var(--gap-3);
    }
    .lista-grupo-titulo {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--text-muted); font-weight: 600;
      margin-bottom: var(--gap-2);
      padding: 0 10px;
    }
    .lista-compra {
      list-style: none; margin: 0; padding: 0;
      display: flex; flex-direction: column; gap: 2px;
    }
    .lista-compra li {
      display: flex; align-items: flex-start; gap: var(--gap-3);
      padding: 8px 10px;
      border-radius: var(--r-md);
      transition: background .12s, opacity .12s;
      cursor: pointer;
    }
    .lista-compra li:hover { background: var(--bg-soft); }
    .lista-compra input[type="checkbox"] {
      width: 18px; height: 18px;
      margin-top: 2px;
      accent-color: var(--accent);
      flex-shrink: 0; cursor: pointer;
    }
    .lista-compra .ing-texto { flex: 1; min-width: 0; }
    .lista-compra .compra-recetas-info {
      display: inline-block;
      font-size: 11px;
      color: var(--text-muted);
      margin-left: 8px;
      padding: 1px 8px;
      background: var(--bg-soft);
      border-radius: var(--r-pill);
    }
    .lista-compra li.tachado { opacity: 0.4; }
    .lista-compra li.tachado .ing-texto { text-decoration: line-through; }

    .compra-resumen-acciones {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: var(--gap-2);
      margin-bottom: var(--gap-3);
    }
    .compra-resumen-acciones .info {
      font-size: 14px; color: var(--text-muted);
    }
    .compra-resumen-acciones .info b {
      color: var(--text); font-family: var(--font-num);
    }

    /* ========================================================================
       PLANIFICADOR MENSUAL — calendario 7 columnas × 4-6 semanas
       ======================================================================== */
    .plan-bar {
      display: flex; flex-wrap: wrap; gap: var(--gap-2);
      margin-bottom: var(--gap-4);
      align-items: center;
    }
    .plan-bar .crece { flex: 1; }
    .plan-nav-grupo {
      display: inline-flex; align-items: center; gap: 6px;
    }
    .plan-nav {
      width: 32px; height: 32px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: var(--r-pill);
      background: var(--bg-soft);
      color: var(--text);
      font-size: 18px;
      font-weight: 600;
      transition: background .12s, color .12s;
    }
    .plan-nav:hover { background: var(--bg); box-shadow: var(--sh-1); }
    .plan-mes-titulo {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.025em;
      margin: 0 8px;
      min-width: 160px;
      text-align: center;
    }
    .plan-hoy {
      padding: 6px 12px;
      border-radius: var(--r-pill);
      background: var(--bg-soft);
      color: var(--text);
      font-size: 12px;
      font-weight: 500;
      margin-left: 4px;
    }
    .plan-hoy:hover { background: var(--bg); box-shadow: var(--sh-1); }
    .plan-contador {
      font-size: 13px; color: var(--text-muted);
    }
    .plan-contador b {
      color: var(--text);
      font-family: var(--font-num);
      font-variant-numeric: tabular-nums;
    }

    .plan-calendario {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .plan-cab {
      text-align: center;
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      color: var(--text-muted);
      padding: 8px 0;
      opacity: 0.7;
    }
    .plan-celda {
      background: var(--bg-elev);
      border: 1px solid var(--line-soft);
      border-radius: 10px;
      padding: 6px;
      min-height: 88px;
      display: flex; flex-direction: column;
      gap: 4px;
      transition: border-color .12s;
    }
    .plan-celda.fuera {
      background: transparent;
      border: none;
    }
    .plan-celda.fin-semana { background: var(--bg-soft); }
    .plan-celda.hoy {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 22%, transparent);
    }
    .plan-dia-num {
      font-family: var(--font-num);
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      font-size: 12px;
      color: var(--text);
      padding: 0 2px;
      line-height: 1;
    }
    .plan-celda.hoy .plan-dia-num {
      color: var(--accent);
      font-weight: 700;
    }
    .plan-mini-slots {
      display: flex; flex-direction: column; gap: 2px;
      flex: 1;
    }
    .plan-mini-slot {
      flex: 1;
      min-height: 18px;
      padding: 3px 6px;
      border-radius: 5px;
      background: transparent;
      border: 1px dashed var(--line);
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      transition: background .12s, border-color .12s, color .12s;
      line-height: 1.2;
    }
    .plan-mini-slot:hover {
      border-color: var(--accent);
      border-style: solid;
    }
    .plan-mini-slot.lleno {
      background: var(--chip-bg, var(--bg-soft));
      color: var(--chip-fg, var(--text));
      border: 1px solid transparent;
      font-weight: 600;
    }
    .plan-mini-slot.lleno:hover {
      transform: translateY(-1px);
      box-shadow: var(--sh-1);
    }

    /* Móvil: el calendario sigue siendo 7 columnas pero celdas más pequeñas */
    @media (max-width: 600px) {
      .plan-calendario { gap: 2px; }
      .plan-celda { min-height: 72px; padding: 3px; gap: 2px; border-radius: 7px; }
      .plan-dia-num { font-size: 11px; }
      .plan-mini-slot { font-size: 9px; padding: 2px 4px; min-height: 14px; }
      .plan-cab { font-size: 9.5px; padding: 6px 0; }
    }

    /* Toggle Mes / Semana */
    .plan-vista-toggle {
      display: inline-flex;
      background: var(--bg-soft);
      border-radius: var(--r-pill);
      padding: 2px;
    }
    .plan-vista-toggle button {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      border-radius: var(--r-pill);
      color: var(--text-muted);
      transition: background .15s, color .15s;
    }
    .plan-vista-toggle button[aria-pressed="true"] {
      background: var(--bg-elev);
      color: var(--text);
      box-shadow: var(--sh-1);
      font-weight: 600;
    }

    /* ========================================================================
       PLANIFICADOR — vista semanal ampliada (7 columnas grandes)
       ======================================================================== */
    .psem-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }
    .psem-col {
      display: flex; flex-direction: column;
      gap: 6px;
    }
    .psem-cab {
      background: var(--bg-soft);
      border-radius: 12px;
      padding: 10px 8px;
      text-align: center;
      display: flex; flex-direction: column;
      gap: 2px;
    }
    .psem-col.hoy .psem-cab {
      background: var(--accent);
      color: var(--text-inv);
    }
    .psem-col.fin-semana .psem-cab {
      background: color-mix(in srgb, var(--bg-soft) 65%, var(--accent-bg));
    }
    .psem-dia {
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      font-weight: 600;
    }
    .psem-col.hoy .psem-dia {
      color: var(--text-inv);
      opacity: 0.85;
    }
    .psem-num {
      font-family: var(--font-ui);
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      font-size: 20px;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .psem-col.hoy .psem-num { color: var(--text-inv); }
    .psem-slots {
      display: flex; flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    .psem-slot {
      background: transparent;
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 12px;
      min-height: 90px;
      cursor: pointer;
      display: flex; flex-direction: column;
      gap: 4px;
      text-align: left;
      transition: border-color .12s, background .12s, transform .12s, box-shadow .12s;
    }
    .psem-slot:hover {
      border-color: var(--accent);
      border-style: solid;
    }
    .psem-slot.lleno {
      background: var(--chip-fg, var(--accent));
      color: #ffffff;
      border-color: transparent;
      border-style: solid;
    }
    :root[data-tema="oscuro"] .psem-slot.lleno {
      background: var(--chip-bg, var(--accent));
      color: var(--chip-fg, #fff);
    }
    .psem-slot.lleno:hover {
      transform: translateY(-2px);
      box-shadow: var(--sh-2);
    }
    .psem-slot-et {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 600;
      color: var(--text-muted);
    }
    .psem-slot.lleno .psem-slot-et {
      color: inherit;
      opacity: 0.78;
    }
    .psem-slot-receta {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.25;
      color: inherit;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }
    .psem-slot-meta {
      font-size: 11px;
      opacity: 0.78;
      margin-top: auto;
      font-variant-numeric: tabular-nums;
    }
    .psem-slot-vacio {
      color: var(--text-muted);
      font-size: 12px;
      margin-top: auto;
      text-align: center;
    }

    /* Móvil: convertir en lista por día (fila por día con sus 3 comidas) */
    @media (max-width: 720px) {
      .psem-grid {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .psem-col {
        flex-direction: row;
        align-items: stretch;
        gap: 8px;
      }
      .psem-cab {
        width: 64px;
        flex-shrink: 0;
        justify-content: center;
        padding: 8px 4px;
      }
      .psem-slots {
        flex: 1;
        flex-direction: row;
        gap: 4px;
      }
      .psem-slot {
        flex: 1;
        min-height: 70px;
        padding: 8px 10px;
      }
      .psem-slot-receta { font-size: 12px; -webkit-line-clamp: 2; }
      .psem-slot-meta { display: none; }
    }

    /* ========================================================================
       MODAL SELECTOR DE RECETA (compartido por Compra y Planificador)
       ======================================================================== */
    .modal-selector {
      min-height: 320px;
      max-height: 80vh;
      width: min(520px, 100%);
    }
    .sel-buscar {
      background: var(--bg-input);
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      padding: 10px 14px;
      font-size: 15px;
      color: var(--text);
    }
    .sel-buscar:focus { outline: none; border-color: var(--accent); }
    .sel-lista {
      max-height: 50vh;
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 4px;
      margin: -4px;
      padding: 4px;
    }
    .sel-receta {
      display: flex; align-items: center; gap: var(--gap-3);
      padding: 10px 12px;
      border-radius: var(--r-md);
      background: var(--bg-soft);
      cursor: pointer;
      text-align: left;
      transition: background .12s, transform .12s;
    }
    .sel-receta:hover { background: var(--bg); box-shadow: var(--sh-1); }
    .sel-receta-info { flex: 1; min-width: 0; }
    .sel-receta-nombre { font-weight: 600; color: var(--text); }
    .sel-receta-meta {
      font-size: 12px; color: var(--text-muted);
      margin-top: 2px;
    }
    .sel-quitar {
      background: var(--bg-soft);
      color: var(--danger);
      padding: 10px 14px;
      border-radius: var(--r-md);
      font-weight: 600; font-size: 14px;
      text-align: left;
    }
    .sel-quitar:hover { background: var(--accent-bg); }
    .sel-vacio {
      text-align: center; color: var(--text-muted);
      padding: var(--gap-5);
      font-size: 14px;
    }

    /* ========================================================================
       CONVERSORES — masa<->volumen, volumenes, horno
       ======================================================================== */
    .conv-cards {
      display: grid; gap: var(--gap-3);
      grid-template-columns: 1fr;
    }
    @media (min-width: 720px) { .conv-cards { grid-template-columns: 1fr 1fr; } }
    .conv-card {
      background: var(--bg-elev);
      border: 1px solid var(--line-soft);
      border-radius: var(--r-lg);
      padding: var(--gap-4);
      box-shadow: var(--sh-1);
    }
    .conv-card h2 {
      font-family: var(--font-titulo);
      font-size: 18px; margin-bottom: var(--gap-3);
    }
    .conv-fila {
      display: grid; gap: var(--gap-2);
      grid-template-columns: 1fr 1fr 1fr;
      align-items: end;
    }
    .conv-fila .campo { display: flex; flex-direction: column; gap: 4px; }
    .conv-fila label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--text-muted); font-weight: 600;
    }
    .conv-fila select, .conv-fila input {
      background: var(--bg-input);
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      padding: 10px 12px;
      font-size: 15px;
      color: var(--text);
      width: 100%;
    }
    .conv-fila select:focus, .conv-fila input:focus { outline: none; border-color: var(--accent); }
    .conv-result {
      margin-top: var(--gap-3);
      padding: var(--gap-3);
      background: var(--bg-soft);
      border-radius: var(--r-md);
      text-align: center;
    }
    .conv-result .et { font-size: 12px; color: var(--text-muted); }
    .conv-result b {
      font-family: var(--font-num);
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      font-size: 26px;
      color: var(--accent);
      display: block;
      margin-top: 4px;
    }
    .conv-aviso {
      margin-top: var(--gap-2);
      padding: 8px 12px;
      background: var(--accent-bg);
      color: var(--accent);
      border-radius: var(--r-md);
      font-size: 13px;
    }
    .conv-tabla {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin-top: var(--gap-3);
    }
    .conv-tabla th, .conv-tabla td {
      padding: 6px 8px;
      border-bottom: 1px solid var(--line-soft);
      text-align: left;
    }
    .conv-tabla th { font-size: 11px; text-transform: uppercase; color: var(--text-muted); }
    .conv-tabla td.num { font-family: var(--font-num); }

    /* ========================================================================
       DATOS — tabs + listas + editores + import/export
       ======================================================================== */
    .datos-tabs {
      display: flex; gap: var(--gap-2);
      margin-bottom: var(--gap-4);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .datos-tabs::-webkit-scrollbar { display: none; }

    .datos-card {
      background: var(--bg-elev);
      border: 1px solid var(--line-soft);
      border-radius: var(--r-lg);
      padding: var(--gap-4);
      box-shadow: var(--sh-1);
      margin-bottom: var(--gap-3);
    }
    .datos-card-head {
      display: flex; align-items: center; gap: var(--gap-2);
      margin-bottom: var(--gap-3);
      flex-wrap: wrap;
    }
    .datos-card-head h2 { font-size: 18px; flex: 1; }
    .datos-card-head p {
      font-size: 13px; color: var(--text-muted);
      margin: 0 0 0 var(--gap-2);
      flex-basis: 100%;
    }

    .datos-lista {
      display: flex; flex-direction: column; gap: 4px;
    }
    .datos-lista-item {
      display: flex; align-items: center; gap: var(--gap-2);
      padding: 10px 12px;
      border-radius: var(--r-md);
      background: var(--bg-soft);
    }
    .datos-lista-item .nombre {
      flex: 1; font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .datos-lista-item .meta {
      font-size: 12px; color: var(--text-muted);
      font-family: var(--font-num);
    }
    .datos-lista-item button {
      padding: 4px 10px;
      border-radius: var(--r-pill);
      background: var(--bg-elev);
      color: var(--text);
      font-size: 12px; font-weight: 500;
      transition: box-shadow .12s, color .12s;
    }
    .datos-lista-item button:hover { box-shadow: var(--sh-1); }
    .datos-lista-item button.peligro { color: var(--danger); }

    /* ---- Editor (receta / ingrediente) ----------------------------------- */
    .editor { display: flex; flex-direction: column; gap: var(--gap-3); }
    .editor-seccion {
      background: var(--bg-soft);
      border-radius: var(--r-md);
      padding: var(--gap-3);
    }
    .editor-seccion h3 {
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--text-muted); font-weight: 600;
      margin-bottom: var(--gap-2);
    }
    .editor-grid {
      display: grid; gap: var(--gap-2);
      grid-template-columns: 1fr;
    }
    @media (min-width: 720px) {
      .editor-grid { grid-template-columns: 1fr 1fr; }
      .editor-grid .col-completo { grid-column: 1 / -1; }
    }
    .editor .campo { display: flex; flex-direction: column; gap: 4px; }
    .editor .campo label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--text-muted); font-weight: 600;
    }
    .editor input[type="text"],
    .editor input[type="number"],
    .editor input[type="search"],
    .editor input[type="url"],
    .editor select,
    .editor textarea {
      background: var(--bg-elev);
      border: 1px solid var(--line);
      border-radius: var(--r-sm);
      padding: 8px 10px;
      font-size: 14px;
      color: var(--text);
      width: 100%;
    }
    .editor input:focus, .editor select:focus, .editor textarea:focus {
      outline: none; border-color: var(--accent);
    }
    .editor textarea { min-height: 60px; resize: vertical; font-family: var(--font-ui); }

    .editor-chips {
      display: flex; flex-wrap: wrap; gap: 4px;
    }
    .editor-chips .filtro-chip { font-size: 12px; padding: 4px 10px; }

    .editor-fila-ing {
      display: grid;
      gap: 4px;
      grid-template-columns: 1.4fr 1.4fr 0.7fr 0.7fr 0.9fr 0.9fr auto 1.4fr auto;
      align-items: center;
      padding: 6px;
      background: var(--bg-elev);
      border: 1px solid var(--line-soft);
      border-radius: var(--r-sm);
    }
    @media (max-width: 900px) {
      .editor-fila-ing { grid-template-columns: 1fr 1fr; }
      .editor-fila-ing > * { font-size: 13px; }
      .editor-fila-ing .col-ancha { grid-column: 1 / -1; }
    }
    .editor-fila-ing input, .editor-fila-ing select {
      padding: 6px 8px;
      font-size: 13px;
    }
    .editor-fila-ing .check-opc {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; color: var(--text-muted); text-transform: uppercase;
    }
    .editor-fila-ing .check-opc input { width: 16px; height: 16px; }
    .editor-fila-ing .borrar {
      background: var(--bg-soft);
      color: var(--danger);
      padding: 6px 8px;
      border-radius: var(--r-sm);
      font-size: 14px;
    }

    .editor-paso {
      background: var(--bg-elev);
      border: 1px solid var(--line-soft);
      border-radius: var(--r-md);
      padding: var(--gap-3);
      display: flex; flex-direction: column; gap: 6px;
      position: relative;
    }
    .editor-paso .paso-toolbar {
      position: absolute; top: 6px; right: 6px;
      display: flex; gap: 2px;
    }
    .editor-paso .paso-toolbar button {
      width: 26px; height: 26px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: var(--r-sm);
      background: var(--bg-soft);
      color: var(--text-muted);
      font-size: 12px;
    }
    .editor-paso .paso-toolbar button:hover { color: var(--text); }
    .editor-paso .paso-toolbar button.borrar { color: var(--danger); }
    .editor-paso .num {
      font-family: var(--font-num); font-weight: 600;
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .editor-paso .fila {
      display: grid; gap: 4px;
      grid-template-columns: 1fr 1fr 1fr;
    }
    @media (max-width: 720px) { .editor-paso .fila { grid-template-columns: 1fr; } }

    .editor-tabla-acciones {
      display: flex; justify-content: flex-end;
      margin-top: var(--gap-2);
    }
    .editor-anyadir {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 8px 14px;
      border-radius: var(--r-pill);
      background: var(--bg-elev);
      color: var(--text);
      font-size: 13px; font-weight: 500;
      border: 1px dashed var(--line);
      transition: background .12s;
    }
    .editor-anyadir:hover { background: var(--bg); }

    .editor-errores {
      background: var(--accent-bg);
      border-left: 4px solid var(--danger);
      padding: var(--gap-3);
      border-radius: var(--r-md);
      margin-bottom: var(--gap-2);
    }
    .editor-errores h4 { font-size: 13px; color: var(--danger); margin-bottom: 4px; font-family: var(--font-ui); font-weight: 700; }
    .editor-errores ul { font-size: 13px; color: var(--text); padding-left: 18px; margin: 0; }

    .editor-acciones {
      display: flex; gap: var(--gap-2); justify-content: flex-end;
      flex-wrap: wrap;
      margin-top: var(--gap-3);
    }

    /* ---- Import / Export ------------------------------------------------- */
    .iox-grupo { display: flex; flex-wrap: wrap; gap: var(--gap-2); margin-bottom: var(--gap-3); }
    .iox-boton {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 16px;
      border-radius: var(--r-pill);
      background: var(--accent);
      color: var(--text-inv);
      font-size: 14px; font-weight: 600;
      box-shadow: var(--sh-1);
      cursor: pointer;
    }
    .iox-boton.secundario {
      background: var(--bg-soft);
      color: var(--text);
      box-shadow: none;
    }
    .iox-boton.peligro {
      background: var(--bg-soft);
      color: var(--danger);
    }
    .iox-boton:hover { transform: translateY(-1px); box-shadow: var(--sh-2); }
    .iox-input-file {
      display: none;
    }
    .iox-info {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: var(--gap-2);
      line-height: 1.5;
    }
    .iox-info code {
      background: var(--bg-soft);
      padding: 1px 6px;
      border-radius: 4px;
      font-family: var(--font-num);
      font-size: 12px;
    }
    .incidencias {
      background: var(--bg-soft);
      border-left: 4px solid var(--accent);
      padding: var(--gap-3);
      border-radius: var(--r-md);
      margin-top: var(--gap-3);
      max-height: 280px;
      overflow-y: auto;
    }
    .incidencias h4 { font-size: 13px; margin-bottom: 6px; font-family: var(--font-ui); font-weight: 700; }
    .incidencias ul { padding-left: 18px; margin: 0; font-size: 13px; }
    .incidencias li { margin-bottom: 3px; }

    /* Bloque desplegable con plantilla JSON dentro de Importar */
    .plantilla-detalle {
      margin-top: var(--gap-3);
      border-top: 1px solid var(--line-soft);
      padding-top: var(--gap-3);
    }
    .plantilla-detalle summary {
      cursor: pointer;
      padding: 6px 0;
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text);
      display: flex; align-items: center; gap: 6px;
      list-style: none;
      user-select: none;
    }
    .plantilla-detalle summary::-webkit-details-marker { display: none; }
    .plantilla-detalle summary::after {
      content: "▾";
      color: var(--text-muted);
      font-size: 10px;
      margin-left: auto;
      transition: transform .15s;
    }
    .plantilla-detalle[open] summary::after { transform: rotate(180deg); }
    .plantilla-cuerpo { padding-top: var(--gap-3); }
    .plantilla-json {
      background: var(--bg-soft);
      border: 1px solid var(--line-soft);
      border-radius: var(--r-md);
      padding: 14px;
      font-family: var(--font-num);
      font-size: 11.5px;
      line-height: 1.55;
      overflow: auto;
      max-height: 400px;
      margin: 0;
      color: var(--text);
      white-space: pre;
      tab-size: 2;
    }
    .plantilla-json::selection { background: color-mix(in srgb, var(--accent) 30%, transparent); }
    .iox-info code {
      background: var(--bg-soft);
      padding: 1px 6px;
      border-radius: 4px;
      font-family: var(--font-num);
      font-size: 11.5px;
    }

    /* Textarea para pegar JSON (mismo estilo que el <pre> de plantilla, editable) */
    textarea.plantilla-json {
      width: 100%;
      resize: vertical;
      font-family: var(--font-num);
      font-size: 11.5px;
      line-height: 1.55;
      tab-size: 2;
      min-height: 180px;
    }

    /* Bloque de refs huérfanas tras importar */
    .huerf-bloque {
      margin-top: var(--gap-3);
      padding: var(--gap-3);
      background: color-mix(in srgb, var(--accent-bg) 50%, var(--bg-soft));
      border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
      border-radius: var(--r-md);
    }
    .huerf-titulo {
      font-size: 13.5px;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.45;
    }
    .huerf-lista {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      max-height: 140px;
      overflow-y: auto;
    }
    .huerf-chip {
      display: inline-block;
      padding: 2px 8px;
      background: var(--bg-elev);
      border: 1px solid var(--line);
      border-radius: var(--r-pill);
      font-family: var(--font-num);
      font-size: 11px;
      color: var(--text);
    }

    /* ========================================================================
       ACCESIBILIDAD DE COCINA — fuente grande, alto contraste, target tactil
       Persistidos en KEY_FUENTE_GRANDE y KEY_ALTO_CONTRASTE.
       Se aplican como clase en <html>; usan variables -> todos los componentes
       (incluidos los de fases 5-6) heredan automaticamente.
       ======================================================================== */
    html.a11y-fuente-grande {
      --fs-body: 18px;
    }
    html.a11y-fuente-grande .vista-titulo  { font-size: 32px; }
    @media (min-width: 720px) {
      html.a11y-fuente-grande .vista-titulo { font-size: 38px; }
    }
    html.a11y-fuente-grande .tarjeta-nombre { font-size: 22px; }
    html.a11y-fuente-grande .detalle h1 { font-size: 34px; }
    @media (min-width: 720px) { html.a11y-fuente-grande .detalle h1 { font-size: 42px; } }
    html.a11y-fuente-grande .lista-ing li,
    html.a11y-fuente-grande .lista-paso li { font-size: 16px; padding: 10px 12px; }
    html.a11y-fuente-grande .lista-compra li { font-size: 16px; padding: 10px 12px; }
    html.a11y-fuente-grande .mc-paso-texto { font-size: 22px; }
    @media (min-width: 720px) { html.a11y-fuente-grande .mc-paso-texto { font-size: 24px; } }
    html.a11y-fuente-grande .mc-paso-titulo { font-size: 34px; }
    @media (min-width: 720px) { html.a11y-fuente-grande .mc-paso-titulo { font-size: 40px; } }
    html.a11y-fuente-grande .mc-paso-ings ul { font-size: 18px; }
    html.a11y-fuente-grande .timer-restante { font-size: 26px; }
    html.a11y-fuente-grande .mc-btn-nav  { font-size: 18px; padding: 18px 22px; min-height: 60px; }
    html.a11y-fuente-grande .mc-btn-temp { font-size: 18px; padding: 16px 22px; }
    html.a11y-fuente-grande .btn-principal { font-size: 17px; padding: 16px 24px; }

    /* Alto contraste: refuerza tinta y bordes en ambos temas. */
    html.a11y-alto-contraste {
      --bg:        #ffffff;
      --bg-elev:   #ffffff;
      --bg-soft:   #ededed;
      --bg-input:  #ffffff;
      --text:      #000000;

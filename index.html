    /* ========================================================================
       (e) EVENTOS
       Wiring de DOM: perfil, tema, navegacion, biblioteca (lista y detalle).
       ======================================================================== */

    function abrirReceta(id) {
      const r = recetaPorId(id);
      if (!r) return;
      // Si llaman desde Buscar/Inversa, redirige a Biblioteca para mostrar el detalle alli.
      if (vistaActiva !== "biblioteca") fijarVista("biblioteca");
      sesion.recetaAbierta = id;
      sesion.raciones = r.racionesBase;
      sesion.ticsIng.clear();
      sesion.ticsPaso.clear();
      // Actualizar URL para que se pueda compartir el enlace de esta receta.
      actualizarHashReceta(id);
      renderBibliotecaDetalle();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    /* ---- Hash routing: #/receta/<id> para enlazar a una receta concreta */
    let _hashIgnorar = false;
    function actualizarHashReceta(id) {
      _hashIgnorar = true;
      try {
        if (id) history.replaceState(null, "", "#/receta/" + id);
        else    history.replaceState(null, "", window.location.pathname + window.location.search);
      } catch (_) {}
      setTimeout(() => { _hashIgnorar = false; }, 50);
    }
    function aplicarHash() {
      if (_hashIgnorar) return;
      const h = window.location.hash || "";
      const mR = h.match(/^#\/receta\/([a-z0-9-]+)/i);
      if (mR) {
        const id = mR[1].toLowerCase();
        if (recetaPorId(id)) {
          fijarVista("biblioteca");
          if (sesion.recetaAbierta !== id) abrirReceta(id);
          return;
        }
      }
      const mV = h.match(/^#\/vista\/([a-z]+)/i);
      if (mV) {
        const v = mV[1].toLowerCase();
        if (VISTAS.some(x => x.id === v)) fijarVista(v);
      }
    }

    /** Toggle favorito en cualquier vista (sincroniza los chips visibles en otras vistas). */
    function toggleFavTarjeta(id) {
      const eu = getEstado(perfilActivo, id);
      const nuevo = !eu.favorito;
      setEstado(perfilActivo, id, { favorito: nuevo });
      document.querySelectorAll(`[data-accion='fav'][data-id="${id}"]`).forEach(b => {
        b.setAttribute("aria-pressed", String(nuevo));
        b.textContent = nuevo ? "♥" : "♡";
        b.setAttribute("aria-label", nuevo ? "Quitar de favoritos" : "Marcar favorito");
      });
    }

    function cerrarReceta() {
      sesion.recetaAbierta = null;
      sesion.ticsIng.clear();
      sesion.ticsPaso.clear();
      actualizarHashReceta(null);
      renderBibliotecaLista();
    }

    function ajustarRaciones(delta) {
      const r = recetaPorId(sesion.recetaAbierta);
      if (!r) return;
      const nuevo = sesion.raciones + delta;
      if (nuevo < 1 || nuevo > 99) return;
      sesion.raciones = nuevo;
      actualizarIngredientesYNumero();
    }

    function init() {
      cargarEstado();
      cargarPerfilGuardado();
      cargarTemaGuardado();
      cargarVistaGuardada();
      cargarOrdenGuardado();
      cargarBibliotecaModo();
      cargarDisponibles();
      cargarInversaModoGuardado();
      cargarTimers();   // T1: estado de temporizadores sobrevive a recarga
      cargarCompra();
      cargarPlan();
      cargarA11y();
      cargarModoDev();
      cargarSupabase();
      cargarBorradosPendientes();
      actualizarThemeColor(document.documentElement.dataset.tema);
      // Si quedaron timers activos al cargar, arrancar el ticker.
      if (sesion.timers.some(t => !t.pausado && !t.vencido)) arrancarTicker();

      // ---- Tema y accesibilidad ------------------------------------------
      document.getElementById("btn-tema").addEventListener("click", alternarTema);
      document.getElementById("btn-contraste").addEventListener("click", alternarAltoContraste);

      // Botón Aa: abre/cierra el popover con el slider.
      document.getElementById("btn-fuente").addEventListener("click", (ev) => {
        ev.stopPropagation();
        togglePopoverFuente();
      });
      // Slider del popover: aplica el nivel en vivo.
      document.getElementById("fuente-slider").addEventListener("input", (ev) => {
        aplicarNivelFuente(ev.target.value);
      });
      // Click fuera del popover -> cerrar.
      document.addEventListener("click", (ev) => {
        const pop = document.getElementById("popover-fuente");
        if (pop.hidden) return;
        if (ev.target.closest("#popover-fuente") || ev.target.closest("#btn-fuente")) return;
        cerrarPopoverFuente();
      });

      // ---- Perfil --------------------------------------------------------
      document.querySelectorAll(".perfil button").forEach(b => {
        b.addEventListener("click", () => fijarPerfil(b.dataset.perfil));
      });

      // ---- Navegacion (delegacion: chips inyectados por renderNav) -------
      document.getElementById("nav-secciones").addEventListener("click", (ev) => {
        const b = ev.target.closest("button.chip");
        if (b && b.dataset.vista) fijarVista(b.dataset.vista);
      });

      // ---- Biblioteca: clicks (delegacion) -------------------------------
      const cont = document.getElementById("biblioteca-contenedor");

      cont.addEventListener("click", (ev) => {
        // Favorito desde tarjeta (no debe abrir la receta).
        // toggleFavTarjeta sincroniza tambien tarjetas iguales en Buscar/Inversa.
        const favTarjeta = ev.target.closest("[data-accion='fav']");
        if (favTarjeta) {
          ev.preventDefault();
          ev.stopPropagation();
          toggleFavTarjeta(favTarjeta.dataset.id);
          return;
        }

        // Abrir tarjeta.
        const abrir = ev.target.closest("[data-accion='abrir']");
        if (abrir) { abrirReceta(abrir.dataset.id); return; }

        // Volver.
        if (ev.target.closest("[data-accion='volver']")) {
          cerrarReceta(); return;
        }

        // Raciones +/-
        if (ev.target.closest("[data-accion='raciones-menos']")) { ajustarRaciones(-1); return; }
        if (ev.target.closest("[data-accion='raciones-mas']"))   { ajustarRaciones(+1); return; }

        // Tic ingrediente (todo el li es clicable).
        const liIng = ev.target.closest("li[data-tic-ing]");
        if (liIng) {
          // Evitar doble toggle si pulsan directamente el checkbox (lo gestiona el change).
          if (ev.target.tagName === "INPUT") return;
          const idx = Number(liIng.dataset.ticIng);
          toggleTicIng(idx, liIng);
          return;
        }

        // Tic paso.
        const liPaso = ev.target.closest("li[data-tic-paso]");
        if (liPaso) {
          if (ev.target.tagName === "INPUT") return;
          const idx = Number(liPaso.dataset.ticPaso);
          toggleTicPaso(idx, liPaso);
          return;
        }

        // Restaurar listas (INDEPENDIENTES).
        if (ev.target.closest("[data-accion='restaurar-ing']")) {
          sesion.ticsIng.clear();
          document.querySelectorAll("#zona-ingredientes li").forEach(li => {
            li.classList.remove("tachado");
            const cb = li.querySelector("input[type=checkbox]");
            if (cb) cb.checked = false;
          });
          return;
        }
        if (ev.target.closest("[data-accion='restaurar-paso']")) {
          sesion.ticsPaso.clear();
          document.querySelectorAll(".lista-paso li").forEach(li => {
            li.classList.remove("tachado");
            const cb = li.querySelector("input[type=checkbox]");
            if (cb) cb.checked = false;
          });
          return;
        }

        // Valoracion (estrella o "Quitar").
        const estr = ev.target.closest("[data-accion='valoracion']");
        if (estr) {
          const r = recetaPorId(sesion.recetaAbierta); if (!r) return;
          const v = Number(estr.dataset.valor);
          setEstado(perfilActivo, r.id, { valoracion: v === 0 ? null : v });
          actualizarZonaUsuario();
          return;
        }

        // Favorito (en detalle).
        if (ev.target.closest("#zona-usuario [data-accion='favorito']")) {
          const r = recetaPorId(sesion.recetaAbierta); if (!r) return;
          const eu = getEstado(perfilActivo, r.id);
          setEstado(perfilActivo, r.id, { favorito: !eu.favorito });
          actualizarZonaUsuario();
          return;
        }

        // "+1 cocinada" — incrementa el contador y fija la fecha de hoy.
        if (ev.target.closest("[data-accion='cocinado']")) {
          const r = recetaPorId(sesion.recetaAbierta); if (!r) return;
          const eu = getEstado(perfilActivo, r.id);
          setEstado(perfilActivo, r.id, {
            vecesCocinada: (eu.vecesCocinada || 0) + 1,
            ultimaVez: hoyISO()
          });
          actualizarZonaUsuario();
          return;
        }
        // "−1 cocinada" — decrementa si > 0 (no toca ultimaVez por simplicidad).
        if (ev.target.closest("[data-accion='cocinado-menos']")) {
          const r = recetaPorId(sesion.recetaAbierta); if (!r) return;
          const eu = getEstado(perfilActivo, r.id);
          const nuevo = Math.max(0, (eu.vecesCocinada || 0) - 1);
          setEstado(perfilActivo, r.id, { vecesCocinada: nuevo });
          actualizarZonaUsuario();
          return;
        }

        // Iniciar modo cocina desde el detalle.
        if (ev.target.closest("[data-accion='iniciar-cocina']")) {
          abrirCocina();
          return;
        }

        // Editar la receta abierta (salta a Datos → Recetas → editor con la receta).
        if (ev.target.closest("[data-accion='editar-receta-actual']")) {
          if (!sesion.recetaAbierta) return;
          const idActual = sesion.recetaAbierta;
          fijarVista("datos");
          sesion.datosTab = "recetas";
          abrirEditorReceta(idActual);
          return;
        }

        // Tab del detalle: Ingredientes / Pasos.
        const tabBtn = ev.target.closest("[data-accion='detalle-tab']");
        if (tabBtn) {
          const v = tabBtn.dataset.valor;
          if (v === "ingredientes" || v === "pasos") {
            sesion.detalleTab = v;
            renderBibliotecaDetalle();
          }
          return;
        }

        // ---- Toolbar biblioteca: vista / favoritos ---------------------
        if (ev.target.closest("[data-accion='biblio-modo-tarjetas']")) {
          resetLimiteBiblioteca();
          fijarBibliotecaModo("tarjetas"); return;
        }
        if (ev.target.closest("[data-accion='biblio-modo-lista']")) {
          resetLimiteBiblioteca();
          fijarBibliotecaModo("lista"); return;
        }
        if (ev.target.closest("[data-accion='biblio-toggle-fav']")) {
          sesion.bibliotecaSoloFav = !sesion.bibliotecaSoloFav;
          resetLimiteBiblioteca();
          renderBibliotecaLista();
          return;
        }
        const fTipo = ev.target.closest("[data-accion='biblio-tipo']");
        if (fTipo) {
          const t = fTipo.dataset.valor;
          if (sesion.bibliotecaTipos.has(t)) sesion.bibliotecaTipos.delete(t);
          else sesion.bibliotecaTipos.add(t);
          fTipo.setAttribute("aria-pressed", String(sesion.bibliotecaTipos.has(t)));
          resetLimiteBiblioteca();
          actualizarResultadosBiblioteca();
          return;
        }
        const fCoc = ev.target.closest("[data-accion='biblio-cocina']");
        if (fCoc) {
          const c = fCoc.dataset.valor;
          if (sesion.bibliotecaCocinas.has(c)) sesion.bibliotecaCocinas.delete(c);
          else sesion.bibliotecaCocinas.add(c);
          fCoc.setAttribute("aria-pressed", String(sesion.bibliotecaCocinas.has(c)));
          resetLimiteBiblioteca();
          actualizarResultadosBiblioteca();
          return;
        }
        const fPais = ev.target.closest("[data-accion='biblio-pais']");
        if (fPais) {
          const p = fPais.dataset.valor;
          if (sesion.bibliotecaPaises.has(p)) sesion.bibliotecaPaises.delete(p);
          else sesion.bibliotecaPaises.add(p);
          fPais.setAttribute("aria-pressed", String(sesion.bibliotecaPaises.has(p)));
          resetLimiteBiblioteca();
          actualizarResultadosBiblioteca();
          return;
        }
        const fEtq = ev.target.closest("[data-accion='biblio-etiqueta']");
        if (fEtq) {
          const e = fEtq.dataset.valor;
          if (sesion.bibliotecaEtiquetas.has(e)) sesion.bibliotecaEtiquetas.delete(e);
          else sesion.bibliotecaEtiquetas.add(e);
          fEtq.setAttribute("aria-pressed", String(sesion.bibliotecaEtiquetas.has(e)));
          resetLimiteBiblioteca();
          actualizarResultadosBiblioteca();
          return;
        }
      });

      // Input de búsqueda en Biblioteca (refresca sin perder foco).
      cont.addEventListener("input", (ev) => {
        if (ev.target.id === "biblio-buscar") {
          sesion.bibliotecaTexto = ev.target.value;
          resetLimiteBiblioteca();
          actualizarResultadosBiblioteca();
        }
      });

      // Cambios en checkbox de tic (click directo o teclado).
      cont.addEventListener("change", (ev) => {
        const li = ev.target.closest("li[data-tic-ing], li[data-tic-paso]");
        if (!li) return;

        if (li.dataset.ticIng != null) {
          const idx = Number(li.dataset.ticIng);
          ev.target.checked ? sesion.ticsIng.add(idx) : sesion.ticsIng.delete(idx);
          li.classList.toggle("tachado", ev.target.checked);
        } else {
          const idx = Number(li.dataset.ticPaso);
          ev.target.checked ? sesion.ticsPaso.add(idx) : sesion.ticsPaso.delete(idx);
          li.classList.toggle("tachado", ev.target.checked);
        }
      });

      // Selectores (orden + estado en detalle).
      cont.addEventListener("change", (ev) => {
        if (ev.target.id === "orden-biblioteca") {
          fijarOrden(ev.target.value);
          return;
        }
        if (ev.target.matches("[data-accion='estado']")) {
          const r = recetaPorId(sesion.recetaAbierta); if (!r) return;
          setEstado(perfilActivo, r.id, { estado: ev.target.value || null });
          return;
        }
      });

      // Campos de texto en detalle: persistir al perder foco.
      cont.addEventListener("blur", (ev) => {
        const r = recetaPorId(sesion.recetaAbierta);
        if (!r) return;
        const t = ev.target;
        if (t.dataset.accion === "notas") {
          setEstado(perfilActivo, r.id, { notasPersonales: t.value.trim() || null });
        } else if (t.dataset.accion === "ajustes") {
          setEstado(perfilActivo, r.id, { ajustes: t.value.trim() || null });
        } else if (t.dataset.accion === "colecciones") {
          const cols = t.value.split(",").map(s => slugify(s)).filter(Boolean);
          // Reflejar la version normalizada en el input.
          t.value = cols.join(", ");
          setEstado(perfilActivo, r.id, { colecciones: cols });
        }
      }, true);

      // ---- Buscar (delegacion) -------------------------------------------
      const contBuscar = document.getElementById("buscar-contenedor");

      contBuscar.addEventListener("click", (ev) => {
        const b = sesion.busqueda;

        // Abrir/fav desde tarjeta — comparte handler con biblioteca/inversa.
        const fav = ev.target.closest("[data-accion='fav']");
        if (fav) {
          ev.preventDefault(); ev.stopPropagation();
          toggleFavTarjeta(fav.dataset.id);
          return;
        }
        const abrir = ev.target.closest("[data-accion='abrir']");
        if (abrir) { abrirReceta(abrir.dataset.id); return; }

        // Filtros chips (multi).
        const fTipo = ev.target.closest("[data-accion='filtro-tipo']");
        if (fTipo) {
          const t = fTipo.dataset.valor;
          if (b.tipos.has(t)) b.tipos.delete(t); else b.tipos.add(t);
          fTipo.setAttribute("aria-pressed", String(b.tipos.has(t)));
          actualizarResultadosBuscar();
          return;
        }
        const fDieta = ev.target.closest("[data-accion='filtro-dieta']");
        if (fDieta) {
          const d = fDieta.dataset.valor;
          if (b.dietas.has(d)) b.dietas.delete(d); else b.dietas.add(d);
          fDieta.setAttribute("aria-pressed", String(b.dietas.has(d)));
          actualizarResultadosBuscar();
          return;
        }
        // Tiempo y dificultad: seleccion unica.
        const fTiempo = ev.target.closest("[data-accion='filtro-tiempo']");
        if (fTiempo) {
          b.tiempo = fTiempo.dataset.valor;
          contBuscar.querySelectorAll("[data-accion='filtro-tiempo']").forEach(c =>
            c.setAttribute("aria-pressed", String(c.dataset.valor === b.tiempo)));
          actualizarResultadosBuscar();
          return;
        }
        const fDif = ev.target.closest("[data-accion='filtro-dificultad']");
        if (fDif) {
          b.dificultad = fDif.dataset.valor || null;
          contBuscar.querySelectorAll("[data-accion='filtro-dificultad']").forEach(c =>
            c.setAttribute("aria-pressed", String((c.dataset.valor || "") === (b.dificultad || ""))));
          actualizarResultadosBuscar();
          return;
        }

        // Añadir ingrediente a incluir/excluir.
        const add = ev.target.closest("[data-accion='addref']");
        if (add) {
          const ref = add.dataset.ref;
          const grupo = add.dataset.grupo;
          if (grupo === "incluir") {
            b.incluir.add(ref); b.excluir.delete(ref);  // exclusion mutua
          } else {
            b.excluir.add(ref); b.incluir.delete(ref);
          }
          actualizarSeleccionadosBuscar("incluir");
          actualizarSeleccionadosBuscar("excluir");
          actualizarSugIngrediente("incluir");
          actualizarSugIngrediente("excluir");
          actualizarResultadosBuscar();
          return;
        }
        // Quitar.
        const qInc = ev.target.closest("[data-accion='quitar-incluir']");
        if (qInc) {
          b.incluir.delete(qInc.dataset.ref);
          actualizarSeleccionadosBuscar("incluir");
          actualizarSugIngrediente("incluir");
          actualizarResultadosBuscar();
          return;
        }
        const qExc = ev.target.closest("[data-accion='quitar-excluir']");
        if (qExc) {
          b.excluir.delete(qExc.dataset.ref);
          actualizarSeleccionadosBuscar("excluir");
          actualizarSugIngrediente("excluir");
          actualizarResultadosBuscar();
          return;
        }

        if (ev.target.closest("[data-accion='limpiar-filtros']")) {
          limpiarFiltrosBuscar();
          return;
        }
      });

      // Texto: input continuo. Solo actualiza resultados/sugerencias (NO re-render
      // completo: el input mantendria foco perdido si re-pintamos su contenedor).
      contBuscar.addEventListener("input", (ev) => {
        if (ev.target.id === "busc-texto") {
          sesion.busqueda.texto = ev.target.value;
          actualizarResultadosBuscar();
        } else if (ev.target.id === "busc-ing-inc") {
          sesion.busqueda.sugIncluir = ev.target.value;
          actualizarSugIngrediente("incluir");
        } else if (ev.target.id === "busc-ing-exc") {
          sesion.busqueda.sugExcluir = ev.target.value;
          actualizarSugIngrediente("excluir");
        }
      });

      // ---- Inversa (delegacion) ------------------------------------------
      const contInversa = document.getElementById("inversa-contenedor");

      contInversa.addEventListener("click", (ev) => {
        const fav = ev.target.closest("[data-accion='fav']");
        if (fav) {
          ev.preventDefault(); ev.stopPropagation();
          toggleFavTarjeta(fav.dataset.id);
          return;
        }
        const abrir = ev.target.closest("[data-accion='abrir']");
        if (abrir) { abrirReceta(abrir.dataset.id); return; }

        // Toggle disponible en nevera.
        const tog = ev.target.closest("[data-accion='toggle-disponible']");
        if (tog) {
          const ref = tog.dataset.ref;
          if (sesion.disponibles.has(ref)) sesion.disponibles.delete(ref);
          else sesion.disponibles.add(ref);
          guardarDisponibles();
          tog.setAttribute("aria-pressed", String(sesion.disponibles.has(ref)));
          actualizarResultadosInversa();
          return;
        }

        // Modo.
        if (ev.target.closest("[data-accion='modo-cobertura']")) { fijarInversaModo("cobertura"); return; }
        if (ev.target.closest("[data-accion='modo-casi']"))      { fijarInversaModo("casi");      return; }

        // Limpiar nevera.
        if (ev.target.closest("[data-accion='limpiar-nevera']")) {
          sesion.disponibles.clear();
          guardarDisponibles();
          contInversa.querySelectorAll("[data-accion='toggle-disponible']").forEach(b =>
            b.setAttribute("aria-pressed", "false"));
          actualizarResultadosInversa();
          return;
        }

        // Nuevo ingrediente desde Inversa: salta a Datos y abre el editor.
        if (ev.target.closest("[data-accion='nuevo-ing-inversa']")) {
          fijarVista("datos");
          sesion.datosTab = "ingredientes";
          abrirEditorIngrediente(null);
          return;
        }
      });

      // Buscador de la nevera: filtra in-place sin re-render (mantiene foco).
      contInversa.addEventListener("input", (ev) => {
        if (ev.target.id === "nevera-buscar") {
          sesion.neveraFiltro = ev.target.value;
          actualizarNeveraVisible();
        }
      });

      // ---- Compra (delegacion) -------------------------------------------
      const contCompra = document.getElementById("compra-contenedor");

      contCompra.addEventListener("click", (ev) => {
        // Añadir receta -> modal selector excluyendo las ya añadidas.
        if (ev.target.closest("[data-accion='anyadir-receta']")) {
          const excl = new Set(sesion.compra.items.map(x => x.id));
          abrirSelectorReceta({
            titulo: "Añadir receta a la compra",
            excluir: excl,
            onElegir: (id) => añadirRecetaCompra(id)
          });
          return;
        }

        // Acciones por chip de receta.
        const chipRec = ev.target.closest(".compra-receta");
        if (chipRec) {
          const id = chipRec.dataset.id;
          if (ev.target.closest("[data-accion='rac-menos']")) { cambiarRacionesCompra(id, -1); return; }
          if (ev.target.closest("[data-accion='rac-mas']"))   { cambiarRacionesCompra(id, +1); return; }
          if (ev.target.closest("[data-accion='quitar-receta']")) { quitarRecetaCompra(id); return; }
        }

        // Tic item lista.
        const liC = ev.target.closest("li[data-clave-compra]");
        if (liC) {
          if (ev.target.tagName === "INPUT") return; // gestionado en change
          const k = liC.dataset.claveCompra;
          const marcar = !sesion.compra.tics.has(k);
          if (marcar) sesion.compra.tics.add(k); else sesion.compra.tics.delete(k);
          const cb = liC.querySelector("input[type=checkbox]");
          if (cb) cb.checked = marcar;
          liC.classList.toggle("tachado", marcar);
          guardarCompra();
          const info = contCompra.querySelector(".compra-resumen-acciones .info b:nth-of-type(2)");
          if (info) info.textContent = String(sesion.compra.tics.size);
          return;
        }

        // Restaurar tics.
        if (ev.target.closest("[data-accion='restaurar-compra']")) {
          sesion.compra.tics.clear();
          guardarCompra();
          contCompra.querySelectorAll(".lista-compra li").forEach(li => {
            li.classList.remove("tachado");
            const cb = li.querySelector("input[type=checkbox]");
            if (cb) cb.checked = false;
          });
          const info = contCompra.querySelector(".compra-resumen-acciones .info b:nth-of-type(2)");
          if (info) info.textContent = "0";
          return;
        }

        // Vaciar lista entera.
        if (ev.target.closest("[data-accion='vaciar-compra']")) {
          sesion.compra.items = [];
          sesion.compra.tics.clear();
          guardarCompra();
          renderCompra();
          return;
        }
      });

      // Change para checkboxes de la lista (teclado/asistivos) + toggle "ocultar".
      contCompra.addEventListener("change", (ev) => {
        if (ev.target.id === "cp-ocultar") {
          sesion.compra.ocultarDisponibles = ev.target.checked;
          guardarCompra();
          renderCompra();
          return;
        }
        const li = ev.target.closest("li[data-clave-compra]");
        if (li && ev.target.matches("input[type=checkbox]")) {
          const k = li.dataset.claveCompra;
          if (ev.target.checked) sesion.compra.tics.add(k);
          else sesion.compra.tics.delete(k);
          li.classList.toggle("tachado", ev.target.checked);
          guardarCompra();
        }
      });

      // ---- Planificador (delegacion) -------------------------------------
      const contPlan = document.getElementById("planificador-contenedor");

      contPlan.addEventListener("click", (ev) => {
        const vistaBtn = ev.target.closest("[data-accion='plan-vista']");
        if (vistaBtn) {
          sesion.planificadorVista = vistaBtn.dataset.valor;
          renderPlan(); return;
        }
        if (ev.target.closest("[data-accion='mes-anterior']")) {
          sesion.planificadorMes = mesAnteriorISO(sesion.planificadorMes);
          renderPlan(); return;
        }
        if (ev.target.closest("[data-accion='mes-siguiente']")) {
          sesion.planificadorMes = mesSiguienteISO(sesion.planificadorMes);
          renderPlan(); return;
        }
        if (ev.target.closest("[data-accion='ir-hoy']")) {
          sesion.planificadorMes = mesActualISO();
          renderPlan(); return;
        }
        if (ev.target.closest("[data-accion='limpiar-mes']")) {
          limpiarMesVisible(); return;
        }
        if (ev.target.closest("[data-accion='generar-lista-semana']")) {
          generarListaSemana(); return;
        }
        if (ev.target.closest("[data-accion='generar-lista-mes']")) {
          generarListaMes(); return;
        }
        // Navegación de la vista semanal
        if (ev.target.closest("[data-accion='semana-anterior']")) {
          sesion.planificadorSemana = semanaAnteriorISO(sesion.planificadorSemana || lunesDeSemana(hoyISO()));
          renderPlan(); return;
        }
        if (ev.target.closest("[data-accion='semana-siguiente']")) {
          sesion.planificadorSemana = semanaSiguienteISO(sesion.planificadorSemana || lunesDeSemana(hoyISO()));
          renderPlan(); return;
        }
        if (ev.target.closest("[data-accion='ir-hoy-semana']")) {
          sesion.planificadorSemana = lunesDeSemana(hoyISO());
          renderPlan(); return;
        }
        if (ev.target.closest("[data-accion='limpiar-semana-visible']")) {
          const fechas = fechasDeSemana(sesion.planificadorSemana);
          fechas.forEach(f => delete sesion.planificador.mes[f]);
          guardarPlan(); renderPlan(); return;
        }
        if (ev.target.closest("[data-accion='generar-lista-semana-visible']")) {
          generarListaPorFechas(fechasDeSemana(sesion.planificadorSemana));
          return;
        }
        // Slot de la vista semanal (idéntico tratamiento que el del calendario)
        const slotSem = ev.target.closest(".psem-slot");
        if (slotSem) {
          const fecha = slotSem.dataset.fecha;
          const c     = slotSem.dataset.comida;
          const dia   = diaDelMes(fecha);
          const idActual = dia[c];
          const [y, m, d] = fecha.split("-").map(Number);
          const wd = new Date(y, m-1, d).getDay();
          const nombreSem = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"][wd];
          abrirSelectorReceta({
            titulo: `${nombreSem} ${d} · ${ETIQUETA_COMIDA[c]}`,
            excluir: new Set(),
            mostrarQuitar: !!idActual,
            onElegir: (id) => asignarSlot(fecha, c, id)
          });
          return;
        }
        const slot = ev.target.closest(".plan-mini-slot");
        if (slot) {
          const fecha = slot.dataset.fecha;
          const c     = slot.dataset.comida;
          const dia   = diaDelMes(fecha);
          const idActual = dia[c];
          // Día como "viernes 5 de junio"
          const [y, m, d] = fecha.split("-").map(Number);
          const wd = new Date(y, m-1, d).getDay();
          const nombreSem = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"][wd];
          abrirSelectorReceta({
            titulo: `${nombreSem} ${d} · ${ETIQUETA_COMIDA[c]}`,
            excluir: new Set(),
            mostrarQuitar: !!idActual,
            onElegir: (id) => asignarSlot(fecha, c, id)
          });
          return;
        }
      });

      // ---- Conversores (delegacion) --------------------------------------
      const contConv = document.getElementById("conversores-contenedor");
      contConv.addEventListener("change", (ev) => {
        const id = ev.target.id;
        const v = ev.target.value;
        if (id === "cv-masa-ref")    { sesion.conv.masa.ref    = v || null; renderConversores(); return; }
        if (id === "cv-masa-desde")  { sesion.conv.masa.desde  = v;         renderConversores(); return; }
        if (id === "cv-vol-desde")   { sesion.conv.vol.desde   = v;         renderConversores(); return; }
        if (id === "cv-horno-unidad"){ sesion.conv.horno.unidad= v;         renderConversores(); return; }
      });
      contConv.addEventListener("input", (ev) => {
        const id = ev.target.id;
        const n  = ev.target.value === "" ? NaN : Number(ev.target.value);
        if (id === "cv-masa-cant") { sesion.conv.masa.cantidad = n; renderConversores(); return; }
        if (id === "cv-vol-cant")  { sesion.conv.vol.cantidad  = n; renderConversores(); return; }
        if (id === "cv-horno-val") { sesion.conv.horno.valor   = n; renderConversores(); return; }
      });

      // ---- Datos (delegacion) --------------------------------------------
      const contDatos = document.getElementById("datos-contenedor");

      // Tabs internas + acciones globales.
      contDatos.addEventListener("click", (ev) => {
        const tab = ev.target.closest("[data-accion='datos-tab']");
        if (tab) { sesion.datosTab = tab.dataset.valor; renderDatos(); return; }

        // -- Lista recetas
        if (ev.target.closest("[data-accion='nueva-receta']"))    { abrirEditorReceta(null); return; }
        const edR = ev.target.closest("[data-accion='editar-receta']");
        if (edR) { abrirEditorReceta(edR.dataset.id); return; }
        const dupR = ev.target.closest("[data-accion='duplicar-receta']");
        if (dupR) {
          const r = recetaPorId(dupR.dataset.id); if (!r) return;
          const copia = clonarReceta(r);
          copia.id = slugify(copia.nombre + " copia");
          // Asegurar unicidad.
          let i = 2;
          while (estado.recetas.some(x => x.id === copia.id)) {
            copia.id = slugify(r.nombre + " copia " + i++);
          }
          copia.nombre = r.nombre + " (copia)";
          copia.creado = nowISO();
          copia.modificado = nowISO();
          sesion.editor.receta = copia;
          sesion.editor.modo = "receta";
          sesion.editor.errores = [];
          renderDatos();
          return;
        }
        const borR = ev.target.closest("[data-accion='borrar-receta']");
        if (borR) { borrarReceta(borR.dataset.id); return; }

        // -- Lista ingredientes
        if (ev.target.closest("[data-accion='nuevo-ingrediente']")) { abrirEditorIngrediente(null); return; }
        const edI = ev.target.closest("[data-accion='editar-ing']");
        if (edI) { abrirEditorIngrediente(edI.dataset.clave); return; }
        const borI = ev.target.closest("[data-accion='borrar-ing-cat']");
        if (borI) { borrarIngrediente(borI.dataset.clave); return; }

        // -- Editor: cancelar/guardar
        if (ev.target.closest("[data-accion='cancelar-editor']")) { cerrarEditor(); return; }
        if (ev.target.closest("[data-accion='guardar-receta']")) { guardarRecetaDesdeEditor(); return; }
        if (ev.target.closest("[data-accion='guardar-ingrediente']")) { guardarIngredienteDesdeEditor(); return; }

        // -- Editor receta: ingredientes/pasos
        const r = sesion.editor.receta;
        if (sesion.editor.modo === "receta" && r) {
          if (ev.target.closest("[data-accion='anyadir-ing']")) {
            r.ingredientes.push(ingredienteFilaVacia());
            renderDatos(); return;
          }
          if (ev.target.closest("[data-accion='anyadir-paso']")) {
            r.pasos.push(pasoVacio(r.pasos.length + 1));
            renderDatos(); return;
          }
          const borIng = ev.target.closest("[data-accion='borrar-ing']");
          if (borIng) { r.ingredientes.splice(Number(borIng.dataset.idx), 1); renderDatos(); return; }
          const borP = ev.target.closest("[data-accion='borrar-paso']");
          if (borP) {
            r.pasos.splice(Number(borP.dataset.idx), 1);
            r.pasos = r.pasos.map((p, i) => ({ ...p, n: i + 1 }));
            renderDatos(); return;
          }
          const up = ev.target.closest("[data-accion='paso-up']");
          if (up) {
            const i = Number(up.dataset.idx);
            if (i > 0) {
              [r.pasos[i-1], r.pasos[i]] = [r.pasos[i], r.pasos[i-1]];
              r.pasos = r.pasos.map((p, k) => ({ ...p, n: k + 1 }));
              renderDatos();
            }
            return;
          }
          const down = ev.target.closest("[data-accion='paso-down']");
          if (down) {
            const i = Number(down.dataset.idx);
            if (i < r.pasos.length - 1) {
              [r.pasos[i+1], r.pasos[i]] = [r.pasos[i], r.pasos[i+1]];
              r.pasos = r.pasos.map((p, k) => ({ ...p, n: k + 1 }));
              renderDatos();
            }
            return;
          }
        }

        // -- Import / Export
        if (ev.target.closest("[data-accion='export-todo']"))     {
          descargarTexto(serializarLimpio("todo"),     `recetas-todo-${hoyISO()}.json`); return;
        }
        if (ev.target.closest("[data-accion='export-modelo']"))   {
          descargarTexto(serializarLimpio("modelo"),   `recetas-modelo-${hoyISO()}.json`); return;
        }
        if (ev.target.closest("[data-accion='export-usuarios']")) {
          descargarTexto(serializarLimpio("usuarios"), `recetas-usuarios-${hoyISO()}.json`); return;
        }
        if (ev.target.closest("[data-accion='importar']")) {
          document.getElementById("iox-archivo").click();
          return;
        }
        if (ev.target.closest("[data-accion='importar-pegado']")) {
          const ta = document.getElementById("iox-textarea");
          if (!ta) return;
          const txt = (ta.value || "").trim();
          if (!txt) {
            sesion.editor.incidencias = ["El campo está vacío. Pega tu JSON primero."];
            sesion.datosTab = "iox";
            renderDatos();
            return;
          }
          let obj;
          try { obj = JSON.parse(txt); }
          catch (e) {
            sesion.editor.incidencias = [`JSON no válido: ${e.message}`];
            sesion.datosTab = "iox";
            renderDatos();
            return;
          }
          const { incidencias, aplicados } = importarObjeto(obj);
          const resumen = `Aplicados: ${aplicados.ingredientes} ingredientes, ${aplicados.recetas} recetas, ${aplicados.perfiles} perfiles.`;
          sesion.editor.incidencias = [resumen, ...incidencias];
          sesion.datosTab = "iox";
          renderTodo();
          programarAutoSync();
          return;
        }
        if (ev.target.closest("[data-accion='limpiar-pegado']")) {
          const ta = document.getElementById("iox-textarea");
          if (ta) ta.value = "";
          return;
        }
        if (ev.target.closest("[data-accion='crear-huerfanos']")) {
          const n = crearIngredientesHuerfanos();
          sesion.editor.incidencias = [`✓ ${n} ingredientes añadidos al catálogo con categoría "otros". Edítalos en la pestaña Ingredientes para completar densidad, gramos/unidad y categoría real.`];
          sesion.datosTab = "iox";
          renderDatos();
          return;
        }
        if (ev.target.closest("[data-accion='descartar-huerfanos']")) {
          sesion.refsHuerfanas = [];
          renderDatos();
          return;
        }
        if (ev.target.closest("[data-accion='copiar-plantilla']")) {
          const btn = ev.target.closest("[data-accion='copiar-plantilla']");
          const txtOriginal = btn.textContent;
          const escribir = (txt) => {
            // Mostrar feedback en el botón
            btn.textContent = "✓ Copiado";
            btn.disabled = true;
            setTimeout(() => {
              btn.textContent = txtOriginal;
              btn.disabled = false;
            }, 1500);
          };
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(PLANTILLA_IMPORTAR_JSON).then(escribir).catch(() => {
              // Fallback: selección manual
              const pre = document.getElementById("plantilla-json");
              const range = document.createRange();
              range.selectNodeContents(pre);
              const sel = window.getSelection();
              sel.removeAllRanges();
              sel.addRange(range);
            });
          } else {
            // Navegador antiguo: seleccionar texto
            const pre = document.getElementById("plantilla-json");
            const range = document.createRange();
            range.selectNodeContents(pre);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
          }
          return;
        }
        // -- Sincronización con Supabase ------------------------------------
        if (ev.target.closest("[data-accion='sync-login']")) {
          const em = (document.getElementById("sync-email") || {}).value || "";
          const pw = (document.getElementById("sync-pass")  || {}).value || "";
          const msg = document.getElementById("sync-msg");
          if (!em || !em.includes("@")) {
            if (msg) msg.innerHTML = '<span style="color:var(--danger);">Introduce un email válido.</span>';
            return;
          }
          if (!pw) {
            if (msg) msg.innerHTML = '<span style="color:var(--danger);">Introduce la contraseña.</span>';
            return;
          }
          if (msg) msg.textContent = "Iniciando sesión…";
          iniciarSesionPassword(em, pw).then(() => {
            renderDatos();
            // Primer sync automático tras login
            sincronizar().catch(() => {});
          }).catch(e => {
            if (msg) msg.innerHTML = `<span style="color:var(--danger);">${esc(e.message)}</span>`;
          });
          return;
        }
        if (ev.target.closest("[data-accion='sync-magic']")) {
          const em = (document.getElementById("sync-email") || {}).value || "";
          const msg = document.getElementById("sync-msg");
          if (!em || !em.includes("@")) {
            if (msg) msg.innerHTML = '<span style="color:var(--danger);">Introduce un email válido.</span>';
            return;
          }
          if (msg) msg.textContent = "Enviando enlace…";
          enviarMagicLink(em).then(() => {
            if (msg) msg.innerHTML = `Te hemos enviado un email a <b>${esc(em)}</b>. Pulsa el enlace y volverás logueado.`;
          }).catch(e => {
            if (msg) msg.innerHTML = `<span style="color:var(--danger);">${esc(e.message)}</span>`;
          });
          return;
        }
        if (ev.target.closest("[data-accion='sync-ahora']")) {
          const msg = document.getElementById("sync-msg");
          if (msg) msg.textContent = "Sincronizando…";
          sincronizar().then(r => {
            const partes = [`${r.aplicados} aplicados`, `${r.subidos} subidos`];
            if (r.borradosLocal) partes.push(`${r.borradosLocal} borrados`);
            if (msg) msg.innerHTML = `OK · ${partes.join(", ")}.`;
          }).catch(e => {
            if (msg) msg.innerHTML = `<span style="color:var(--danger);">${esc(e.message)}</span>`;
          });
          return;
        }
        if (ev.target.closest("[data-accion='sync-cerrar']")) {
          cerrarSesionSupabase().then(() => renderDatos());
          return;
        }
        if (ev.target.closest("[data-accion='sync-guardar-cfg']")) {
          const url = (document.getElementById("sup-url") || {}).value || "";
          const key = (document.getElementById("sup-key") || {}).value || "";
          sesion.supabase.url = url.trim().replace(/\/$/, "");
          sesion.supabase.anonKey = key.trim();
          guardarSupabase();
          renderDatos();
          return;
        }
        if (ev.target.closest("[data-accion='sync-reset-cfg']")) {
          sesion.supabase.url = SUPABASE_URL_DEFAULT;
          sesion.supabase.anonKey = SUPABASE_ANON_DEFAULT;
          guardarSupabase();
          renderDatos();
          return;
        }
        if (ev.target.closest("[data-accion='toggle-modo-dev']")) {
          alternarModoDev();
          return;
        }
        if (ev.target.closest("[data-accion='forzar-recarga']")) {
          forzarReinstalacion();
          return;
        }

        if (ev.target.closest("[data-accion='reset-datos']")) {
          if (!confirm("Esto borra TODO y vuelve a los datos seed. ¿Seguro?")) return;
          estado = estructuraInicial();
          guardarEstado();
          sesion.compra.items = []; sesion.compra.tics.clear(); guardarCompra();
          sesion.planificador.mes = {}; sesion.planificadorMes = mesActualISO(); guardarPlan();
          sesion.disponibles.clear(); guardarDisponibles();
          sesion.editor.incidencias = [];
          cerrarEditor();
          renderTodo();
          return;
        }
      });

      // Cambios en inputs del editor: sincronizar con el modelo en memoria.
      contDatos.addEventListener("input", (ev) => {
        const t = ev.target;
        const cmp = t.dataset.cmp;
        if (!cmp) return;
        const r = sesion.editor.receta;
        const ing = sesion.editor.ingrediente;
        const fila = t.closest("[data-tipo-fila]");

        // Cabecera receta
        if (r && sesion.editor.modo === "receta") {
          if (cmp === "r-id")        { r.id = t.value.trim(); return; }
          if (cmp === "r-nombre")    { r.nombre = t.value; return; }
          if (cmp === "r-cocina")    { r.cocina = t.value.trim() || null; return; }
          if (cmp === "r-pais")      { r.pais = t.value.trim() || null; return; }
          if (cmp === "r-fuente")    { r.fuente = t.value.trim() || null; return; }
          if (cmp === "r-notas")     { r.notas = t.value.trim() || null; return; }
          if (cmp === "r-raciones")  { r.racionesBase = Math.max(1, Number(t.value) || 1); return; }
          if (cmp === "r-prep")      { r.tiempoPrep = Math.max(0, Number(t.value) || 0); return; }
          if (cmp === "r-cocc")      { r.tiempoCoccion = Math.max(0, Number(t.value) || 0); return; }
          if (cmp === "r-tags")      { r.tags = t.value.split(",").map(s => s.trim()).filter(Boolean); return; }

          if (fila && fila.dataset.tipoFila === "ing") {
            const idx = Number(fila.dataset.idx);
            const o = r.ingredientes[idx]; if (!o) return;
            if (cmp === "ing-nombre") { o.nombre = t.value; return; }
            if (cmp === "ing-cant")   { o.cantidad = t.value === "" ? null : Number(t.value); return; }
            if (cmp === "ing-max")    { o.cantidadMax = t.value === "" ? null : Number(t.value); return; }
            if (cmp === "ing-grupo")  { o.grupo = t.value.trim() || null; return; }
            if (cmp === "ing-nota")   { o.nota  = t.value.trim() || null; return; }
          }
          if (fila && fila.dataset.tipoFila === "paso") {
            const idx = Number(fila.dataset.idx);
            const p = r.pasos[idx]; if (!p) return;
            if (cmp === "p-titulo") { p.titulo = t.value.trim() || null; return; }
            if (cmp === "p-texto")  { p.texto  = t.value; return; }
            if (cmp === "p-tiempo") { p.tiempo = t.value === "" ? null : Number(t.value); return; }
            if (cmp === "p-temp")   { p.temperatura = t.value === "" ? null : Number(t.value); return; }
            if (cmp === "p-usa")    { p.usa = t.value.split(",").map(s => slugify(s.trim())).filter(Boolean); return; }
          }
        }
        // Editor ingrediente
        if (ing && sesion.editor.modo === "ingrediente") {
          if (cmp === "i-clave")    { ing.clave = t.value.trim(); return; }
          if (cmp === "i-nombre")   { ing.nombre = t.value; return; }
          if (cmp === "i-densidad") { ing.densidad = t.value === "" ? null : Number(t.value); return; }
          if (cmp === "i-gxu")      { ing.gramosPorUnidad = t.value === "" ? null : Number(t.value); return; }
          if (cmp === "i-alias")    { ing.alias = t.value.split(",").map(s => s.trim()).filter(Boolean); return; }
        }
      });
      // Toggle de auto-sync (en tab Sincronización)
      contDatos.addEventListener("change", (ev) => {
        if (ev.target.id === "sync-auto") {
          sesion.supabase.autoSync = ev.target.checked;
          guardarSupabase();
          return;
        }
      });
      // Cambios en selects/checkboxes del editor.
      contDatos.addEventListener("change", (ev) => {
        const t = ev.target;
        const cmp = t.dataset.cmp;
        if (!cmp) return;
        const r = sesion.editor.receta;
        const ing = sesion.editor.ingrediente;
        const fila = t.closest("[data-tipo-fila]");

        if (r && sesion.editor.modo === "receta") {
          if (cmp === "r-tipo")       { r.tipo = t.value; return; }
          if (cmp === "r-dificultad") { r.dificultad = t.value; return; }
          if (cmp === "dieta") {
            const d = t.value;
            if (t.checked) { if (!r.dieta.includes(d)) r.dieta.push(d); }
            else { r.dieta = r.dieta.filter(x => x !== d); }
            return;
          }
          if (cmp === "etiqueta") {
            const e = t.value;
            if (!Array.isArray(r.etiquetas)) r.etiquetas = [];
            if (t.checked) { if (!r.etiquetas.includes(e)) r.etiquetas.push(e); }
            else { r.etiquetas = r.etiquetas.filter(x => x !== e); }
            return;
          }
          if (fila && fila.dataset.tipoFila === "ing") {
            const idx = Number(fila.dataset.idx);
            const o = r.ingredientes[idx]; if (!o) return;
            if (cmp === "ing-ref")    {
              o.ref = t.value || null;
              if (o.ref && !o.nombre) {
                const cat = estado.ingredientes.find(x => x.clave === o.ref);
                if (cat) {
                  o.nombre = cat.nombre;
                  // Refrescar el input nombre en vivo.
                  const inp = fila.querySelector("[data-cmp='ing-nombre']");
                  if (inp) inp.value = cat.nombre;
                }
              }
              return;
            }
            if (cmp === "ing-unidad") { o.unidad = t.value || null; return; }
            if (cmp === "ing-opc")    { o.opcional = t.checked; return; }
          }
        }
        if (ing && sesion.editor.modo === "ingrediente") {
          if (cmp === "i-cat") { ing.categoriaCompra = t.value; return; }
        }
      });

      // ---- Import: lectura del archivo elegido ---------------------------
      document.getElementById("iox-archivo").addEventListener("change", (ev) => {
        const file = ev.target.files && ev.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          let obj;
          try { obj = JSON.parse(reader.result); }
          catch (e) {
            sesion.editor.incidencias = [`Archivo no es JSON válido: ${e.message}`];
            sesion.datosTab = "iox";
            renderDatos();
            return;
          }
          const { incidencias, aplicados } = importarObjeto(obj);
          const resumen = `Aplicados: ${aplicados.ingredientes} ingredientes, ${aplicados.recetas} recetas, ${aplicados.perfiles} perfiles.`;
          sesion.editor.incidencias = [resumen, ...incidencias];
          sesion.datosTab = "iox";
          renderTodo();
        };
        reader.readAsText(file);
        // Reset input para poder reimportar el mismo archivo si se quiere.
        ev.target.value = "";
      });

      // ---- Modal selector (delegacion) -----------------------------------
      const modalSel = document.getElementById("modal-selector");
      modalSel.addEventListener("click", (ev) => {
        if (ev.target === modalSel) { cerrarModalSelector(); return; }
        if (ev.target.closest("[data-accion='cerrar-modal']")) { cerrarModalSelector(); return; }
        if (ev.target.closest("[data-accion='sel-quitar']")) {
          const cb = _selectorCfg && _selectorCfg.onElegir;
          cerrarModalSelector();
          if (cb) cb(null);
          return;
        }
        const btn = ev.target.closest("button[data-id]");
        if (btn) {
          const cb = _selectorCfg && _selectorCfg.onElegir;
          const id = btn.dataset.id;
          cerrarModalSelector();
          if (cb) cb(id);
          return;
        }
      });
      modalSel.addEventListener("input", (ev) => {
        if (ev.target.id === "sel-buscar") actualizarListaSelector(ev.target.value);
      });

      // ---- Modo cocina (delegacion) --------------------------------------
      const ovCocina = document.getElementById("modo-cocina");
      ovCocina.addEventListener("click", (ev) => {
        if (ev.target.closest("[data-accion='cerrar-cocina']"))       { cerrarCocina();         return; }
        if (ev.target.closest("[data-accion='paso-anterior']"))       { pasoAnterior();         return; }
        if (ev.target.closest("[data-accion='paso-siguiente']"))      { pasoSiguiente();        return; }
        if (ev.target.closest("[data-accion='iniciar-timer-paso']"))  { iniciarTimerDesdePaso();return; }

        // Tic en ingrediente desde la página de Ingredientes del modo cocina.
        const liIng = ev.target.closest("li[data-tic-ing-cocina]");
        if (liIng) {
          if (ev.target.tagName === "INPUT") return; // gestionado en change
          const idx = Number(liIng.dataset.ticIngCocina);
          const marcar = !sesion.ticsIng.has(idx);
          if (marcar) sesion.ticsIng.add(idx); else sesion.ticsIng.delete(idx);
          const cb = liIng.querySelector("input[type=checkbox]");
          if (cb) cb.checked = marcar;
          liIng.classList.toggle("tachado", marcar);
          return;
        }
      });
      // Cambio directo del checkbox (teclado/asistivos).
      ovCocina.addEventListener("change", (ev) => {
        const li = ev.target.closest("li[data-tic-ing-cocina]");
        if (li && ev.target.matches("input[type=checkbox]")) {
          const idx = Number(li.dataset.ticIngCocina);
          if (ev.target.checked) sesion.ticsIng.add(idx);
          else sesion.ticsIng.delete(idx);
          li.classList.toggle("tachado", ev.target.checked);
        }
      });

      // Tap en mitades de la pantalla (móvil): izq → anterior, dcha → siguiente.
      // Se activa solo si el target NO es un control interactivo (botón, input, label, link).
      ovCocina.addEventListener("click", (ev) => {
        if (window.innerWidth > 720) return;
        if (ev.target.closest("button, input, label, a, [role='button'], .mc-paso-ings")) return;
        const x = ev.clientX;
        const ancho = window.innerWidth;
        if (x > ancho / 2) pasoSiguiente();
        else pasoAnterior();
      });

      // Swipe horizontal en modo cocina (móvil): cambiar de paso.
      let _swipeX = null, _swipeY = null;
      ovCocina.addEventListener("touchstart", (ev) => {
        if (ev.touches.length !== 1) { _swipeX = null; return; }
        _swipeX = ev.touches[0].clientX;
        _swipeY = ev.touches[0].clientY;
      }, { passive: true });
      ovCocina.addEventListener("touchend", (ev) => {
        if (_swipeX === null) return;
        const t = ev.changedTouches[0];
        const dx = t.clientX - _swipeX;
        const dy = t.clientY - _swipeY;
        _swipeX = _swipeY = null;
        // Solo procesar si es horizontal claro (no scroll vertical).
        if (Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy) * 1.6) {
          if (dx > 0) pasoAnterior(); else pasoSiguiente();
        }
      }, { passive: true });

      // ---- Panel de temporizadores (delegacion) --------------------------
      const panelTimers = document.getElementById("panel-timers");
      panelTimers.addEventListener("click", (ev) => {
        const card = ev.target.closest("[data-timer-id]");
        if (!card) return;
        const id = card.dataset.timerId;
        if (ev.target.closest("[data-accion='pausar-timer']"))   { pausarTimer(id);  return; }
        if (ev.target.closest("[data-accion='reanudar-timer']")) { reanudarTimer(id); return; }
        if (ev.target.closest("[data-accion='eliminar-timer']")) { eliminarTimer(id); return; }
      });

      // ---- FAB nuevo temporizador ----------------------------------------
      document.getElementById("fab-timer").addEventListener("click", abrirModalNuevoTimer);

      // ---- Modal nuevo temporizador --------------------------------------
      const modalNT = document.getElementById("modal-nuevo-timer");
      modalNT.addEventListener("click", (ev) => {
        if (ev.target === modalNT) { cerrarModalNuevoTimer(); return; }      // click en overlay
        if (ev.target.closest("[data-accion='cerrar-modal']"))      { cerrarModalNuevoTimer(); return; }
        if (ev.target.closest("[data-accion='crear-timer-manual']")) { crearTimerManual();     return; }
      });
      // Enter en el modal -> Iniciar
      modalNT.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter" && (ev.target.id === "nt-et" || ev.target.id === "nt-min" || ev.target.id === "nt-sec")) {
          ev.preventDefault();
          crearTimerManual();
        }
      });

      // ---- Teclado global: modo cocina y modales -------------------------
      document.addEventListener("keydown", (ev) => {
        // Modal de nuevo temporizador.
        if (!modalNT.hidden) {
          if (ev.key === "Escape") { ev.preventDefault(); cerrarModalNuevoTimer(); }
          return;
        }
        // Modal selector de receta.
        if (!modalSel.hidden) {
          if (ev.key === "Escape") { ev.preventDefault(); cerrarModalSelector(); }
          return;
        }
        if (!sesion.modoCocina.activo) return;
        // Si el foco esta en un input/textarea, no robamos teclas.
        const enInput = /^(input|textarea|select)$/i.test(ev.target.tagName);
        if (enInput) return;
        if (ev.key === "ArrowLeft")  { ev.preventDefault(); pasoAnterior(); }
        else if (ev.key === "ArrowRight") { ev.preventDefault(); pasoSiguiente(); }
        else if (ev.key === "Escape")     { ev.preventDefault(); cerrarCocina(); }
        else if (ev.key === " ")          { ev.preventDefault(); iniciarTimerDesdePaso(); }
      });

      // ---- Visibilidad: re-pedir wake lock al volver al modo cocina ------
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          if (sesion.modoCocina.activo) pedirWakeLock();
          // T1: al volver, el siguiente tick recalcula desde finMs - Date.now();
          //     forzamos un tick inmediato para no esperar 250 ms.
          if (sesion.timers.length) tickTimers();
        }
      });

      renderTodo();

      // Hash routing: navegar entre cambios de hash sin recargar
      window.addEventListener("hashchange", aplicarHash);

      // Procesar callback de magic link (#access_token=... en la URL)
      procesarCallbackAuth().then(ok => {
        if (ok) {
          fijarPerfil(perfilDesdeEmail(sesion.supabase.email));
          ocultarGate();
          renderTodo();
          aplicarHash();              // navegar a #/receta/... si lo había
          sincronizar().catch(() => {});
        } else if (gateNecesario()) {
          mostrarGate();
        } else {
          // Ya autenticado: asegurar perfil correcto según email
          const p = perfilDesdeEmail(sesion.supabase.email);
          if (p !== perfilActivo) fijarPerfil(p);
          aplicarHash();              // abrir receta del hash si la URL la tiene
          // Sync silencioso de fondo al cargar
          sincronizar().catch(() => {});
        }
      });

      // Wiring del formulario del gate
      const gateForm = document.getElementById("gate-form");
      gateForm.addEventListener("submit", (ev) => {
        ev.preventDefault();
        const em  = (document.getElementById("gate-email") || {}).value || "";
        const pw  = (document.getElementById("gate-pass")  || {}).value || "";
        const msg = document.getElementById("gate-msg");
        if (!em || !em.includes("@")) {
          if (msg) msg.innerHTML = '<span style="color:var(--danger);">Introduce un email válido.</span>';
          return;
        }
        if (!pw) {
          if (msg) msg.innerHTML = '<span style="color:var(--danger);">Introduce la contraseña.</span>';
          return;
        }
        if (msg) msg.textContent = "Iniciando sesión…";
        iniciarSesionPassword(em, pw).then(() => {
          fijarPerfil(perfilDesdeEmail(em));
          ocultarGate();
          renderTodo();
          sincronizar().catch(() => {});
        }).catch(e => {
          if (msg) msg.innerHTML = `<span style="color:var(--danger);">${esc(e.message)}</span>`;
        });
      });
      gateForm.addEventListener("click", (ev) => {
        if (ev.target.closest("[data-accion='gate-magic']")) {
          const em  = (document.getElementById("gate-email") || {}).value || "";
          const msg = document.getElementById("gate-msg");
          if (!em || !em.includes("@")) {
            if (msg) msg.innerHTML = '<span style="color:var(--danger);">Introduce tu email arriba.</span>';
            return;
          }
          if (msg) msg.textContent = "Enviando enlace…";
          enviarMagicLink(em).then(() => {
            if (msg) msg.innerHTML = `Te hemos enviado un email a <b>${esc(em)}</b>. Pulsa el enlace y volverás logueado.`;
          }).catch(e => {
            if (msg) msg.innerHTML = `<span style="color:var(--danger);">${esc(e.message)}</span>`;
          });
        }
      });

      // Exponer api minima para consola/depuracion (no para el producto).
      window.__recetas = {
        get estado() { return estado; },
        get perfil() { return perfilActivo; },
        get sesion() { return sesion; },
        slugify, normaliza, nowISO, hoyISO,
        getEstado, setEstado,
        formateaCantidad, formateaMin, tiempoTotalMin
      };
    }

    function toggleTicIng(idx, li) {
      const cb = li.querySelector("input[type=checkbox]");
      const marcar = !sesion.ticsIng.has(idx);
      if (marcar) sesion.ticsIng.add(idx); else sesion.ticsIng.delete(idx);
      if (cb) cb.checked = marcar;
      li.classList.toggle("tachado", marcar);
    }

    function toggleTicPaso(idx, li) {
      const cb = li.querySelector("input[type=checkbox]");
      const marcar = !sesion.ticsPaso.has(idx);
      if (marcar) sesion.ticsPaso.add(idx); else sesion.ticsPaso.delete(idx);
      if (cb) cb.checked = marcar;
      li.classList.toggle("tachado", marcar);
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }

    /* ---- Service Worker (PWA, offline) --------------------------------
       Estrategia: el SW usa network-first para HTML, así que normalmente
       recibes la versión nueva al recargar. Si la red falla, sirve la cacheada.
       Aviso al usuario cuando hay versión nueva instalada en background. */
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").then((reg) => {
          // Detectar nueva versión instalada en background
          reg.addEventListener("updatefound", () => {
            const sw = reg.installing;
            if (!sw) return;
            sw.addEventListener("statechange", () => {
              if (sw.state === "installed" && navigator.serviceWorker.controller) {
                mostrarBannerActualizacion();
              }
            });
          });
        }).catch(() => {/* silencio */});

        // Cuando el SW nuevo toma control, recargar para usarlo.
        let recargado = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (recargado) return;
          recargado = true;
          window.location.reload();
        });
      });
    }
    /** Limpia service workers + caches y recarga con bypass de caché. */
    async function forzarReinstalacion() {
      if (!confirm("Esto cerrará la app, limpiará la caché y la abrirá de nuevo. ¿Continuar?")) return;
      try {
        if ("serviceWorker" in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }
        if ("caches" in window) {
          const names = await caches.keys();
          await Promise.all(names.map(n => caches.delete(n)));
        }
      } catch (_) {}
      // Recarga con bypass del caché HTTP del navegador.
      window.location.reload();
    }

    function mostrarBannerActualizacion() {
      if (document.getElementById("banner-actualizar")) return;
      const div = document.createElement("div");
      div.id = "banner-actualizar";
      div.style.cssText = "position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:9999;background:#2563eb;color:#fff;padding:12px 20px;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.18);font-family:Manrope,system-ui,sans-serif;font-size:14px;font-weight:600;display:flex;align-items:center;gap:12px;";
      div.innerHTML = '🔄 Hay una versión nueva disponible <button style="background:#fff;color:#2563eb;border:none;border-radius:999px;padding:6px 14px;font-weight:600;cursor:pointer;font-family:inherit;">Actualizar</button>';
      div.querySelector("button").addEventListener("click", () => {
        navigator.serviceWorker.getRegistration().then(reg => {
          if (reg && reg.waiting) reg.waiting.postMessage({ type: "SKIP_WAITING" });
          else window.location.reload();
        });
      });
      document.body.appendChild(div);
    }
  })();
  </script>

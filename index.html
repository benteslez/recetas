    /** Re-render in-place de la zona de ingredientes (no toca el resto). */
    function actualizarIngredientesYNumero() {
      const r = recetaPorId(sesion.recetaAbierta);
      if (!r) return;
      const num = document.getElementById("raciones-num");
      if (num) num.textContent = String(sesion.raciones);
      const zona = document.getElementById("zona-ingredientes");
      if (zona) zona.innerHTML = renderIngredientesZona();
    }

    /** Re-render in-place de la zona de "tu cocina" (valoracion/fav/estado/cocinado). */
    function actualizarZonaUsuario() {
      const r = recetaPorId(sesion.recetaAbierta);
      if (!r) return;
      const eu = getEstado(perfilActivo, r.id);

      // estrellas
      const ests = document.querySelectorAll("#zona-estrellas button[data-accion='valoracion']");
      ests.forEach(b => {
        const v = Number(b.dataset.valor);
        if (v === 0) return; // boton "Quitar"
        b.classList.toggle("activa", eu.valoracion && v <= eu.valoracion);
      });
      // favorito
      const fav = document.querySelector("#zona-usuario [data-accion='favorito']");
      if (fav) {
        fav.setAttribute("aria-pressed", String(!!eu.favorito));
        fav.textContent = eu.favorito ? "♥ Favorito" : "♡ Marcar";
      }
      // estado
      const est = document.querySelector("#zona-usuario [data-accion='estado']");
      if (est) est.value = eu.estado || "";
      // cocinado
      const coc = document.getElementById("zona-cocinado");
      if (coc) {
        coc.innerHTML = `Cocinada <b>${eu.vecesCocinada || 0}</b>` +
          (eu.ultimaVez ? ` · última <b>${esc(eu.ultimaVez)}</b>` : "");
      }
      // Habilitar/deshabilitar el botón "−" según el contador
      const btnMenos = document.querySelector("#zona-usuario [data-accion='cocinado-menos']");
      if (btnMenos) {
        const v = eu.vecesCocinada || 0;
        if (v === 0) btnMenos.setAttribute("disabled", ""); else btnMenos.removeAttribute("disabled");
      }
    }

    /* ---- Buscar ---------------------------------------------------------- */

    function sugerenciasIngrediente(texto, yaSeleccionados, grupo, max) {
      max = max || 20;
      const q = normaliza(texto || "");
      const ings = estado.ingredientes
        .filter(i => !yaSeleccionados.has(i.clave))
        .filter(i => {
          if (!q) return true;
          if (normaliza(i.nombre).includes(q)) return true;
          if (normaliza(i.clave).includes(q))  return true;
          return (i.alias || []).some(a => normaliza(a).includes(q));
        })
        .sort((a,b) => normaliza(a.nombre).localeCompare(normaliza(b.nombre)))
        .slice(0, max);
      if (!ings.length) return `<span class="vacio-sug">Sin coincidencias</span>`;
      return ings.map(i =>
        `<button type="button" class="filtro-chip" data-accion="addref"
                 data-ref="${esc(i.clave)}" data-grupo="${grupo}">${esc(i.nombre)}</button>`
      ).join("");
    }

    function busquedaActiva(b) {
      return !!(b.texto || b.tipos.size || b.dietas.size ||
        b.tiempo !== "cualquiera" || b.dificultad ||
        b.incluir.size || b.excluir.size);
    }

    function nombreIng(ref) {
      const i = estado.ingredientes.find(x => x.clave === ref);
      return i ? i.nombre : ref;
    }

    function renderBuscar() {
      const cont = document.getElementById("buscar-contenedor");
      if (!cont) return;
      const b = sesion.busqueda;
      const lista = filtrarRecetasBusqueda(b)
        .sort((a,c) => normaliza(a.nombre).localeCompare(normaliza(c.nombre)));

      const chipsTipo = Object.keys(ETIQUETA_TIPO).map(t =>
        `<button type="button" class="filtro-chip"
           data-accion="filtro-tipo" data-valor="${t}"
           aria-pressed="${b.tipos.has(t)}">${esc(ETIQUETA_TIPO[t])}</button>`
      ).join("");

      const chipsDieta = Object.keys(ETIQUETA_DIETA).map(d =>
        `<button type="button" class="filtro-chip"
           data-accion="filtro-dieta" data-valor="${d}"
           aria-pressed="${b.dietas.has(d)}">${esc(ETIQUETA_DIETA[d])}</button>`
      ).join("");

      const chipsTiempo = [
        ["cualquiera","Cualquiera"], ["30","Menos de 30 min"], ["60","Menos de 1 h"]
      ].map(p => {
        const v = p[0], l = p[1];
        return `<button type="button" class="filtro-chip"
           data-accion="filtro-tiempo" data-valor="${v}"
           aria-pressed="${b.tiempo === v}">${esc(l)}</button>`;
      }).join("");

      const chipsDif = [
        ["", "Cualquiera"], ["facil","Fácil"], ["media","Media"], ["dificil","Difícil"]
      ].map(p => {
        const v = p[0], l = p[1];
        return `<button type="button" class="filtro-chip"
           data-accion="filtro-dificultad" data-valor="${v}"
           aria-pressed="${(b.dificultad || '') === v}">${esc(l)}</button>`;
      }).join("");

      const selInc = [...b.incluir].map(ref =>
        `<button type="button" class="filtro-chip"
           data-accion="quitar-incluir" data-ref="${esc(ref)}"
           aria-label="Quitar ${esc(nombreIng(ref))}">${esc(nombreIng(ref))}</button>`
      ).join("");
      const selExc = [...b.excluir].map(ref =>
        `<button type="button" class="filtro-chip"
           data-accion="quitar-excluir" data-ref="${esc(ref)}"
           aria-label="Quitar ${esc(nombreIng(ref))}">${esc(nombreIng(ref))}</button>`
      ).join("");

      const sugInc = sugerenciasIngrediente(b.sugIncluir, b.incluir, "incluir");
      const sugExc = sugerenciasIngrediente(b.sugExcluir, b.excluir, "excluir");

      cont.innerHTML = `
        <h1 class="vista-titulo">Buscar</h1>
        <p class="vista-subtitulo">Texto libre y filtros que se combinan.</p>

        <div class="busc-caja">
          <input type="search" id="busc-texto" class="busc-input"
                 placeholder="Buscar en nombre, tags o ingredientes…"
                 value="${esc(b.texto)}" autocomplete="off">
        </div>

        <div class="busc-caja">
          <div class="filtros">
            <div class="filtro-grupo">
              <span class="et">Tipo</span>
              <div class="filtro-chips">${chipsTipo}</div>
            </div>
            <div class="filtro-grupo">
              <span class="et">Dieta</span>
              <div class="filtro-chips">${chipsDieta}</div>
            </div>
            <div class="filtro-grupo">
              <span class="et">Tiempo total</span>
              <div class="filtro-chips">${chipsTiempo}</div>
            </div>
            <div class="filtro-grupo">
              <span class="et">Dificultad</span>
              <div class="filtro-chips">${chipsDif}</div>
            </div>

            <div class="filtros-doble">
              <div class="busc-ing" data-grupo="incluir">
                <div class="busc-ing-cabecera">Debe contener</div>
                <div class="busc-ing-sel" data-rol="sel-incluir">${selInc}</div>
                <input type="text" class="busc-ing-input" id="busc-ing-inc"
                       placeholder="Añadir ingrediente…"
                       value="${esc(b.sugIncluir)}" autocomplete="off">
                <div class="busc-ing-sug" data-rol="sug-incluir">${sugInc}</div>
              </div>
              <div class="busc-ing" data-grupo="excluir">
                <div class="busc-ing-cabecera">No debe contener</div>
                <div class="busc-ing-sel" data-rol="sel-excluir">${selExc}</div>
                <input type="text" class="busc-ing-input" id="busc-ing-exc"
                       placeholder="Excluir ingrediente…"
                       value="${esc(b.sugExcluir)}" autocomplete="off">
                <div class="busc-ing-sug" data-rol="sug-excluir">${sugExc}</div>
              </div>
            </div>
          </div>
        </div>

        <div class="busc-acciones">
          <span class="busc-contador"><b id="busc-num">${lista.length}</b> resultados</span>
          ${busquedaActiva(b)
            ? `<button type="button" class="busc-limpiar" data-accion="limpiar-filtros">Limpiar filtros</button>`
            : ""}
        </div>

        <div id="busc-resultados">${
          lista.length === 0
            ? `<div class="vacio">No hay recetas que cumplan los filtros.</div>`
            : `<div class="tarjetas">${lista.map(tarjetaHTML).join("")}</div>`
        }</div>
      `;
    }

    /** Refresca solo la zona de resultados (sin perder foco). */
    function actualizarResultadosBuscar() {
      const cont = document.getElementById("buscar-contenedor"); if (!cont) return;
      const zona = cont.querySelector("#busc-resultados"); if (!zona) return;
      const lista = filtrarRecetasBusqueda(sesion.busqueda)
        .sort((a,c) => normaliza(a.nombre).localeCompare(normaliza(c.nombre)));
      const num = cont.querySelector("#busc-num");
      if (num) num.textContent = String(lista.length);
      zona.innerHTML = lista.length === 0
        ? `<div class="vacio">No hay recetas que cumplan los filtros.</div>`
        : `<div class="tarjetas">${lista.map(tarjetaHTML).join("")}</div>`;
      // Refrescar el boton de "Limpiar filtros".
      const acciones = cont.querySelector(".busc-acciones");
      if (acciones) {
        let btn = acciones.querySelector("[data-accion='limpiar-filtros']");
        const debe = busquedaActiva(sesion.busqueda);
        if (debe && !btn) {
          btn = document.createElement("button");
          btn.type = "button";
          btn.className = "busc-limpiar";
          btn.dataset.accion = "limpiar-filtros";
          btn.textContent = "Limpiar filtros";
          acciones.appendChild(btn);
        } else if (!debe && btn) {
          btn.remove();
        }
      }
    }

    function actualizarSugIngrediente(grupo) {
      const cont = document.getElementById("buscar-contenedor"); if (!cont) return;
      const input = grupo === "incluir"
        ? cont.querySelector("#busc-ing-inc")
        : cont.querySelector("#busc-ing-exc");
      if (!input) return;
      const seleccionados = grupo === "incluir" ? sesion.busqueda.incluir : sesion.busqueda.excluir;
      const zona = cont.querySelector(`[data-rol="sug-${grupo}"]`);
      if (zona) zona.innerHTML = sugerenciasIngrediente(input.value, seleccionados, grupo);
    }

    function actualizarSeleccionadosBuscar(grupo) {
      const cont = document.getElementById("buscar-contenedor"); if (!cont) return;
      const set = grupo === "incluir" ? sesion.busqueda.incluir : sesion.busqueda.excluir;
      const zona = cont.querySelector(`[data-rol="sel-${grupo}"]`);
      if (!zona) return;
      zona.innerHTML = [...set].map(ref =>
        `<button type="button" class="filtro-chip"
           data-accion="quitar-${grupo}" data-ref="${esc(ref)}"
           aria-label="Quitar ${esc(nombreIng(ref))}">${esc(nombreIng(ref))}</button>`
      ).join("");
    }

    function limpiarFiltrosBuscar() {
      sesion.busqueda = {
        texto: "", tipos: new Set(), dietas: new Set(),
        tiempo: "cualquiera", dificultad: null,
        incluir: new Set(), excluir: new Set(),
        sugIncluir: "", sugExcluir: ""
      };
      renderBuscar();
    }

    /* ---- Inversa --------------------------------------------------------- */

    function tarjetaInversaHTML(r, cob) {
      const eu = getEstado(perfilActivo, r.id);
      const tt = tiempoTotalMin(r);
      const pct = Math.round(cob.pct * 100);
      const faltU = faltantesUnicos(cob.faltantes);
      const linea = faltU.length === 0
        ? `<div class="tarjeta-faltan"><b>Lo tienes todo</b></div>`
        : `<div class="tarjeta-faltan">Faltan (<b>${faltU.length}</b>): ${faltU.map(f => esc(f.nombre)).join(", ")}</div>`;
      return `
        <button type="button" class="tarjeta" data-accion="abrir" data-id="${esc(r.id)}">
          <div class="tarjeta-head">
            ${chipTipoHTML(r.tipo)}
            <span class="tarjeta-fav" data-accion="fav" data-id="${esc(r.id)}"
              role="button" aria-pressed="${eu.favorito}"
              aria-label="${eu.favorito ? "Quitar de favoritos" : "Marcar favorito"}">
              ${eu.favorito ? "♥" : "♡"}
            </span>
          </div>
          <h2 class="tarjeta-nombre">${esc(r.nombre)}</h2>
          <div class="tarjeta-cobertura">
            <div class="tarjeta-cobertura-row">
              <span>Cobertura</span>
              <div class="tarjeta-cobertura-barra"><div class="tarjeta-cobertura-rell" style="width:${pct}%"></div></div>
              <b>${pct}%</b>
            </div>
            ${linea}
          </div>
          <dl class="tarjeta-meta">
            <div><dt>Tiempo</dt><dd class="num">${formateaMin(tt)}</dd></div>
            <div><dt>Dificultad</dt><dd>${esc(ETIQUETA_DIFICULTAD[r.dificultad] || r.dificultad)}</dd></div>
          </dl>
        </button>`;
    }

    function listadoInversa() {
      const conCob = estado.recetas.map(r => ({ r, cob: coberturaReceta(r, sesion.disponibles) }));
      // Filtro común: 0% se oculta (al menos 1 cubierto, salvo recetas sin obligatorios).
      const sinCero = conCob.filter(x => x.cob.total === 0 || x.cob.cubiertos > 0);
      if (sesion.inversaModo === "casi") {
        return sinCero
          .filter(x => x.cob.total > 0
            && faltantesUnicos(x.cob.faltantes).length >= 1
            && faltantesUnicos(x.cob.faltantes).length <= 2)
          .sort((a,b) => {
            const fa = faltantesUnicos(a.cob.faltantes).length;
            const fb = faltantesUnicos(b.cob.faltantes).length;
            return fa - fb
              || b.cob.pct - a.cob.pct
              || normaliza(a.r.nombre).localeCompare(normaliza(b.r.nombre));
          });
      }
      return sinCero.sort((a,b) =>
        b.cob.pct - a.cob.pct
        || normaliza(a.r.nombre).localeCompare(normaliza(b.r.nombre))
      );
    }

    function renderInversa() {
      const cont = document.getElementById("inversa-contenedor");
      if (!cont) return;
      const modo = sesion.inversaModo;
      const lista = listadoInversa();

      // Agrupar catalogo por categoria de compra.
      const grupos = {};
      estado.ingredientes.forEach(i => {
        const c = i.categoriaCompra || "otros";
        if (!grupos[c]) grupos[c] = [];
        grupos[c].push(i);
      });

      const neveraHTML = CATEGORIAS_ORDEN
        .filter(c => grupos[c] && grupos[c].length)
        .map(cat => {
          const items = grupos[cat]
            .slice()
            .sort((a,b) => normaliza(a.nombre).localeCompare(normaliza(b.nombre)));
          const marcados = items.filter(i => sesion.disponibles.has(i.clave)).length;
          const abierto = marcados > 0 ? " open" : "";
          const badge = marcados > 0
            ? `<span class="nevera-cat-count activo">${marcados}</span>`
            : `<span class="nevera-cat-count">${items.length}</span>`;
          return `
            <details class="nevera-cat"${abierto}>
              <summary>
                <span class="nevera-cat-titulo">${esc(ETIQUETA_CATEGORIA_COMPRA[cat] || cat)}</span>
                ${badge}
              </summary>
              <div class="nevera-items">
                ${items.map(i =>
                  `<button type="button" class="filtro-chip"
                     data-accion="toggle-disponible" data-ref="${esc(i.clave)}"
                     aria-pressed="${sesion.disponibles.has(i.clave)}">${esc(i.nombre)}</button>`
                ).join("")}
              </div>
            </details>`;
        }).join("");

      cont.innerHTML = `
        <h1 class="vista-titulo">Búsqueda inversa</h1>
        <p class="vista-subtitulo">Marca lo que tengas. Ignora opcionales (T3).</p>

        <div class="nevera">
          <div class="nevera-bar">
            <h2>Mi nevera</h2>
            <span class="nevera-contador"><b id="nevera-num">${sesion.disponibles.size}</b> marcados</span>
            <input type="search" id="nevera-buscar" class="nevera-buscar"
                   placeholder="Filtrar ingredientes…" autocomplete="off"
                   value="${esc(sesion.neveraFiltro)}">
            <button type="button" class="busc-limpiar" data-accion="nuevo-ing-inversa">+ Nuevo ingrediente</button>
            <button type="button" class="busc-limpiar" data-accion="limpiar-nevera">Limpiar</button>
          </div>
          <div class="nevera-cats">${neveraHTML}</div>
        </div>

        <div class="busc-acciones">
          <span class="busc-contador"><b id="inv-num">${lista.length}</b> ${modo === "casi" ? "recetas con 1–2 faltantes" : "recetas"}</span>
          <span class="inversa-modo" role="group" aria-label="Modo">
            <button type="button" data-accion="modo-cobertura" aria-pressed="${modo==='cobertura'}">Por cobertura</button>
            <button type="button" data-accion="modo-casi"      aria-pressed="${modo==='casi'}">Casi lo tengo</button>
          </span>
        </div>

        <div id="inv-resultados">${
          lista.length === 0
            ? `<div class="vacio">${modo==='casi' ? "Sin recetas a 1–2 ingredientes." : "Sin recetas."}</div>`
            : `<div class="tarjetas">${lista.map(x => tarjetaInversaHTML(x.r, x.cob)).join("")}</div>`
        }</div>
      `;
    }

    /** Filtra los chips de la nevera por texto SIN re-render (mantiene foco). */
    function actualizarNeveraVisible() {
      const q = normaliza(sesion.neveraFiltro || "").trim();
      const cont = document.getElementById("inversa-contenedor");
      if (!cont) return;
      cont.querySelectorAll(".nevera-cat").forEach(cat => {
        let algunoVisible = false;
        cat.querySelectorAll("[data-accion='toggle-disponible']").forEach(btn => {
          const ref = btn.dataset.ref;
          const ing = estado.ingredientes.find(i => i.clave === ref);
          if (!ing) { btn.style.display = "none"; return; }
          const visible = !q
            || normaliza(ing.nombre).includes(q)
            || normaliza(ing.clave).includes(q)
            || (ing.alias || []).some(a => normaliza(a).includes(q));
          btn.style.display = visible ? "" : "none";
          if (visible) algunoVisible = true;
        });
        cat.style.display = algunoVisible ? "" : "none";
      });
    }

    /** Refresca solo el contador + tarjetas (al marcar/desmarcar un ingrediente). */
    function actualizarResultadosInversa() {
      const cont = document.getElementById("inversa-contenedor"); if (!cont) return;
      const modo = sesion.inversaModo;
      const lista = listadoInversa();
      const invNum = cont.querySelector("#inv-num");
      if (invNum) invNum.textContent = String(lista.length);
      const zona = cont.querySelector("#inv-resultados");
      if (zona) zona.innerHTML = lista.length === 0
        ? `<div class="vacio">${modo==='casi' ? "Sin recetas a 1–2 ingredientes." : "Sin recetas."}</div>`
        : `<div class="tarjetas">${lista.map(x => tarjetaInversaHTML(x.r, x.cob)).join("")}</div>`;
      const nv = cont.querySelector("#nevera-num");
      if (nv) nv.textContent = String(sesion.disponibles.size);
    }

    /* ---- Modo cocina ----------------------------------------------------- */

    function abrirCocina() {
      if (!sesion.recetaAbierta) return;
      const r = recetaPorId(sesion.recetaAbierta);
      if (!r || !r.pasos || !r.pasos.length) return;
      // Inicio inteligente: si hay pasos tickeados, ir al primer NO tickeado.
      // Si no hay tics, empezar en la portada.
      let inicio = -2;
      if (sesion.ticsPaso.size > 0) {
        let primero = -1;
        for (let i = 0; i < r.pasos.length; i++) {
          if (!sesion.ticsPaso.has(i)) { primero = i; break; }
        }
        inicio = (primero >= 0) ? primero : (r.pasos.length - 1);
      }
      sesion.modoCocina = { activo: true, idReceta: r.id, pagina: inicio };
      document.body.classList.add("modo-cocina-activo");
      const ov = document.getElementById("modo-cocina");
      if (ov) ov.hidden = false;
      renderModoCocina();
      pedirWakeLock();
      desbloquearAudio();
    }

    function cerrarCocina() {
      sesion.modoCocina = { activo: false, idReceta: null, pagina: 0 };
      document.body.classList.remove("modo-cocina-activo");
      const ov = document.getElementById("modo-cocina");
      if (ov) { ov.hidden = true; ov.innerHTML = ""; }
      liberarWakeLock();
    }

    function pasoAnterior() {
      if (!sesion.modoCocina.activo) return;
      if (sesion.modoCocina.pagina > -2) {
        sesion.modoCocina.pagina--;
        renderModoCocina();
      }
    }
    function pasoSiguiente() {
      if (!sesion.modoCocina.activo) return;
      const r = recetaPorId(sesion.modoCocina.idReceta);
      if (!r) return;
      if (sesion.modoCocina.pagina < r.pasos.length - 1) {
        sesion.modoCocina.pagina++;
        renderModoCocina();
      }
    }

    function renderModoCocina() {
      const r = recetaPorId(sesion.modoCocina.idReceta);
      if (!r) { cerrarCocina(); return; }
      const pagina = sesion.modoCocina.pagina;
      const total = r.pasos.length;
      const totalPag = total + 2;          // portada + ingredientes + N pasos
      const idxAbs = pagina + 2;           // 0..totalPag-1
      const pct = Math.round((idxAbs + 1) / totalPag * 100);
      const factor = (sesion.raciones || r.racionesBase) / r.racionesBase;
      const tt = tiempoTotalMin(r);

      let etiqueta;
      if (pagina === -2)      etiqueta = "Inicio";
      else if (pagina === -1) etiqueta = "Ingredientes";
      else                    etiqueta = `Paso ${pagina + 1} / ${total}`;

      let cuerpoHTML;
      if (pagina === -2) {
        // PORTADA
        cuerpoHTML = `
          <div class="mc-portada">
            ${chipTipoHTML(r.tipo)}
            <h2 class="mc-portada-titulo">${esc(r.nombre)}</h2>
            <p class="mc-portada-meta">
              ${formateaMin(tt)} · ${esc(ETIQUETA_DIFICULTAD[r.dificultad] || r.dificultad)}
              · ${sesion.raciones || r.racionesBase} raciones
            </p>
          </div>`;
      } else if (pagina === -1) {
        // INGREDIENTES con checkboxes (reutiliza sesion.ticsIng).
        const items = r.ingredientes.map((ing, i) => {
          const cant    = ing.cantidad    == null ? null : ing.cantidad    * factor;
          const cantMax = ing.cantidadMax == null ? null : ing.cantidadMax * factor;
          const { html: pillHTML } = pillCantidadHTML(cant, cantMax, ing.unidad);
          const tachado = sesion.ticsIng.has(i) ? " tachado" : "";
          const checked = sesion.ticsIng.has(i) ? "checked" : "";
          const opc = ing.opcional ? `<span class="ing-opcional">opcional</span>` : "";
          const det = (pillHTML || opc)
            ? `<span class="ing-detalles">${pillHTML}${opc}</span>` : "";
          return `
            <li class="${tachado.trim()}" data-tic-ing-cocina="${i}">
              <input type="checkbox" ${checked} aria-label="Tachar ${esc(ing.nombre)}">
              <span class="ing-texto">
                <span class="ing-nombre">${esc(ing.nombre)}</span>
                ${det}
              </span>
            </li>`;
        }).join("");
        cuerpoHTML = `
          <div class="mc-ingredientes-full">
            <div class="mc-paso-num">Ingredientes</div>
            <h2 class="mc-paso-titulo mc-tit-medio">Para ${sesion.raciones || r.racionesBase} raciones</h2>
            <ul class="mc-ing-lista">${items}</ul>
          </div>`;
      } else {
        // PASO normal
        const p = r.pasos[pagina];
        if (!p) { cerrarCocina(); return; }
        const refsPaso = new Set(p.usa || []);
        const ingsPaso = refsPaso.size
          ? r.ingredientes.filter(i => i.ref && refsPaso.has(i.ref))
          : [];
        const itemsHTML = ingsPaso.map(ing => {
          const cant    = ing.cantidad    == null ? null : ing.cantidad    * factor;
          const cantMax = ing.cantidadMax == null ? null : ing.cantidadMax * factor;
          const { html: pillHTML, aviso } = pillCantidadHTML(cant, cantMax, ing.unidad);
          const avisoHTML = aviso ? `<span class="ing-aviso">(${esc(aviso)})</span>` : "";
          const det = (pillHTML || avisoHTML)
            ? `<span class="ing-detalles">${pillHTML}${avisoHTML}</span>` : "";
          return `<li>
            <span class="ing-texto">
              <span class="ing-nombre">${esc(ing.nombre)}</span>
              ${det}
            </span>
          </li>`;
        }).join("");
        const meta = [];
        const conTemp = necesitaTemporizador(p);
        if (p.temperatura != null) meta.push(`<span class="pill">Horno <b>${esc(p.temperatura)}°C</b></span>`);
        if (conTemp)               meta.push(`<span class="pill">Tiempo <b>${formateaSeg(p.tiempo)}</b></span>`);
        const tempBtn = conTemp
          ? `<button type="button" class="mc-btn-temp" data-accion="iniciar-timer-paso">
               ⏱ Iniciar temporizador (${formateaSeg(p.tiempo)})
             </button>` : "";
        cuerpoHTML = `
          <div class="mc-paso">
            <div class="mc-paso-num">Paso ${p.n} de ${total}</div>
            ${p.titulo ? `<h2 class="mc-paso-titulo">${esc(p.titulo)}</h2>` : ""}
            <div class="mc-paso-texto">${destacarAccion(p.texto)}</div>
            ${meta.length ? `<div class="mc-paso-meta">${meta.join("")}</div>` : ""}
            ${tempBtn}
            ${itemsHTML
              ? `<div class="mc-paso-ings"><h3>Ingredientes del paso</h3><ul>${itemsHTML}</ul></div>`
              : ""}
          </div>`;
      }

      const ov = document.getElementById("modo-cocina");
      ov.style.setProperty("--chip-bg", `var(--tipo-${r.tipo}-bg)`);
      ov.style.setProperty("--chip-fg", `var(--tipo-${r.tipo}-fg)`);
      const labelSig = (pagina === -2) ? "Empezar" : (pagina === -1 ? "Cocinar" : "Siguiente");
      ov.innerHTML = `
        <div class="mc-head">
          <h1>${esc(r.nombre)}</h1>
          <span class="pasos-contador">${esc(etiqueta)}</span>
          <button type="button" class="mc-cerrar" data-accion="cerrar-cocina"
                  aria-label="Cerrar modo cocina">✕</button>
        </div>
        <div class="mc-progreso">
          <div class="mc-progreso-rell" style="width: ${pct}%"></div>
        </div>
        <div class="mc-body">${cuerpoHTML}</div>
        <div class="mc-foot">
          <button type="button" class="mc-btn-nav" data-accion="paso-anterior"
                  ${pagina === -2 ? "disabled" : ""} aria-label="Anterior">
            <span class="mc-flecha">‹</span><span class="mc-label">Anterior</span>
          </button>
          <button type="button" class="mc-btn-nav principal" data-accion="paso-siguiente"
                  ${pagina === total - 1 ? "disabled" : ""} aria-label="Siguiente">
            <span class="mc-label">${labelSig}</span><span class="mc-flecha">›</span>
          </button>
        </div>
        ${pagina === -2 ? `<div class="mc-hint-swipe">Desliza para avanzar</div>` : ""}`;
    }

    /* ---- Temporizadores -------------------------------------------------- */

    let _tickerId = null;
    function arrancarTicker() {
      if (_tickerId) return;
      // setInterval NO acumula ticks: cada tick recalcula desde finMs - Date.now() (T1).
      _tickerId = setInterval(tickTimers, 250);
    }
    function pararTicker() {
      if (_tickerId) { clearInterval(_tickerId); _tickerId = null; }
    }
    function tickTimers() {
      if (sesion.timers.length === 0) { pararTicker(); return; }
      let estructural = false;
      for (const t of sesion.timers) {
        if (t.pausado || t.vencido) continue;
        if (t.finMs == null) continue;
        if (t.finMs - Date.now() <= 0) {
          t.vencido = true;
          estructural = true;
          avisarVencido(t);
        }
      }
      if (estructural) { guardarTimers(); renderTimers(); }
      else { actualizarTextosTimers(); }
    }

    function avisarVencido(t) {
      // Sonido (T9): tres pulsos cortos.
      beep(3);
      // Vibracion (T8): patron corto-pausa-corto-pausa-largo.
      vibrar([200, 100, 200, 100, 400]);
      // El resalte visual lo aplica la clase .vencido en renderTimers.
    }

    function nuevoTimerId() {
      return "t-" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    }

    function crearTimer(etiqueta, duracionMs, recetaId, pasoN) {
      const dur = Math.max(1000, Math.floor(duracionMs));
      const t = {
        id: nuevoTimerId(),
        etiqueta: String(etiqueta || "Temporizador"),
        duracionMs: dur,
        finMs: Date.now() + dur,    // T1: instante de fin absoluto
        restanteMs: null,
        pausado: false,
        vencido: false,
        recetaId: recetaId || null,
        pasoN: pasoN || null
      };
      sesion.timers.push(t);
      guardarTimers();
      renderTimers();
      arrancarTicker();
      desbloquearAudio();
    }

    function pausarTimer(id) {
      const t = sesion.timers.find(x => x.id === id);
      if (!t || t.pausado || t.vencido) return;
      t.restanteMs = Math.max(0, (t.finMs || 0) - Date.now());
      t.finMs = null;
      t.pausado = true;
      guardarTimers();
      renderTimers();
    }
    function reanudarTimer(id) {
      const t = sesion.timers.find(x => x.id === id);
      if (!t || !t.pausado) return;
      t.finMs = Date.now() + (t.restanteMs || 0);
      t.restanteMs = null;
      t.pausado = false;
      guardarTimers();
      renderTimers();
      arrancarTicker();
    }
    function eliminarTimer(id) {
      sesion.timers = sesion.timers.filter(x => x.id !== id);
      guardarTimers();
      renderTimers();
    }

    function iniciarTimerDesdePaso() {
      if (!sesion.modoCocina.activo) return;
      const r = recetaPorId(sesion.modoCocina.idReceta);
      if (!r) return;
      const pag = sesion.modoCocina.pagina;
      if (pag < 0) return;  // no hay timer en portada/ingredientes
      const p = r.pasos[pag];
      if (!p || p.tiempo == null) return;
      // paso.tiempo en SEGUNDOS (T2) -> * 1000.
      const etiq = p.titulo || `Paso ${p.n} · ${r.nombre}`;
      crearTimer(etiq, p.tiempo * 1000, r.id, p.n);
    }

    /** Render estructural completo del panel de temporizadores. */
    function renderTimers() {
      const panel = document.getElementById("panel-timers");
      if (!panel) return;
      if (sesion.timers.length === 0) {
        panel.hidden = true;
        panel.innerHTML = "";
        return;
      }
      panel.hidden = false;
      panel.innerHTML = sesion.timers.map(t => {
        const ms = t.pausado ? (t.restanteMs || 0)
                 : Math.max(0, (t.finMs || 0) - Date.now());
        const tiempo = formateaSeg(Math.ceil(ms / 1000));
        const dur = t.duracionMs || 1;
        const progreso = Math.max(0, Math.min(1, ms / dur));
        const dashoff = t.vencido ? 0 : (1 - progreso) * 100;
        const cls = ["timer"];
        if (t.pausado) cls.push("pausado");
        if (t.vencido) cls.push("vencido");
        const accionPlayPause = t.vencido ? "" :
          t.pausado
            ? `<button type="button" class="timer-btn" data-accion="reanudar-timer" aria-label="Reanudar">▶</button>`
            : `<button type="button" class="timer-btn" data-accion="pausar-timer" aria-label="Pausar">⏸</button>`;
        return `
          <div class="${cls.join(" ")}" data-timer-id="${esc(t.id)}">
            <div class="timer-anillo">
              <svg viewBox="0 0 36 36" aria-hidden="true">
                <circle class="bg-circ" cx="18" cy="18" r="15.9"/>
                <circle class="fg-circ" cx="18" cy="18" r="15.9"
                        style="stroke-dashoffset:${dashoff}"/>
              </svg>
              <span class="timer-restante">${esc(tiempo)}</span>
            </div>
            <div class="timer-info">
              <div class="timer-etiqueta">${esc(t.etiqueta)}</div>
            </div>
            ${accionPlayPause}
            <button type="button" class="timer-btn peligro"
                    data-accion="eliminar-timer" aria-label="Eliminar">×</button>
          </div>`;
      }).join("");
    }

    /** Actualizacion ligera del numero y del anillo — cada 250 ms (T1). */
    function actualizarTextosTimers() {
      const panel = document.getElementById("panel-timers");
      if (!panel) return;
      panel.querySelectorAll(".timer").forEach(el => {
        const t = sesion.timers.find(x => x.id === el.dataset.timerId);
        if (!t) return;
        const ms = t.pausado ? (t.restanteMs || 0)
                 : Math.max(0, (t.finMs || 0) - Date.now());
        const span = el.querySelector(".timer-restante");
        if (span) span.textContent = formateaSeg(Math.ceil(ms / 1000));
        const anillo = el.querySelector(".fg-circ");
        if (anillo) {
          const dur = t.duracionMs || 1;
          const progreso = Math.max(0, Math.min(1, ms / dur));
          const dashoff = t.vencido ? 0 : (1 - progreso) * 100;
          anillo.style.strokeDashoffset = String(dashoff);
        }
      });
    }

    /* ---- Modal nuevo temporizador --------------------------------------- */

    function abrirModalNuevoTimer() {
      const modal = document.getElementById("modal-nuevo-timer");
      modal.innerHTML = `
        <div class="modal">
          <h3>Nuevo temporizador</h3>
          <div class="campo">
            <label for="nt-et">Etiqueta</label>
            <input type="text" id="nt-et" placeholder="Pasta, té, descanso…" autocomplete="off">
          </div>
          <div class="modal-fila">
            <div class="campo">
              <label for="nt-min">Minutos</label>
              <input type="number" id="nt-min" min="0" max="180" value="10" inputmode="numeric">
            </div>
            <div class="campo">
              <label for="nt-sec">Segundos</label>
              <input type="number" id="nt-sec" min="0" max="59" value="0" inputmode="numeric">
            </div>
          </div>
          <div class="modal-acciones">
            <button type="button" class="secundario" data-accion="cerrar-modal">Cancelar</button>
            <button type="button" class="principal"  data-accion="crear-timer-manual">Iniciar</button>
          </div>
        </div>`;
      modal.hidden = false;
      desbloquearAudio();
      setTimeout(() => {
        const et = document.getElementById("nt-et");
        if (et) et.focus();
      }, 50);
    }
    function cerrarModalNuevoTimer() {
      const modal = document.getElementById("modal-nuevo-timer");
      if (!modal) return;
      modal.hidden = true;
      modal.innerHTML = "";
    }
    function crearTimerManual() {
      const et  = (document.getElementById("nt-et")?.value || "").trim() || "Temporizador";
      const min = Math.max(0, Math.min(180, Number(document.getElementById("nt-min")?.value) || 0));
      const sec = Math.max(0, Math.min(59,  Number(document.getElementById("nt-sec")?.value) || 0));
      const dur = (min * 60 + sec) * 1000;
      if (dur <= 0) { cerrarModalNuevoTimer(); return; }
      crearTimer(et, dur);
      cerrarModalNuevoTimer();
    }

    /* ---- Modal selector de receta (compartido por Compra y Planificador) - */

    let _selectorCfg = null;   // { titulo, excluir:Set, mostrarQuitar, onElegir(id|null) }

    function abrirSelectorReceta(cfg) {
      _selectorCfg = cfg || {};
      const modal = document.getElementById("modal-selector");
      modal.innerHTML = `
        <div class="modal modal-selector">
          <h3>${esc(cfg.titulo || "Seleccionar receta")}</h3>
          <input type="search" id="sel-buscar" class="sel-buscar" placeholder="Buscar…" autocomplete="off">
          ${cfg.mostrarQuitar
            ? `<button type="button" class="sel-quitar" data-accion="sel-quitar">Quitar de aquí</button>`
            : ""}
          <div class="sel-lista" id="sel-lista">${listaSelectorHTML("")}</div>
          <div class="modal-acciones">
            <button type="button" class="secundario" data-accion="cerrar-modal">Cancelar</button>
          </div>
        </div>`;
      modal.hidden = false;
      setTimeout(() => document.getElementById("sel-buscar")?.focus(), 50);
    }
    function cerrarModalSelector() {
      const m = document.getElementById("modal-selector");
      if (!m) return;
      m.hidden = true; m.innerHTML = "";
      _selectorCfg = null;
    }
    function listaSelectorHTML(filtro) {
      const cfg = _selectorCfg || {};
      const q = normaliza(filtro || "");
      const excluir = cfg.excluir || new Set();
      const recetas = estado.recetas
        .filter(r => !excluir.has(r.id))
        .filter(r => {
          if (!q) return true;
          if (normaliza(r.nombre).includes(q)) return true;
          return (r.tags || []).some(t => normaliza(t).includes(q))
              || r.ingredientes.some(i => normaliza(i.nombre).includes(q));
        })
        .sort((a,b) => normaliza(a.nombre).localeCompare(normaliza(b.nombre)));
      if (!recetas.length) return `<div class="sel-vacio">Sin coincidencias</div>`;
      return recetas.map(r => `
        <button type="button" class="sel-receta" data-id="${esc(r.id)}">
          ${chipTipoHTML(r.tipo)}
          <span class="sel-receta-info">
            <div class="sel-receta-nombre">${esc(r.nombre)}</div>
            <div class="sel-receta-meta">
              ${esc(ETIQUETA_DIFICULTAD[r.dificultad] || r.dificultad)} ·
              ${formateaMin(tiempoTotalMin(r))} ·
              ${r.racionesBase} raciones base
            </div>
          </span>
        </button>`).join("");
    }
    function actualizarListaSelector(filtro) {
      const z = document.getElementById("sel-lista");
      if (z) z.innerHTML = listaSelectorHTML(filtro);
    }

    /* ---- Compra ---------------------------------------------------------- */

    function añadirRecetaCompra(id) {
      const r = recetaPorId(id);
      if (!r) return;
      if (sesion.compra.items.some(x => x.id === id)) return;
      sesion.compra.items.push({ id, raciones: r.racionesBase });
      guardarCompra();
      renderCompra();
    }
    function quitarRecetaCompra(id) {
      sesion.compra.items = sesion.compra.items.filter(x => x.id !== id);
      guardarCompra();
      renderCompra();
    }
    function cambiarRacionesCompra(id, delta) {
      const it = sesion.compra.items.find(x => x.id === id);
      if (!it) return;
      const nuevo = (it.raciones || 1) + delta;
      if (nuevo < 1 || nuevo > 99) return;
      it.raciones = nuevo;
      guardarCompra();
      renderCompra();
    }

    function renderLineaCompra(l) {
      const { html: pillHTML, aviso } = pillCantidadHTML(l.cantidad, l.cantidadMax, l.unidad);
      const avisoHTML = aviso ? `<span class="ing-aviso">(${esc(aviso)})</span>` : "";
      const opc = l.opcional ? `<span class="ing-opcional">opcional</span>` : "";
      const rec = l.recetas.length > 1
        ? `<span class="compra-recetas-info">${l.recetas.length} recetas</span>`
        : "";
      const tachado = sesion.compra.tics.has(l.clave) ? " class=\"tachado\"" : "";
      const hayDet = pillHTML || avisoHTML || opc;
      const det = hayDet ? `<span class="ing-detalles">${pillHTML}${avisoHTML}${opc}</span>` : "";
      return `
        <li${tachado} data-clave-compra="${esc(l.clave)}">
          <input type="checkbox" ${sesion.compra.tics.has(l.clave) ? "checked" : ""}
                 aria-label="Tachar ${esc(l.nombre)}">
          <span class="ing-texto">
            <span class="ing-nombre">${esc(l.nombre)}</span>
            ${det}
            ${rec}
          </span>
        </li>`;
    }

    function renderCompra() {

    /* ---- Planificador --------------------------------------------------- */

    function asignarSlot(fecha, comida, idReceta) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(fecha)) return;
      if (!COMIDAS.includes(comida)) return;
      if (!sesion.planificador.mes[fecha]) {
        sesion.planificador.mes[fecha] = { desayuno: null, comida: null, cena: null };
      }
      sesion.planificador.mes[fecha][comida] = idReceta || null;
      // Limpieza: si el día ya no tiene nada, eliminar entrada (mantiene JSON ligero).
      const d = sesion.planificador.mes[fecha];
      if (!d.desayuno && !d.comida && !d.cena) delete sesion.planificador.mes[fecha];
      guardarPlan();
      renderPlan();
    }
    /** Limpia solo el mes visible. */
    function limpiarMesVisible() {
      const yyyymm = sesion.planificadorMes;
      Object.keys(sesion.planificador.mes).forEach(f => {
        if (f.startsWith(yyyymm + "-")) delete sesion.planificador.mes[f];
      });
      guardarPlan();
      renderPlan();
    }

    /** Genera lista de compra para un array de fechas YYYY-MM-DD. */
    function generarListaPorFechas(fechas) {
      const counts = {};
      fechas.forEach(f => {
        const d = sesion.planificador.mes[f];
        if (!d) return;
        COMIDAS.forEach(c => {
          if (d[c]) counts[d[c]] = (counts[d[c]] || 0) + 1;
        });
      });
      const items = [];
      for (const id in counts) {
        const r = recetaPorId(id);
        if (!r) continue;
        items.push({ id, raciones: r.racionesBase * counts[id] });
      }
      sesion.compra.items = items;
      sesion.compra.tics.clear();
      guardarCompra();
      fijarVista("compra");
      renderCompra();
    }
    function generarListaSemana() {
      generarListaPorFechas(semanaActualFechas());
    }
    function generarListaMes() {
      const yyyymm = sesion.planificadorMes;
      const total = diasDelMes(yyyymm);
      const fechas = [];
      for (let d = 1; d <= total; d++) fechas.push(fechaISO(yyyymm, d));
      generarListaPorFechas(fechas);
    }

    function renderPlan() {
      if (sesion.planificadorVista === "semana") renderPlanSemana();
      else renderPlanMes();
    }

    function renderPlanMes() {
      const cont = document.getElementById("planificador-contenedor");

      const yyyymm = sesion.planificadorMes || mesActualISO();

      const total = diasDelMes(yyyymm);
      const primer = primerDiaSemanaMes(yyyymm); // 0=lun..6=dom
      const hoyStr = hoyISO();

      // Contar asignaciones del mes visible
      let ocupados = 0;
      for (let d = 1; d <= total; d++) {
        const slot = sesion.planificador.mes[fechaISO(yyyymm, d)];
        if (slot) COMIDAS.forEach(c => { if (slot[c]) ocupados++; });

      const huecosTotales = total * 3;

      // Cabecera siglas de días (L M X J V S D)
      const cabeceraHTML = SIGLAS_DIA.map(s =>
        `<div class="plan-cab">${s}</div>`
      ).join("");

      // Huecos del mes anterior (antes del día 1) y del siguiente (después del último)
      const huecosAntes = primer;
      const totalSemanasNec = Math.ceil((huecosAntes + total) / 7);
      const huecosDespues = totalSemanasNec * 7 - (huecosAntes + total);

      const huecoVacioHTML = `<div class="plan-celda fuera"></div>`;
      const antesHTML = huecoVacioHTML.repeat(huecosAntes);
      const despuesHTML = huecoVacioHTML.repeat(huecosDespues);

      for (let d = 1; d <= total; d++) {
        const fecha = fechaISO(yyyymm, d);
        const slot = sesion.planificador.mes[fecha] || {};
        const esHoy = (fecha === hoyStr);
        // Día de la semana de este día (lunes=0..domingo=6) para marcar fin de semana
        const wd = (primer + d - 1) % 7;
        const finDeSemana = wd >= 5;

        const slotsHTML = COMIDAS.map(c => {
          const id = slot[c];

                       title="${esc(ETIQUETA_COMIDA[c])} · ${esc(r.nombre)}">

      cont.innerHTML = `
        <h1 class="vista-titulo">Planificador</h1>
        <p class="vista-subtitulo">Calendario mensual. Click en un hueco para asignar receta.</p>

        <div class="plan-bar">

            <button type="button" class="plan-hoy" data-accion="ir-hoy">Hoy</button>
          </div>
          <span class="crece"></span>
          <span class="plan-contador"><b>${ocupados}</b>/${huecosTotales}</span>
          <button type="button" class="busc-limpiar" data-accion="limpiar-mes">Limpiar mes</button>
          <button type="button" class="btn-cocina-iniciar" data-accion="generar-lista-semana"
                  title="Comida de esta semana (L–D actual)">🛒 Semana</button>
          <button type="button" class="btn-cocina-iniciar" data-accion="generar-lista-mes"
                  ${ocupados === 0 ? "disabled" : ""}
                  title="Comida de todo el mes visible">🛒 Mes</button>

        <div class="plan-calendario">

    /* ---- Conversores ----------------------------------------------------- */

    function renderConversores() {
      const cont = document.getElementById("conversores-contenedor");
      if (!cont) return;
      const c = sesion.conv;

      // ---- 1) Masa <-> volumen por densidad ----------------------------
      const refOpts = ['<option value="">Selecciona ingrediente…</option>']
        .concat(estado.ingredientes
          .slice()
          .sort((a,b) => normaliza(a.nombre).localeCompare(normaliza(b.nombre)))
          .map(i => `<option value="${esc(i.clave)}" ${c.masa.ref === i.clave ? "selected" : ""}>${esc(i.nombre)}${i.densidad ? "" : " (sin densidad)"}</option>`))
        .join("");
      const desdeOpts = [
        ["g","g"], ["kg","kg"], ["ml","ml"], ["l","l"]
      ].map(p => `<option value="${p[0]}" ${c.masa.desde === p[0] ? "selected" : ""}>${p[1]}</option>`).join("");

      let masaResult = "—", masaAviso = "";
      const ingSel = c.masa.ref ? estado.ingredientes.find(x => x.clave === c.masa.ref) : null;
      if (ingSel && Number.isFinite(c.masa.cantidad)) {
        if (!ingSel.densidad) {
          masaAviso = `Sin densidad para "${ingSel.nombre}". Edita el catálogo en Datos.`;
        } else {
          // Pasar todo a gramos primero, luego a la unidad opuesta.
          let g;
          if (c.masa.desde === "g")       g = c.masa.cantidad;
          else if (c.masa.desde === "kg") g = c.masa.cantidad * 1000;
          else if (c.masa.desde === "ml") g = c.masa.cantidad * ingSel.densidad;
          else if (c.masa.desde === "l")  g = c.masa.cantidad * 1000 * ingSel.densidad;
          const ml = g / ingSel.densidad;
          if (c.masa.desde === "g" || c.masa.desde === "kg") {
            // Mostrar resultado en ml/l segun magnitud.
            masaResult = ml >= 1000
              ? `${numConComa(Math.round(ml/10)/100)} l`
              : `${Math.round(ml)} ml`;
          } else {
            masaResult = g >= 1000
              ? `${numConComa(Math.round(g/10)/100)} kg`
              : `${Math.round(g)} g`;
          }
        }
      }

      // ---- 2) Volumenes (cda/cdta/taza -> ml y reves) -----------------
      const volDesdeOpts = ["taza","cda","cdta","ml","l"]
        .map(u => `<option value="${u}" ${c.vol.desde === u ? "selected" : ""}>${ETIQUETA_UNIDAD[u] || u}</option>`)
        .join("");
      const volMl = Number.isFinite(c.vol.cantidad) ? aMl(c.vol.cantidad, c.vol.desde) : null;
      const volResult = volMl == null ? "—" : (volMl >= 1000
        ? `${numConComa(Math.round(volMl/10)/100)} l`
        : `${numConComa(Math.round(volMl*10)/10)} ml`);
      const equivCda  = volMl == null ? "—" : numConComa(Math.round(volMl/15*10)/10);
      const equivCdta = volMl == null ? "—" : numConComa(Math.round(volMl/5*10)/10);
      const equivTaza = volMl == null ? "—" : numConComa(Math.round(volMl/240*100)/100);

      // ---- 3) Horno: °C / °F / nº gas ---------------------------------
      let cVal, fVal, gasVal;
      if (Number.isFinite(c.horno.valor)) {
        if (c.horno.unidad === "c") {
          cVal = c.horno.valor; fVal = cAf(cVal); gasVal = cAgas(cVal);
        } else if (c.horno.unidad === "f") {
          fVal = c.horno.valor; cVal = fAc(fVal); gasVal = cAgas(cVal);
        } else {
          cVal = gasAc(c.horno.valor); fVal = cVal == null ? null : cAf(cVal); gasVal = Number(c.horno.valor);
        }
      }

      cont.innerHTML = `
        <h1 class="vista-titulo">Conversores</h1>
        <p class="vista-subtitulo">Masa⇄volumen por densidad, equivalencias de volumen y horno.</p>

        <div class="conv-cards">
          <div class="conv-card">
            <h2>Masa ⇄ volumen (por densidad)</h2>
            <div class="conv-fila">
              <div class="campo">
                <label>Ingrediente</label>
                <select id="cv-masa-ref">${refOpts}</select>
              </div>
              <div class="campo">
                <label>Cantidad</label>
                <input id="cv-masa-cant" type="number" step="any" inputmode="decimal"
                       value="${Number.isFinite(c.masa.cantidad) ? c.masa.cantidad : ""}">
              </div>
              <div class="campo">
                <label>Unidad</label>
                <select id="cv-masa-desde">${desdeOpts}</select>
              </div>
            </div>
            <div class="conv-result">
              <span class="et">Equivalencia</span>
              <b>${esc(masaResult)}</b>
            </div>
            ${masaAviso ? `<div class="conv-aviso">${esc(masaAviso)}</div>` : ""}
          </div>

          <div class="conv-card">
            <h2>Volúmenes (cda · cdta · taza · ml · l)</h2>
            <div class="conv-fila">
              <div class="campo">
                <label>Cantidad</label>
                <input id="cv-vol-cant" type="number" step="any" inputmode="decimal"
                       value="${Number.isFinite(c.vol.cantidad) ? c.vol.cantidad : ""}">
              </div>
              <div class="campo" style="grid-column: span 2;">
                <label>Unidad de origen</label>
                <select id="cv-vol-desde">${volDesdeOpts}</select>
              </div>
            </div>
            <div class="conv-result">
              <span class="et">En ml</span>
              <b>${esc(volResult)}</b>
            </div>
            <table class="conv-tabla">
              <thead>
                <tr><th>Equivalencia</th><th>cdta</th><th>cda</th><th>taza</th></tr>
              </thead>
              <tbody>
                <tr><td>${esc(volResult)}</td>
                    <td class="num">${esc(equivCdta)}</td>
                    <td class="num">${esc(equivCda)}</td>
                    <td class="num">${esc(equivTaza)}</td></tr>
              </tbody>
            </table>
          </div>

          <div class="conv-card">
            <h2>Horno: °C · °F · nº gas</h2>
            <div class="conv-fila">
              <div class="campo">
                <label>Valor</label>
                <input id="cv-horno-val" type="number" step="any" inputmode="decimal"
                       value="${Number.isFinite(c.horno.valor) ? c.horno.valor : ""}">
              </div>
              <div class="campo" style="grid-column: span 2;">
                <label>Unidad</label>
                <select id="cv-horno-unidad">
                  <option value="c"   ${c.horno.unidad === "c" ? "selected" : ""}>°C</option>
                  <option value="f"   ${c.horno.unidad === "f" ? "selected" : ""}>°F</option>
                  <option value="gas" ${c.horno.unidad === "gas" ? "selected" : ""}>nº gas</option>
                </select>
              </div>
            </div>
            <div class="conv-result">
              <span class="et">Equivalencias</span>
              <b>${cVal == null ? "—" : `${Math.round(cVal)} °C`}
                · ${fVal == null ? "—" : `${Math.round(fVal)} °F`}
                · gas ${gasVal == null ? "—" : fmtGas(gasVal)}</b>
            </div>
            <table class="conv-tabla">
              <thead><tr><th>Gas</th><th>°C</th><th>°F</th></tr></thead>
              <tbody>
                ${GAS_MARKS.map(m =>
                  `<tr><td>${fmtGas(m.gas)}</td>
                       <td class="num">${m.c}</td>
                       <td class="num">${Math.round(cAf(m.c))}</td></tr>`
                ).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    /* ---- Datos ----------------------------------------------------------- */

    function abrirEditorIngrediente(clave) {
      if (clave) {
        const ing = estado.ingredientes.find(x => x.clave === clave);
        if (!ing) return;
        sesion.editor.ingrediente = JSON.parse(JSON.stringify(ing));
      } else {
        sesion.editor.ingrediente = ingredienteVacio();
      }
      sesion.editor.modo = "ingrediente";
      sesion.editor.errores = [];
      sesion.datosTab = "ingredientes";
      renderDatos();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
    function cerrarEditor() {
      sesion.editor = { modo: null, receta: null, ingrediente: null,
                        errores: [], incidencias: sesion.editor.incidencias || [] };
      renderDatos();
    }

    function guardarRecetaDesdeEditor() {
      const r = sesion.editor.receta;
      if (!r) return;
      // Normalizaciones antes de validar.
      if (!r.id && r.nombre) r.id = slugify(r.nombre);
      if (!r.nombre && r.id) r.nombre = r.id;
      r.tags = (r.tags || []).map(t => slugify(t)).filter(Boolean);
      r.dieta = (r.dieta || []).filter(d => ENUM_DIETA.includes(d));
      r.pasos = (r.pasos || []).map((p, i) => ({ ...p, n: i + 1 }));
      // Limpiar ingredientes con nombre vacio.
      r.ingredientes = (r.ingredientes || []).filter(ing => (ing.ref || (ing.nombre && ing.nombre.trim())));
      // Pasar nombre del catalogo si ref existe pero nombre vacio.
      r.ingredientes.forEach(ing => {
        if (ing.ref && !ing.nombre) {
          const i = estado.ingredientes.find(x => x.clave === ing.ref);
          if (i) ing.nombre = i.nombre;
        }
      });
      const ahora = nowISO();
      if (!r.creado) r.creado = ahora;
      r.modificado = ahora;
      const errores = validarReceta(r);
      if (errores.length) {
        sesion.editor.errores = errores;
        renderDatos();
        return;
      }
      const idx = estado.recetas.findIndex(x => x.id === r.id);
      if (idx >= 0) {
        // Preservar creado original.
        r.creado = estado.recetas[idx].creado || r.creado;
        estado.recetas[idx] = r;
      } else {
        estado.recetas.push(r);
      }
      guardarEstado();
      cerrarEditor();
      renderTodo();
    }
    function guardarIngredienteDesdeEditor() {
      const ing = sesion.editor.ingrediente;
      if (!ing) return;
      if (!ing.clave && ing.nombre) ing.clave = slugify(ing.nombre);
      const errores = validarIngredienteCatalogo(ing);
      if (errores.length) {
        sesion.editor.errores = errores;
        renderDatos();
        return;
      }
      const idx = estado.ingredientes.findIndex(x => x.clave === ing.clave);
      if (idx >= 0) estado.ingredientes[idx] = ing;
      else estado.ingredientes.push(ing);
      guardarEstado();
      cerrarEditor();
      renderTodo();
    }

    function borrarReceta(id) {
      const r = recetaPorId(id);
      if (!r) return;
      if (!confirm(`¿Borrar la receta "${r.nombre}"? Se eliminará también su estado en perfiles, plan y compra.`))
        return;
      estado.recetas = estado.recetas.filter(x => x.id !== id);
      // Limpiar referencias.
      PERFILES.forEach(p => { if (estado.estadoUsuario[p]) delete estado.estadoUsuario[p][id]; });
      // Limpia referencias a esta receta en cualquier slot del calendario.
      Object.keys(sesion.planificador.mes).forEach(fecha => {
        const d = sesion.planificador.mes[fecha];
        COMIDAS.forEach(c => { if (d[c] === id) d[c] = null; });
        if (!d.desayuno && !d.comida && !d.cena) delete sesion.planificador.mes[fecha];
      });
      sesion.compra.items = sesion.compra.items.filter(x => x.id !== id);
      if (sesion.recetaAbierta === id) sesion.recetaAbierta = null;
      guardarEstado(); guardarPlan(); guardarCompra();
      // Propagar borrado a Supabase (con cola offline).
      encolarBorrado("recetas", id);
      renderTodo();
    }
    function borrarIngrediente(clave) {
      const usado = estado.recetas.some(r =>
        r.ingredientes.some(i => i.ref === clave));
      if (usado) {
        if (!confirm(`El ingrediente "${clave}" está usado en recetas. Si lo borras, esas referencias se convertirán en ad-hoc al recargar. ¿Continuar?`)) return;
      } else {
        if (!confirm(`¿Borrar "${clave}"?`)) return;
      }
      estado.ingredientes = estado.ingredientes.filter(x => x.clave !== clave);
      // Convertir refs huerfanas a ad-hoc inmediatamente.
      estado.recetas.forEach(r => aplicarInvariante2(r, estado.ingredientes));
      sesion.disponibles.delete(clave);
      guardarEstado(); guardarDisponibles();
      // Propagar borrado a Supabase (con cola offline).
      encolarBorrado("ingredientes", clave);
      renderTodo();
    }

    /** Punto unico de re-render — delega en cada vista. */
    function renderTodo() {
      renderPerfil();
      renderNav();
      renderVistaActiva();

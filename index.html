      --text-muted:#3a3a3a;
      --text-inv:  #ffffff;
      --line:      #000000;
      --line-soft: #555555;
      --accent:    #a02400;
      --accent-bg: #ffd9ce;
      --focus:     #0040d0;
      --danger:    #a00000;
      --sh-1: 0 0 0 1px #000;
      --sh-2: 0 0 0 1px #000;
      --sh-3: 0 0 0 2px #000;
    }
    html.a11y-alto-contraste[data-tema="oscuro"] {
      --bg:        #000000;
      --bg-elev:   #060606;
      --bg-soft:   #1a1a1a;
      --bg-input:  #060606;
      --text:      #ffffff;
      --text-muted:#dddddd;
      --text-inv:  #000000;
      --line:      #ffffff;
      --line-soft: #888888;
      --accent:    #ffaa33;
      --accent-bg: #5c2e00;
      --focus:     #60a5fa;
      --danger:    #ff8a8a;
      --sh-1: 0 0 0 1px #fff;
      --sh-2: 0 0 0 1px #fff;
      --sh-3: 0 0 0 2px #fff;
    }
    /* En alto contraste los borders se hacen visibles */
    html.a11y-alto-contraste .tarjeta,
    html.a11y-alto-contraste .detalle-cabecera,
    html.a11y-alto-contraste .tarjeta-usuario,
    html.a11y-alto-contraste .bloque,
    html.a11y-alto-contraste .compra-panel,
    html.a11y-alto-contraste .lista-grupo,
    html.a11y-alto-contraste .nevera,
    html.a11y-alto-contraste .conv-card,
    html.a11y-alto-contraste .datos-card,
    html.a11y-alto-contraste .plan-dia,
    html.a11y-alto-contraste .timer {
      border-width: 2px;
    }

    /* Target tactil minimo en controles de cocina (Apple HIG 44pt, Material 48dp). */
    .raciones-btn,
    .timer-btn,
    .icon-btn { min-width: 38px; min-height: 38px; }

    /* En modo cocina, el panel de timers debe quedar por encima de la barra
       de navegacion del overlay sin esconderse al hacer scroll. */
    body.modo-cocina-activo .panel-timers { z-index: 110; }

    /* ---- Barra de acciones del detalle: sticky abajo en movil ----------- */
    @media (max-width: 720px) {
      .barra-acciones {
        position: sticky;
        bottom: 0;
        background: linear-gradient(to top, var(--bg) 70%, color-mix(in srgb, var(--bg) 0%, transparent));
        padding: var(--gap-3) 0 calc(var(--gap-3) + env(safe-area-inset-bottom));
        margin-top: var(--gap-3);
        z-index: 5;
      }
      .barra-acciones button { flex: 1; min-height: 48px; }
    }

    /* Texto-icono en .icon-btn (boton "Aa" de fuente grande). */
    .icon-btn.txt {
      font-family: var(--font-titulo);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .icon-btn[aria-pressed="true"] {
      background: var(--accent);
      color: var(--text-inv);
    }

    /* Buscador de la nevera (Inversa). */
    .nevera-buscar {
      flex: 1; min-width: 180px; max-width: 280px;
      background: var(--bg-soft);
      border: 1px solid transparent;
      border-radius: var(--r-pill);
      padding: 8px 14px;
      font-size: 14px;
      color: var(--text);
      transition: background .15s, border-color .15s;
    }
    .nevera-buscar:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--bg-elev);
    }

    /* ========================================================================
       REFRESH DE DISEÑO 3.0 — Inter en todo, paleta azul/cian, pesos ligeros,
       sombras frías, gradientes sutiles. Manteniendo efectos y compatibilidad
       con todas las fases.
       ======================================================================== */
    :root, :root[data-tema="claro"] {
      --accent-2: #06b6d4;        /* cyan-500, para gradientes */
    }
    :root[data-tema="oscuro"] {
      --accent-2: #22d3ee;        /* cyan-400 */
    }

    /* Header con cristal frío más definido */
    .cabecera {
      background: color-mix(in srgb, var(--bg) 82%, transparent);
      border-bottom: 1px solid color-mix(in srgb, var(--line-soft) 60%, transparent);
    }

    /* Marca: peso medio, tracking apretado */
    .marca {
      font-family: var(--font-ui);
      letter-spacing: -0.025em;
      font-weight: 600;
      font-size: 20px;
    }

    /* Chip nav activo con gradiente azul→cian */
    .chip[aria-current="page"] {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: var(--text-inv);
      box-shadow: 0 4px 14px color-mix(in srgb, var(--accent) 32%, transparent);
      font-weight: 500;
    }
    .chip { font-weight: 500; }

    /* Tarjeta amable: radio grande, hover sutil */
    .tarjeta {
      border-radius: 20px;
      border-color: var(--line-soft);
      transition: transform .18s cubic-bezier(.2,.8,.2,1),
                  box-shadow .18s cubic-bezier(.2,.8,.2,1),
                  border-color .18s ease;
    }
    .tarjeta:hover { transform: translateY(-2px); box-shadow: var(--sh-2); border-color: var(--line); }
    .chip-tipo { font-weight: 600; letter-spacing: 0.05em; }
    .tarjeta-nombre { font-weight: 800; letter-spacing: -0.02em; }
    html:not(.a11y-fuente-grande) .tarjeta-nombre { font-size: 20px; }

    /* Títulos de vista — finos, tracking apretado */
    .vista-titulo {
      font-weight: 600;
      letter-spacing: -0.03em;
    }
    .detalle-cabecera { border-radius: 24px; padding: var(--gap-5); }
    .detalle h1 { font-weight: 600; letter-spacing: -0.03em; }

    /* Botón principal: gradiente azul→cian, sombra fría */
    .btn-principal {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 6px 18px color-mix(in srgb, var(--accent) 28%, transparent);
      border: none;
      font-weight: 500;
    }
    .btn-principal:hover {
      box-shadow: 0 10px 24px color-mix(in srgb, var(--accent) 35%, transparent);
    }

    /* Botón "Modo cocina" outline con foco frío */
    .btn-cocina-iniciar { font-weight: 500; }
    .btn-cocina-iniciar:hover { background: color-mix(in srgb, var(--accent-bg) 70%, var(--bg)); }

    /* FAB con halo azul */
    .fab-timer {
      box-shadow: 0 10px 28px color-mix(in srgb, var(--accent) 28%, transparent),
                  0 1px 2px rgba(0,0,0,0.08);
    }

    /* Tarjetas de bloque con radio uniforme */
    .tarjeta-usuario, .bloque, .compra-panel, .lista-grupo,
    .nevera, .conv-card, .datos-card, .plan-dia {
      border-radius: 20px;
    }

    /* Latido al marcar favorito */
    .tarjeta-fav[aria-pressed="true"] { animation: latido .35s ease-out; }
    @keyframes latido {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.25); }
      100% { transform: scale(1); }
    }

    /* Inputs y selects: focus ring frío sutil */
    .busc-input, .editor input[type="text"], .editor input[type="number"],
    .editor input[type="search"], .editor input[type="url"], .editor select,
    .editor textarea, .conv-fila input, .conv-fila select,
    .nevera-buscar, .sel-buscar, .busc-ing-input,
    input[type="search"], input[type="text"], input[type="number"] {
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    .busc-input:focus, .editor input:focus, .editor select:focus,
    .editor textarea:focus, .conv-fila input:focus, .conv-fila select:focus,
    .nevera-buscar:focus, .sel-buscar:focus, .busc-ing-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
    }

    /* Barra de cobertura azul→cian */
    .tarjeta-cobertura-rell {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    /* Estrellas y elementos secundarios en cian */
    .estrellas, .estrellas-edit button.activa { color: var(--accent-2); }

    /* Pesos generales: más finos */
    body { font-weight: 400; letter-spacing: -0.005em; }
    label { font-weight: 500; }
    .perfil button { font-weight: 500; }
    .perfil button[aria-pressed="true"] { font-weight: 600; }

    /* Encabezados de sección con tracking apretado */
    .bloque-head h2, .datos-card-head h2, .conv-card h2 {
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    /* ========================================================================
       CABECERA DE RECETA — sin banner color, título grande coloreado.
       Modo cocina sigue full-color (más abajo).
       ======================================================================== */
    .detalle-cabecera {
      background: var(--bg-elev);
      color: var(--text);
      border: 1px solid var(--line-soft);
      border-left: 6px solid var(--chip-fg, var(--accent));
      box-shadow: var(--sh-1);
      position: relative;
      overflow: hidden;
    }
    .detalle-cabecera::before { display: none; }
    :root[data-tema="oscuro"] .detalle-cabecera {
      background: var(--bg-elev);
      color: var(--text);
      border-left-color: var(--chip-fg, var(--accent));
    }
    .detalle-cabecera h1 {
      color: var(--chip-fg, var(--accent));
      font-size: 38px;
      font-weight: 800;
      letter-spacing: -0.035em;
      line-height: 1.05;
    }
    @media (min-width: 720px) {
      .detalle-cabecera h1 { font-size: 52px; }
    }
    .detalle-cabecera .detalle-tiempos { color: var(--text-muted); opacity: 1; }
    .detalle-cabecera .detalle-tiempos b { color: var(--text); }
    .detalle-cabecera .chip-tipo {
      background: var(--chip-bg, var(--bg-soft));
      color: var(--chip-fg, var(--text-muted));
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }
    .detalle-cabecera .pill {
      background: var(--chip-bg, var(--bg-soft));
      color: var(--chip-fg, var(--text-muted));
    }
    .detalle-cabecera .pill-dieta {
      background: var(--chip-bg, var(--bg-soft));
      color: var(--chip-fg, var(--text-muted));
    }

    /* ---- Modo cocina: overlay full-color del tipo + texto blanco -------- */
    .modo-cocina {
      background: var(--chip-fg, var(--accent));
      color: #ffffff;
    }
    :root[data-tema="oscuro"] .modo-cocina {
      background: var(--chip-bg, var(--accent));
      color: var(--chip-fg, #fff);
    }
    .mc-head {
      background: rgba(0,0,0,0.18);
      border-bottom: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }
    .mc-head h1 { color: inherit; font-weight: 500; letter-spacing: -0.02em; }
    .mc-head .pasos-contador { color: inherit; opacity: 0.85; }
    .mc-cerrar { color: inherit; opacity: 0.9; }
    .mc-cerrar:hover { background: rgba(255,255,255,0.15); opacity: 1; }
    .mc-progreso { background: rgba(0,0,0,0.18); }
    .mc-progreso-rell { background: rgba(255,255,255,0.95); }

    /* Tipografía del paso — moderna, fina, con presencia */
    .mc-paso-num {
      color: inherit;
      opacity: 0.7;
      font-family: var(--font-ui);
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 0.12em;
    }
    .mc-paso-titulo {
      font-family: var(--font-ui);
      font-weight: 700;
      letter-spacing: -0.045em;
      font-size: 40px;
      line-height: 1.02;
      color: inherit;
    }
    @media (min-width: 720px) { .mc-paso-titulo { font-size: 64px; } }
    .mc-paso-texto {
      font-family: var(--font-ui);
      font-weight: 400;
      font-size: 21px;
      line-height: 1.55;
      letter-spacing: -0.005em;
      color: inherit;
      opacity: 0.96;
    }
    @media (min-width: 720px) { .mc-paso-texto { font-size: 26px; line-height: 1.5; } }

    .mc-paso-meta .pill {
      background: rgba(255,255,255,0.18);
      color: inherit;
      font-weight: 500;
    }
    .mc-paso-meta .pill b { color: inherit; }
    .mc-paso-ings {
      background: rgba(255,255,255,0.10);
      border-color: rgba(255,255,255,0.16);
      color: inherit;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .mc-paso-ings h3 { color: inherit; opacity: 0.7; }
    .mc-paso-ings li { border-color: rgba(255,255,255,0.12); }
    .mc-paso-ings .ing-cant,
    .mc-paso-ings .ing-nombre { color: inherit; }
    .mc-paso-ings .ing-unidad { color: inherit; opacity: 0.75; }

    /* Botón "Iniciar temporizador" — pill blanca contraste con fondo color */
    .mc-btn-temp {
      background: #ffffff;
      color: var(--chip-fg, var(--accent));
      font-weight: 600;
      border: none;
    }
    :root[data-tema="oscuro"] .mc-btn-temp {
      background: var(--chip-fg, #fff);
      color: var(--chip-bg, var(--accent));
    }
    .mc-btn-temp:hover { transform: translateY(-2px); }

    .mc-foot {
      background: rgba(0,0,0,0.18);
      border-top: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }
    .mc-btn-nav {
      background: rgba(255,255,255,0.15);
      color: inherit;
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-weight: 500;
    }
    .mc-btn-nav:not([disabled]):hover { background: rgba(255,255,255,0.25); }
    .mc-btn-nav.principal {
      background: #ffffff;
      color: var(--chip-fg, var(--accent));
      border-color: #ffffff;
      font-weight: 600;
    }
    :root[data-tema="oscuro"] .mc-btn-nav.principal {
      background: var(--chip-fg, #fff);
      color: var(--chip-bg, var(--accent));
    }
    .mc-btn-nav.principal:not([disabled]):hover { background: rgba(255,255,255,0.95); }

    /* ========================================================================
       BIBLIOTECA — vista lista, toggle vista, búsqueda, filtro favoritos
       ======================================================================== */
    .biblio-toolbar { align-items: center; }
    .biblio-acciones {
      display: flex; gap: var(--gap-2); align-items: center; flex-wrap: wrap;
      margin-left: auto;
    }
    .biblio-fav {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      border-radius: var(--r-pill);
      background: var(--bg-soft);
      color: var(--text-muted);
      font-size: 13px; font-weight: 500;
      transition: background .15s, color .15s;
    }
    .biblio-fav:hover { color: var(--text); }
    .biblio-fav[aria-pressed="true"] {
      background: var(--accent-bg);
      color: var(--accent);
    }
    .biblio-modo {
      display: inline-flex;
      background: var(--bg-soft);
      border-radius: var(--r-pill);
      padding: 2px;
    }
    .biblio-modo button {
      width: 34px; height: 30px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: var(--r-pill);
      color: var(--text-muted);
      font-size: 16px;
      transition: background .15s, color .15s;
    }
    .biblio-modo button[aria-pressed="true"] {
      background: var(--bg-elev);
      color: var(--text);
      box-shadow: var(--sh-1);
    }
    .biblio-busqueda { margin-bottom: var(--gap-3); }

    /* Sentinel del lazy loading */
    .biblio-sentinel {
      padding: var(--gap-5) 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      opacity: 0.6;
    }
    .biblio-sentinel::before {
      content: "";
      display: inline-block;
      width: 14px; height: 14px;
      margin-right: 8px;
      vertical-align: middle;
      border: 2px solid var(--line);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Chips de filtro por tipo — cada uno con su color */
    .biblio-tipos {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 4px 2px 12px;
      margin-bottom: var(--gap-3);
    }
    .biblio-tipos::-webkit-scrollbar { display: none; }
    .biblio-tipo-chip {
      flex-shrink: 0;
      padding: 6px 14px;
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border-radius: var(--r-pill);
      background: var(--tipo-chip-bg, var(--bg-soft));
      color: var(--tipo-chip-fg, var(--text-muted));
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: transform .12s, box-shadow .12s, border-color .12s;
      white-space: nowrap;
    }
    .biblio-tipo-chip:hover {
      transform: translateY(-1px);
      box-shadow: var(--sh-1);
    }
    .biblio-tipo-chip[aria-pressed="true"] {
      border-color: var(--tipo-chip-fg, var(--accent));
      box-shadow: 0 4px 12px color-mix(in srgb, var(--tipo-chip-fg, var(--accent)) 25%, transparent);
    }

    /* Fila de filtros tag (cocina, etiquetas) */
    .biblio-tags-row {
      display: flex; align-items: center; gap: var(--gap-3);
      padding: 4px 2px 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .biblio-tags-row::-webkit-scrollbar { display: none; }
    .biblio-tags-et {
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      font-weight: 600;
      opacity: 0.7;
      flex-shrink: 0;
    }
    .biblio-tags {
      display: flex; gap: 6px; flex-wrap: nowrap;
    }
    .biblio-tag-chip {
      flex-shrink: 0;
      padding: 5px 12px;
      font-size: 12.5px;
      font-weight: 500;
      border-radius: var(--r-pill);
      background: var(--bg-soft);
      color: var(--text-muted);
      border: 1px solid transparent;
      cursor: pointer;
      transition: background .12s, color .12s, border-color .12s;
      white-space: nowrap;
    }
    .biblio-tag-chip:hover { color: var(--text); }
    .biblio-tag-chip[aria-pressed="true"] {
      background: var(--accent);
      color: var(--text-inv);
      border-color: var(--accent);
    }

    /* Botones +/- en la sección "Tu cocina" */
    .cocinado-ctrl {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--bg-soft);
      border-radius: var(--r-pill);
      padding: 3px;
    }
    .cocinado-btn {
      min-width: 36px;
      height: 32px;
      padding: 0 10px;
      font-size: 14px;
      font-weight: 700;
      border-radius: var(--r-pill);
      color: var(--text);
      background: transparent;
      transition: background .12s, color .12s, transform .12s;
    }
    .cocinado-btn:hover:not([disabled]) {
      background: var(--bg-elev);
    }
    .cocinado-btn:active:not([disabled]) { transform: scale(0.95); }
    .cocinado-btn[disabled] { opacity: 0.3; cursor: not-allowed; }
    .cocinado-btn.principal {
      background: var(--accent);
      color: var(--text-inv);
    }
    .cocinado-btn.principal:hover { box-shadow: var(--sh-1); }
    .biblio-input {
      padding: 14px 18px;
      font-size: 15px;
      border-radius: var(--r-pill);
      border: 1px solid var(--line);
      background: var(--bg-elev);
    }
    .biblio-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 16%, transparent);
    }

    /* Vista LISTA */
    .tarjetas-lista { display: flex; flex-direction: column; gap: 6px; }
    .tarjeta-lista {
      display: flex; align-items: center; gap: var(--gap-3);
      padding: 12px 16px;
      background: var(--bg-elev);
      border: 1px solid var(--line-soft);
      border-radius: 14px;
      text-align: left;
      width: 100%;
      transition: transform .15s cubic-bezier(.2,.8,.2,1),
                  box-shadow .15s ease, border-color .15s;
      cursor: pointer;
    }
    .tarjeta-lista:hover {
      transform: translateY(-1px);
      box-shadow: var(--sh-1);
      border-color: var(--line);
    }
    .tarjeta-lista .chip-tipo {
      font-size: 10px;
      padding: 3px 9px;
      flex-shrink: 0;
    }
    .tarjeta-lista-nombre {
      flex: 1;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: -0.02em;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tarjeta-lista-meta {
      display: flex; align-items: center; gap: var(--gap-3);
      font-size: 12px;
      color: var(--text-muted);
      flex-shrink: 0;
      font-family: var(--font-ui);
    }
    .tarjeta-lista-meta .num {
      font-family: var(--font-ui);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
    }
    .tarjeta-lista .estrellas { font-size: 11px; }
    .tarjeta-lista .tarjeta-fav { margin-left: 4px; }
    @media (max-width: 600px) {
      .tarjeta-lista-meta { gap: var(--gap-2); font-size: 11px; }
      .tarjeta-lista-meta .estrellas { display: none; }
    }

    /* ========================================================================
       POPOVER DE FUENTE — slider en lugar de toggle
       ======================================================================== */
    .popover {
      position: fixed;
      top: 60px;
      right: 16px;
      background: var(--bg-elev);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--sh-3);
      padding: 16px;
      width: 260px;
      z-index: 40;
      animation: fadeIn .15s;
    }
    .popover-titulo {
      display: block;
      font-size: 11px; color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .popover-fuente input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      margin: 4px 0;
    }
    .popover-fuente-labels {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: 6px;
      color: var(--text-muted);
      padding: 0 4px;
    }
    .popover-fuente-labels span {
      font-family: var(--font-ui);
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .popover-fuente-labels .lvl-0 { font-size: 11px; }
    .popover-fuente-labels .lvl-1 { font-size: 14px; }
    .popover-fuente-labels .lvl-2 { font-size: 17px; }
    .popover-fuente-labels .lvl-3 { font-size: 22px; }
    .popover-actual {
      font-size: 12px;
      color: var(--text);
      font-weight: 600;
      text-align: center;
      margin-top: 8px;
    }

    /* ========================================================================
       FUENTE — 4 niveles via clases en <html>
       ======================================================================== */
    html.a11y-fuente-1 { --fs-body: 17px; }
    html.a11y-fuente-1 .vista-titulo { font-size: 30px; }
    @media (min-width: 720px) { html.a11y-fuente-1 .vista-titulo { font-size: 36px; } }

    html.a11y-fuente-2 { --fs-body: 19px; }
    html.a11y-fuente-2 .vista-titulo { font-size: 34px; }
    @media (min-width: 720px) { html.a11y-fuente-2 .vista-titulo { font-size: 40px; } }
    html.a11y-fuente-2 .tarjeta-nombre { font-size: 22px; }
    html.a11y-fuente-2 .lista-ing li, html.a11y-fuente-2 .lista-paso li { font-size: 16px; }

    html.a11y-fuente-3 { --fs-body: 22px; }
    html.a11y-fuente-3 .vista-titulo { font-size: 40px; }
    @media (min-width: 720px) { html.a11y-fuente-3 .vista-titulo { font-size: 48px; } }
    html.a11y-fuente-3 .tarjeta-nombre { font-size: 24px; }
    html.a11y-fuente-3 .lista-ing li, html.a11y-fuente-3 .lista-paso li { font-size: 18px; padding: 10px 12px; }
    html.a11y-fuente-3 .mc-paso-texto { font-size: 24px; }
    html.a11y-fuente-3 .mc-paso-titulo { font-size: 48px; }
    @media (min-width: 720px) {
      html.a11y-fuente-3 .mc-paso-texto { font-size: 30px; }
      html.a11y-fuente-3 .mc-paso-titulo { font-size: 76px; }
    }

    /* ========================================================================
       TEMPORIZADOR — anillo SVG circular con cuenta atrás
       ======================================================================== */
    .timer {
      gap: 14px;
      padding: 14px;
      border-radius: 18px;
      border-left-width: 0;
      border: 1px solid var(--line);
      background: var(--bg-elev);
      box-shadow: var(--sh-2);
    }
    .timer-anillo {
      position: relative;
      width: 56px; height: 56px;
      flex-shrink: 0;
    }
    .timer-anillo svg {
      width: 100%; height: 100%;
      transform: rotate(-90deg);
    }
    .timer-anillo circle {
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
    }
    .timer-anillo .bg-circ { stroke: var(--bg-soft); }
    .timer-anillo .fg-circ {
      stroke: var(--accent);
      stroke-dasharray: 100;
      transition: stroke-dashoffset .4s linear;
    }
    .timer-anillo .timer-restante {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--font-num);
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      font-size: 12.5px;
      color: var(--text);
      line-height: 1;
    }
    .timer.pausado .timer-anillo .fg-circ { stroke: var(--text-muted); }
    .timer.vencido .timer-anillo .fg-circ {
      stroke: var(--danger);
      stroke-dashoffset: 0;
    }
    .timer.vencido .timer-anillo svg { animation: latido 0.5s ease-in-out 4; }

    /* ========================================================================
       PILL DE CANTIDAD — "1 taza", "80 g", "300 ml"… al estilo Notion/Linear
       Se usa en detalle, modo cocina y lista de la compra.
       ======================================================================== */
    .ing-pill {
      display: inline-flex;
      align-items: center;
      padding: 4px 11px;
      border-radius: var(--r-pill);
      background: var(--bg-soft);
      font-family: var(--font-ui);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1, "cv11" 1;
      font-weight: 600;
      font-size: 12px;
      color: var(--text);
      flex-shrink: 0;
      margin-right: 8px;
      letter-spacing: 0;
      white-space: nowrap;
      line-height: 1.4;
    }
    /* Pill sobre fondo de color (cocina y cabecera): mismo tono oscuro que
       la cabecera del modo cocina + texto blanco. */
    .mc-paso-ings .ing-pill,
    .detalle-cabecera .ing-pill,
    .mc-paso-meta .pill {
      background: rgba(0,0,0,0.28);
      color: #ffffff;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.06);
    }
    /* En modo oscuro: un pelín más translúcido */
    :root[data-tema="oscuro"] .ing-pill {
      background: color-mix(in srgb, var(--bg-soft) 70%, var(--bg-elev));
    }

    /* ========================================================================
       INGREDIENTES — pill DEBAJO del nombre, en columna ordenada
       ======================================================================== */
    .lista-ing .ing-texto,
    .lista-compra .ing-texto,
    .mc-paso-ings .ing-texto {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }
    /* Detalle y compra: nombres sobre fondo claro/elev */
    .lista-ing .ing-nombre,
    .lista-compra .ing-nombre {
      font-weight: 500;
      font-size: 15px;
      color: var(--text);
      line-height: 1.35;
    }
    /* Cocina: nombres sobre fondo del tipo, hereda blanco */
    .mc-paso-ings .ing-nombre,
    .mc-ing-lista .ing-nombre {
      font-weight: 500;
      font-size: 16px;
      color: inherit;
      line-height: 1.35;
    }
    .ing-detalles {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .ing-detalles .ing-pill { margin-right: 0; }
    .ing-detalles .ing-opcional { margin-left: 0; vertical-align: middle; }
    .lista-ing .ing-nota,
    .lista-compra .ing-nota,
    .mc-paso-ings .ing-nota {
      margin-left: 0;
      font-style: italic;
      color: var(--text-muted);
      font-size: 12px;
    }
    /* Layout li: items align top porque el contenido ahora es vertical */
    .lista-ing li, .lista-compra li {
      align-items: flex-start;
      padding: 10px 12px;
    }
    /* En modo cocina cada ingrediente tiene su propia caja respirable */
    .mc-paso-ings li {
      padding: 12px 0;
    }

    /* ========================================================================
       PASOS — formato consistente: número en círculo del banner + cuerpo
       respirable. Funciona igual con o sin título.
       ======================================================================== */
    .detalle .lista-paso li {
      align-items: flex-start;
      gap: 14px;
      padding: 14px 12px;
    }
    .detalle .lista-paso .paso-num {
      flex-shrink: 0;
      width: 34px; height: 34px;
      background: var(--chip-fg, var(--accent));
      color: #ffffff;
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: -0.02em;
      border-radius: var(--r-pill);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 0;
      line-height: 1;
    }
    :root[data-tema="oscuro"] .detalle .lista-paso .paso-num {
      background: var(--chip-bg, var(--accent));
      color: var(--chip-fg, #ffffff);
    }
    .detalle .lista-paso .paso-texto {
      flex: 1; min-width: 0;
      font-size: 14.5px;
      line-height: 1.55;
      color: var(--text);
    }
    .detalle .lista-paso .paso-titulo {
      display: block;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 4px;
    }
    .detalle .lista-paso .paso-meta { margin-top: 10px; }

    /* ========================================================================
       INGREDIENTES — pill clara al lado del nombre (layout horizontal)
       ======================================================================== */
    .detalle .bloque .lista-ing li {
      display: flex;
      align-items: center;
      gap: var(--gap-3);
      padding: 10px 12px;
      background: transparent;
      border-radius: var(--r-md);
      transition: background .12s;
    }
    .detalle .bloque .lista-ing li:hover {
      background: var(--bg-soft);
    }
    .detalle .bloque .lista-ing input[type="checkbox"] {
      width: 18px; height: 18px;
      margin-top: 0;
      accent-color: var(--accent);
      flex-shrink: 0;
      border-radius: 4px;
    }
    /* Layout horizontal: nombre + pill + nota/opcional en una sola fila */
    .detalle .bloque .lista-ing .ing-texto {
      display: flex;
      flex-direction: row;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }
    .detalle .bloque .lista-ing .ing-nombre {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      letter-spacing: -0.015em;
      line-height: 1.3;
    }
    .detalle .bloque .lista-ing .ing-detalles {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      margin-left: 0;
    }
    /* Pill con la versión clara del color del tipo de receta */
    .detalle .bloque .ing-pill {
      background: var(--chip-bg, var(--bg-soft));
      color: var(--chip-fg, var(--text));
      border: 1px solid transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      padding: 3px 10px;
      font-family: var(--font-ui);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
      font-weight: 600;
      font-size: 12.5px;
      letter-spacing: -0.005em;
      margin: 0;
      white-space: nowrap;
      border-radius: var(--r-pill);
    }
    /* "opcional" como pill clara sutil */
    .detalle .bloque .lista-ing .ing-opcional {
      background: var(--bg-soft);
      color: var(--text-muted);
      padding: 2px 9px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0;
      border-radius: var(--r-pill);
    }
    /* Nota inline en cursiva sutil */
    .detalle .bloque .lista-ing .ing-nota {
      color: var(--text-muted);
      font-size: 12.5px;
      font-style: italic;
      margin: 0;
      font-weight: 400;
      display: inline-block;
      width: 100%;
      margin-top: 2px;
    }
    /* Tachado limpio */
    .detalle .bloque .lista-ing li.tachado {
      opacity: 0.45;
    }
    .detalle .bloque .lista-ing li.tachado .ing-nombre,
    .detalle .bloque .lista-ing li.tachado .ing-pill,
    .detalle .bloque .lista-ing li.tachado .ing-nota {
      text-decoration: line-through;
      text-decoration-thickness: 1px;
    }
    /* Meta de pasos (⏱ tiempo, 🌡 horno): pills del color del banner. */
    .detalle .lista-paso .paso-meta {
      gap: 6px;
    }
    .detalle .lista-paso .paso-meta span {
      display: inline-flex;
      align-items: center;
      background: var(--chip-fg, var(--accent));
      color: #ffffff;
      padding: 4px 10px;
      border-radius: var(--r-pill);
      font-size: 12px;
      font-weight: 500;
    }
    .detalle .lista-paso .paso-meta b {
      color: inherit;
      margin-left: 4px;
      font-family: var(--font-num);
      font-variant-numeric: tabular-nums;
    }
    :root[data-tema="oscuro"] .detalle .lista-paso .paso-meta span {
      background: var(--chip-bg, var(--accent));
      color: var(--chip-fg, #ffffff);
    }

    /* ========================================================================
       MODO COCINA — centrado + respiración + responsive móvil
       ======================================================================== */
    .mc-body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100%;
      padding: var(--gap-6) var(--gap-4);
    }
    .mc-paso {
      width: 100%;
      max-width: 720px;
      text-align: center;
      margin: 0 auto;
    }
    .mc-paso-num { margin-bottom: var(--gap-3); }
    .mc-paso-titulo { margin-bottom: var(--gap-4); }
    .mc-paso-texto { margin-bottom: var(--gap-6); }
    .mc-paso-meta {
      justify-content: center;
      margin-bottom: var(--gap-5);
    }
    .mc-btn-temp {
      display: inline-flex;
      margin: 0 auto var(--gap-6);
    }
    .mc-paso-ings {
      text-align: left;
      max-width: 520px;
      margin: var(--gap-3) auto 0;
      padding: var(--gap-4) var(--gap-5);
    }
    .mc-paso-ings ul li {
      justify-content: flex-start;
      padding: 10px 0;
    }

    /* Botones de navegación cocina: flecha grande visible siempre */
    .mc-btn-nav {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .mc-btn-nav .mc-flecha {
      font-family: var(--font-ui);
      font-weight: 400;
      font-size: 22px;
      line-height: 1;
      display: inline-block;
    }
    .mc-btn-nav .mc-label { font-weight: 500; }

    /* Móvil: botones más grandes y solo flechas si el espacio es justo */
    @media (max-width: 720px) {
      .mc-foot {
        gap: var(--gap-2);
        padding: var(--gap-3) var(--gap-3);
        padding-bottom: calc(var(--gap-3) + env(safe-area-inset-bottom));
      }
      .mc-btn-nav {
        min-height: 60px;
        font-size: 16px;
        padding: 16px 14px;
      }
      .mc-btn-nav .mc-flecha { font-size: 24px; }
      .mc-paso-num { font-size: 11px; }
    }
    @media (max-width: 400px) {
      .mc-btn-nav .mc-label { display: none; }
      .mc-btn-nav .mc-flecha { font-size: 28px; }
    }

    /* Hint sutil "desliza" en móvil al abrir el modo cocina (primer paso) */
    .mc-hint-swipe {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      pointer-events: none;
      opacity: 0;
      animation: hintFade 3.5s ease-in-out forwards;
    }
    @keyframes hintFade {
      0%   { opacity: 0; }
      15%  { opacity: 1; }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }
    @media (min-width: 720px) { .mc-hint-swipe { display: none; } }

    /* ========================================================================
       DETALLE: tabs Ingredientes / Pasos + botón Modo cocina arriba
       ======================================================================== */
    .detalle-tabs-bar {
      display: flex;
      align-items: center;
      gap: var(--gap-3);
      flex-wrap: wrap;
      margin-bottom: var(--gap-3);
    }
    .detalle-tabs {
      display: inline-flex;
      background: var(--bg-soft);
      border-radius: var(--r-pill);
      padding: 3px;
    }
    .detalle-tabs button {
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--r-pill);
      color: var(--text-muted);
      transition: background .15s, color .15s;
      cursor: pointer;
    }
    .detalle-tabs button[aria-pressed="true"] {
      background: var(--bg-elev);
      color: var(--text);
      box-shadow: var(--sh-1);
      font-weight: 600;
    }
    .btn-cocina-top { margin-left: auto; }

    /* Acción en negrita dentro del cuerpo del paso */
    .detalle .paso-cuerpo strong {
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .mc-paso-texto strong {
      font-weight: 800;
      color: inherit;
    }

    /* ========================================================================
       MODO COCINA: portada e ingredientes
       ======================================================================== */
    .mc-portada {
      text-align: center;
      padding: var(--gap-5) 0;
    }
    .mc-portada .chip-tipo {
      display: inline-block;
      background: rgba(0,0,0,0.28) !important;
      color: #ffffff !important;
      margin-bottom: var(--gap-5);
      padding: 6px 14px;
      font-size: 12px;
    }
    .mc-portada-titulo {
      font-family: var(--font-ui);
      font-size: 44px;
      font-weight: 700;
      letter-spacing: -0.045em;
      line-height: 1.02;
      margin-bottom: var(--gap-4);
      color: inherit;
    }
    @media (min-width: 720px) {
      .mc-portada-titulo { font-size: 80px; }
    }
    .mc-portada-meta {
      font-size: 18px;
      opacity: 0.9;
      font-weight: 400;
      margin: 0;
    }
    @media (min-width: 720px) {
      .mc-portada-meta { font-size: 22px; }
    }

    .mc-ingredientes-full {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
    }
    .mc-ingredientes-full .mc-paso-num,
    .mc-ingredientes-full .mc-paso-titulo {
      text-align: center;
    }
    .mc-ingredientes-full .mc-tit-medio {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: var(--gap-5);
      letter-spacing: -0.02em;
    }
    @media (min-width: 720px) {
      .mc-ingredientes-full .mc-tit-medio { font-size: 36px; }
    }
    .mc-ing-lista {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      text-align: left;
    }
    .mc-ing-lista li {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .mc-ing-lista li:hover { background: rgba(255,255,255,0.14); }
    .mc-ing-lista li.tachado { opacity: 0.45; }
    .mc-ing-lista li.tachado .ing-texto { text-decoration: line-through; }
    .mc-ing-lista input[type="checkbox"] {
      width: 22px; height: 22px;
      margin-top: 2px;
      accent-color: var(--accent);
      flex-shrink: 0;
      cursor: pointer;
    }
    .mc-ing-lista .ing-nombre {
      color: inherit;
      font-size: 16px;
      font-weight: 500;
    }
    .mc-ing-lista .ing-pill {
      background: rgba(0,0,0,0.28);
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .mc-ing-lista .ing-opcional {
      background: rgba(255,255,255,0.18);
      color: inherit;
    }

    /* ========================================================================
       COHERENCIA CROMÁTICA — overrides para modo cocina y banner del detalle.
       Todos los textos heredan blanco; los acentos secundarios usan opacidad.
       ======================================================================== */
    .modo-cocina .ing-nombre,
    .modo-cocina .ing-cant,
    .modo-cocina .paso-titulo,
    .modo-cocina h2, .modo-cocina h3, .modo-cocina h4 {
      color: inherit;
    }
    .modo-cocina .ing-unidad,
    .modo-cocina .ing-nota,
    .modo-cocina .ing-nota * {
      color: inherit;
      opacity: 0.78;
    }
    .modo-cocina .ing-aviso {
      color: #fff;
      background: rgba(255,90,90,0.32);
      padding: 2px 8px;
      border-radius: var(--r-pill);
      font-size: 11px;
      margin-left: 4px;
    }
    .modo-cocina .ing-opcional {
      color: inherit;
      background: rgba(255,255,255,0.18);
      opacity: 0.95;
    }
    .modo-cocina .tachado .ing-texto,
    .modo-cocina .tachado .paso-texto {
      text-decoration: line-through;
      text-decoration-color: rgba(255,255,255,0.7);
    }
    /* Banner de la receta (cabecera del detalle, ya con fondo color) */
    .detalle-cabecera .ing-nombre,
    .detalle-cabecera .ing-cant,
    .detalle-cabecera .ing-unidad,
    .detalle-cabecera .ing-aviso,
    .detalle-cabecera .ing-opcional,
    .detalle-cabecera .ing-nota { color: inherit; }
    /* Mini-cards de tiempos: misma familia de color que el tipo (claro) */
    .detalle-cabecera .detalle-tiempos > span {
      background: var(--chip-bg, var(--bg-soft));
      color: var(--chip-fg, var(--text-muted));
      border: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      opacity: 0.85;
    }
    .detalle-cabecera .detalle-tiempos > span b {
      color: var(--chip-fg, var(--text));
      opacity: 1;
    }
    /* Estado de "ingredientes del paso" en cocina (tarjeta translúcida) */
    .mc-paso-ings,
    .mc-paso-ings * {
      /* Hereda blanco automáticamente; no se fija ningún var(--text) */
    }
    .mc-paso-ings .ing-detalles .ing-pill {
      background: rgba(0,0,0,0.28);
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.08);
    }
    /* Pantalla "Ingredientes" del modo cocina */
    .mc-ing-lista .ing-aviso,
    .mc-ing-lista .ing-nota,
    .mc-ing-lista .ing-unidad {
      color: inherit;
      opacity: 0.85;
    }
    .mc-ing-lista .tachado { opacity: 0.45; }
    /* Header del overlay: contador + título siempre legibles */
    .mc-head h1, .mc-head .pasos-contador { color: inherit; }

    /* ========================================================================
       TARJETAS FULL-COLOR — fondo del tipo + letras blancas
       ======================================================================== */
    .tarjeta {
      background: var(--chip-fg, var(--bg-elev));
      color: #ffffff;
      border-color: transparent;
      position: relative;
      overflow: hidden;
    }
    .tarjeta::before {
      content: "";
      position: absolute; inset: 0;
      background: radial-gradient(at top right, rgba(255,255,255,0.15), transparent 55%);
      pointer-events: none;
    }
    .tarjeta > * { position: relative; z-index: 1; }
    :root[data-tema="oscuro"] .tarjeta {
      background: var(--chip-bg, var(--bg-elev));
      color: var(--chip-fg, #fff);
    }

    .tarjeta .tarjeta-nombre,
    .tarjeta .tarjeta-meta dd { color: inherit; }
    .tarjeta .tarjeta-meta dt {
      color: inherit;
      opacity: 0.72;
    }
    .tarjeta .tarjeta-fav { color: inherit; opacity: 0.85; }
    .tarjeta .tarjeta-fav:hover { background: rgba(255,255,255,0.15); opacity: 1; }
    .tarjeta .tarjeta-fav[aria-pressed="true"] {
      color: #ffffff;
      opacity: 1;
    }
    .tarjeta .chip-tipo {
      background: rgba(0,0,0,0.22) !important;
      color: #ffffff !important;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .tarjeta .estrellas { color: #ffffff; }
    .tarjeta .estrellas .vacia { color: rgba(255,255,255,0.30); }

    /* Misma cromática para la vista LISTA */
    .tarjeta-lista {
      background: var(--chip-fg, var(--bg-elev));
      color: #ffffff;
      border-color: transparent;
    }
    :root[data-tema="oscuro"] .tarjeta-lista {
      background: var(--chip-bg, var(--bg-elev));
      color: var(--chip-fg, #fff);
    }
    .tarjeta-lista .tarjeta-lista-nombre { color: inherit; }
    .tarjeta-lista .tarjeta-lista-meta { color: inherit; opacity: 0.85; }
    .tarjeta-lista .tarjeta-lista-meta .num { color: inherit; }
    .tarjeta-lista .chip-tipo {
      background: rgba(0,0,0,0.22) !important;
      color: #ffffff !important;
    }
    .tarjeta-lista .tarjeta-fav { color: inherit; opacity: 0.85; }
    .tarjeta-lista .tarjeta-fav[aria-pressed="true"] { color: #ffffff; opacity: 1; }
    .tarjeta-lista .estrellas { color: #ffffff; }
    .tarjeta-lista .estrellas .vacia { color: rgba(255,255,255,0.30); }

    /* ========================================================================
       GATE — pantalla de login obligatorio antes de ver la app
       ======================================================================== */
    body.gate-activo > header,
    body.gate-activo > main,
    body.gate-activo > #panel-timers,
    body.gate-activo > #fab-timer,
    body.gate-activo > #modo-cocina,
    body.gate-activo > #modal-nuevo-timer,
    body.gate-activo > #modal-selector,
    body.gate-activo > #popover-fuente { display: none !important; }
    body.gate-activo { overflow: hidden; }
    .gate {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      padding: var(--gap-5);
    }
    .gate-box {
      max-width: 400px; width: 100%;
      background: var(--bg-elev);
      border-radius: 24px;
      padding: var(--gap-6);
      box-shadow: var(--sh-3);
      border: 1px solid var(--line-soft);
    }
    .gate-titulo {
      font-family: var(--font-ui);
      font-size: 36px; font-weight: 700;
      letter-spacing: -0.04em;
      text-align: center;
      margin-bottom: 6px;
    }
    .gate-subtitulo {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: var(--gap-5);
    }
    .gate-campo {
      display: flex; flex-direction: column; gap: 6px;
      margin-bottom: var(--gap-3);
    }
    .gate-campo label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
      font-weight: 600; color: var(--text-muted);
    }
    .gate-campo input {
      background: var(--bg-input);
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      padding: 13px 14px;
      font-size: 15px;
      color: var(--text);
      transition: border-color .15s, box-shadow .15s;
    }
    .gate-campo input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
    }

              && Array.isArray(obj.ingredientes)
              && Array.isArray(obj.recetas)
              && obj.estadoUsuario && typeof obj.estadoUsuario === "object") {
            estado = obj;
            // Garantizar que existan los tres perfiles en estadoUsuario.
            PERFILES.forEach(p => { if (!estado.estadoUsuario[p]) estado.estadoUsuario[p] = {}; });

      }
      estado = estructuraInicial();
      guardarEstado();

    /**
     * T1: persistir cada cambio. La cuenta atras se calcula SIEMPRE desde
     * finMs - Date.now() (cuando esta activo) o restanteMs (cuando pausado),

    function guardarTimers() {

    function cargarTimers() {
      try {
        const raw = localStorage.getItem(KEY_TIMERS);
        if (!raw) return;
        const arr = JSON.parse(raw);
        if (!Array.isArray(arr)) return;
        sesion.timers = arr.filter(t => t && typeof t === "object").map(t => ({
          id:        String(t.id || ""),
          etiqueta:  String(t.etiqueta || "Temporizador"),
          duracionMs: Number(t.duracionMs) || 0,
          finMs:     t.finMs == null ? null : Number(t.finMs),
          restanteMs: t.restanteMs == null ? null : Number(t.restanteMs),
          pausado:   !!t.pausado,
          vencido:   !!t.vencido,
          recetaId:  t.recetaId || null,
          pasoN:     t.pasoN || null
        }));
        // Al cargar, transicionar a "vencido" los que ya vencieron mientras la
        // app estaba cerrada — sin disparar aviso (no sonar tarde) (T1).
        const now = Date.now();
        sesion.timers.forEach(t => {
          if (!t.pausado && !t.vencido && t.finMs != null && t.finMs <= now) {
            t.vencido = true;
          }
        });
      } catch (_) {/* ignora */}
    }

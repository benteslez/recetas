    /* ---- Helpers de fecha (calendario mensual) ------------------------- */
    function mesActualISO() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    }
    function nombreMes(yyyymm) {
      const [y, m] = yyyymm.split("-").map(Number);
      return `${NOMBRES_MES[m-1]} ${y}`;
    }
    function diasDelMes(yyyymm) {
      const [y, m] = yyyymm.split("-").map(Number);
      return new Date(y, m, 0).getDate();
    }
    /** Día de la semana del 1 del mes en lunes-domingo (0=lun, 6=dom). */
    function primerDiaSemanaMes(yyyymm) {
      const [y, m] = yyyymm.split("-").map(Number);
      const d = new Date(y, m-1, 1).getDay(); // 0=domingo
      return (d + 6) % 7;
    }
    function fechaISO(yyyymm, dia) {
      return `${yyyymm}-${String(dia).padStart(2,"0")}`;
    }
    function mesAnteriorISO(yyyymm) {
      const [y, m] = yyyymm.split("-").map(Number);
      if (m === 1) return `${y-1}-12`;
      return `${y}-${String(m-1).padStart(2,"0")}`;
    }
    function mesSiguienteISO(yyyymm) {
      const [y, m] = yyyymm.split("-").map(Number);
      if (m === 12) return `${y+1}-01`;
      return `${y}-${String(m+1).padStart(2,"0")}`;
    }
    function fmtFechaISO(date) {
      return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
    }
    function lunesDeSemana(yyyymmdd) {
      const [y,m,d] = yyyymmdd.split("-").map(Number);
      const date = new Date(y, m-1, d);
      const offset = (date.getDay() + 6) % 7;
      date.setDate(date.getDate() - offset);
      return fmtFechaISO(date);
    }
    function semanaAnteriorISO(lunesISO) {
      const [y,m,d] = lunesISO.split("-").map(Number);
      const date = new Date(y, m-1, d);
      date.setDate(date.getDate() - 7);
      return fmtFechaISO(date);
    }
    function semanaSiguienteISO(lunesISO) {
      const [y,m,d] = lunesISO.split("-").map(Number);
      const date = new Date(y, m-1, d);
      date.setDate(date.getDate() + 7);
      return fmtFechaISO(date);
    }
    function fechasDeSemana(lunesISO) {
      const [y,m,d] = lunesISO.split("-").map(Number);
      const date = new Date(y, m-1, d);
      const arr = [];
      for (let i = 0; i < 7; i++) {
        arr.push(fmtFechaISO(date));
        date.setDate(date.getDate() + 1);
      }
      return arr;
    }
    function tituloSemana(lunesISO) {
      const f = fechasDeSemana(lunesISO);
      const ini = f[0].split("-").map(Number);
      const fin = f[6].split("-").map(Number);
      // "9 – 15 jun"  o  "29 jun – 5 jul"
      if (ini[1] === fin[1]) {
        return `${ini[2]} – ${fin[2]} ${NOMBRES_MES[ini[1]-1].slice(0,3).toLowerCase()} ${ini[0]}`;
      }
      return `${ini[2]} ${NOMBRES_MES[ini[1]-1].slice(0,3).toLowerCase()} – ${fin[2]} ${NOMBRES_MES[fin[1]-1].slice(0,3).toLowerCase()} ${fin[0]}`;
    }

    /** Devuelve las 7 fechas (L-D) de la semana que contiene a hoy. */
    function semanaActualFechas() {
      const hoy = new Date();
      const offset = (hoy.getDay() + 6) % 7;
      const lunes = new Date(hoy);
      lunes.setDate(hoy.getDate() - offset);
      const arr = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(lunes);
        d.setDate(lunes.getDate() + i);
        arr.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`);
      }
      return arr;
    }
    function diaDelMes(fecha) {
      // "YYYY-MM-DD" -> {desayuno, comida, cena}
      return sesion.planificador.mes[fecha] || { desayuno: null, comida: null, cena: null };
    }

    function guardarPlan() {
      localStorage.setItem(KEY_PLAN, JSON.stringify({ mes: sesion.planificador.mes }));
    }
    function cargarPlan() {
      sesion.planificador.mes = {};
      sesion.planificadorMes = mesActualISO();
      try {
        const raw = localStorage.getItem(KEY_PLAN);
        if (!raw) return;
        const o = JSON.parse(raw);
        if (!o || typeof o !== "object") return;
        // Formato mensual nuevo: { mes: { "YYYY-MM-DD": {...} } }
        if (o.mes && typeof o.mes === "object") {
          for (const fecha in o.mes) {
            if (!/^\d{4}-\d{2}-\d{2}$/.test(fecha)) continue;
            const d = o.mes[fecha];
            if (!d || typeof d !== "object") continue;
            const slot = {
              desayuno: typeof d.desayuno === "string" ? d.desayuno : null,
              comida:   typeof d.comida   === "string" ? d.comida   : null,
              cena:     typeof d.cena     === "string" ? d.cena     : null
            };
            // Solo guardar si tiene algo asignado
            if (slot.desayuno || slot.comida || slot.cena) {
              sesion.planificador.mes[fecha] = slot;
            }
          }
        }
        // Si llega un formato antiguo (semanal), se ignora silenciosamente.
      } catch (_) {/* ignora */}
    }


    /* ========================================================================
       (c) UTILIDADES
       Pequenas funciones reutilizables consumidas por todas las fases.
       ======================================================================== */

    /**
     * Convierte un texto a slug segun invariante 1:
     * minusculas, sin acentos, separador "-", solo [a-z0-9-].
     */
    function slugify(txt) {
      return String(txt == null ? "" : txt)
        .toLowerCase()
        .normalize("NFD").replace(/[̀-ͯ]/g, "")  // quita diacriticos
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    /**
     * Normaliza para busqueda: acento- y mayuscula-insensible.
     * NO sustituye espacios por guiones (eso es slugify).
     */
    function normaliza(txt) {
      return String(txt == null ? "" : txt)
        .toLowerCase()
        .normalize("NFD").replace(/[̀-ͯ]/g, "");
    }

    /** Devuelve la marca temporal actual en ISO 8601 UTC. */
    function nowISO() {
      return new Date().toISOString();
    }

    /** Fecha local en formato ISO 8601 date (YYYY-MM-DD). Para ultimaVez. */
    function hoyISO() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    /** Escapa texto para inyectar en innerHTML. */
    function esc(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    /** Estado de usuario por defecto (sin persistir todavia). */
    function estadoUsuarioVacio() {
      return {
        favorito: false,
        valoracion: null,
        vecesCocinada: 0,
        ultimaVez: null,
        notasPersonales: null,
        ajustes: null,
        estado: null,
        colecciones: []
      };
    }

    /**
     * Lee el estado de un usuario para una receta.
     * No persiste si no existia: devuelve una copia con defaults.
     */
    function getEstado(perfil, idReceta) {
      const u = (estado && estado.estadoUsuario && estado.estadoUsuario[perfil]) || null;
      if (u && u[idReceta]) {
        return { ...estadoUsuarioVacio(), ...u[idReceta] };
      }
      return estadoUsuarioVacio();
    }

    /**
     * Aplica un parche al estado de un usuario para una receta y persiste.
     * Crea contenedor de perfil/receta si no existian. T5: SOLO para el perfil dado.
     */
    function setEstado(perfil, idReceta, parcial) {
      if (!PERFILES.includes(perfil)) return;
      if (!estado.estadoUsuario[perfil]) estado.estadoUsuario[perfil] = {};
      const previo = estado.estadoUsuario[perfil][idReceta] || estadoUsuarioVacio();
      estado.estadoUsuario[perfil][idReceta] = { ...previo, ...parcial, modificado: nowISO() };
      guardarEstado();
      programarAutoSync();   // sync diferido si está conectado
    }

    /** Busca una receta por id. */
    function recetaPorId(id) {
      return estado.recetas.find(r => r.id === id) || null;
    }

    /**
     * Tiempo total en minutos — campo DERIVADO (T7), nunca persistido.
     */
    function tiempoTotalMin(r) {
      return (Number(r.tiempoPrep)||0) + (Number(r.tiempoCoccion)||0);
    }

    /** Formatea minutos a "1 h 15 min", "35 min", "—". */
    function formateaMin(min) {
      if (!min || min <= 0) return "—";
      if (min < 60) return `${min} min`;
      const h = Math.floor(min / 60);
      const m = min % 60;
      return m === 0 ? `${h} h` : `${h} h ${m} min`;
    }

    /** Formatea segundos (paso.tiempo) a "MM:SS" o "H:MM:SS". */
    function formateaSeg(s) {
      if (s == null || s < 0) return "—";
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      const pad = n => String(n).padStart(2, "0");
      return h > 0 ? `${h}:${pad(m)}:${pad(sec)}` : `${m}:${pad(sec)}`;
    }

    /* --------- ESCALADO Y REDONDEO LEGIBLE (T4) ----------------------------
       Reglas por unidad:
         - cantidad:null  -> no se escala. Devuelve null.
         - "ud","hoja","diente","rodaja","loncha","rama","pizca"
                          -> discretas. Si no es entero, aviso "→ N (ajusta)";
                             intenta primero fraccion comoda (¼, ⅓, ½, ⅔, ¾).
         - "g","ml"       -> <10: 1 decimal; 10-99: entero; >=100: multiplo de 5.
         - "kg","l"       -> <1: 2 decimales; >=1: 1 decimal.
         - "cda","cdta","taza" -> fraccion comoda o multiplo de 1/4.
         - "al_gusto","cn"-> no escala (ya viene con cantidad:null normalmente).
         - otras          -> formato libre con coma decimal.
       Mantener cantidad y cantidadMax escalados con la MISMA regla.
       --------------------------------------------------------------------- */

    const UNIDADES_DISCRETAS = ["ud","hoja","diente","rodaja","loncha","rama","pizca"];
    const FRACCIONES = [
      [0,    ""],
      [0.25, "¼"],
      [1/3,  "⅓"],
      [0.5,  "½"],
      [2/3,  "⅔"],
      [0.75, "¾"]
    ];
    const TOLERANCIA = 0.06;

    function fraccionCercana(x) {
      const ent = Math.floor(x);
      const frac = x - ent;
      let mejor = null, dist = Infinity;
      for (const [v, lbl] of FRACCIONES) {
        const d = Math.abs(frac - v);
        if (d < dist) { dist = d; mejor = [v, lbl]; }
      }
      // tambien probar redondeo al entero superior
      const distArriba = 1 - frac;
      if (distArriba < dist) return { ok: false };

      if (dist > TOLERANCIA) return { ok: false };
      const [v, lbl] = mejor;
      if (v === 0) return { ok: true, txt: String(ent) };
      if (ent === 0) return { ok: true, txt: lbl };
      return { ok: true, txt: `${ent} ${lbl}` };
    }

    function numConComa(n) {
      // Limpia ceros finales y usa coma decimal espanola.
      const s = (Math.round(n * 100) / 100).toString();
      return s.replace(".", ",");
    }

    /**
     * Resultado: { txt: string, aviso: string|null }
     * - txt: cadena legible (puede contener fraccion + entero).
     * - aviso: texto rojo opcional cuando se redondea de forma no exacta.
     */
    function formateaCantidad(cant, unidad) {
      if (cant == null) return { txt: "", aviso: null };

      if (UNIDADES_DISCRETAS.includes(unidad)) {
        const ent = Math.round(cant);
        if (Math.abs(cant - ent) < 0.04) return { txt: String(ent), aviso: null };
        const frac = fraccionCercana(cant);
        if (frac.ok) return { txt: frac.txt, aviso: null };
        const arriba = Math.ceil(cant);
        return { txt: `${numConComa(cant)} → ${arriba}`, aviso: "ajusta" };
      }

      if (unidad === "g" || unidad === "ml") {
        if (cant < 10) return { txt: numConComa(Math.round(cant * 10) / 10), aviso: null };
        if (cant < 100) return { txt: String(Math.round(cant)), aviso: null };
        return { txt: String(Math.round(cant / 5) * 5), aviso: null };
      }

      if (unidad === "kg" || unidad === "l") {
        if (cant < 1) return { txt: numConComa(Math.round(cant * 100) / 100), aviso: null };
        return { txt: numConComa(Math.round(cant * 10) / 10), aviso: null };
      }

      if (unidad === "cda" || unidad === "cdta" || unidad === "taza") {
        const ent = Math.round(cant);
        if (Math.abs(cant - ent) < 0.04) return { txt: String(ent), aviso: null };
        const frac = fraccionCercana(cant);
        if (frac.ok) return { txt: frac.txt, aviso: null };
        // multiplo de 1/4 como ultimo recurso
        const cuartos = Math.round(cant * 4) / 4;
        return { txt: numConComa(cuartos), aviso: null };
      }

      // al_gusto, cn, otros: no aplica (cant suele ser null y ya cortamos arriba)
      return { txt: numConComa(cant), aviso: null };
    }

    /**
     * Renderiza la cantidad+unidad como un único pill ("1 taza", "80 g",
     * "100–200 ml", "al gusto"). Se usa en detalle, modo cocina y compra.
     * Devuelve { html, aviso } por si hay que pintar "(ajusta)" aparte.
     */
    function pillCantidadHTML(cant, cantMax, unidad) {
      const f1 = formateaCantidad(cant, unidad);
      const f2 = formateaCantidad(cantMax, unidad);
      const u  = unidad ? (ETIQUETA_UNIDAD[unidad] || unidad) : "";
      const mostrarU = u && unidad !== "al_gusto" && unidad !== "cn";
      let txt = "";
      if (cant != null) {
        txt = f1.txt + (f2.txt ? "–" + f2.txt : "");
        if (mostrarU) txt += " " + u;
      } else if (u) {
        // Cantidad null + unidad textual (al gusto / c/n) => va dentro del pill.
        txt = u;
      }
      return {
        html: txt ? `<span class="ing-pill">${esc(txt)}</span>` : "",
        aviso: f1.aviso
      };
    }

    /* Palabras que indican cocción / reposo / horneado / fermentación reales.
       Solo pasos con alguna de estas (Y con `tiempo` >= 30 s) muestran el
       temporizador. Tareas mecánicas como tamizar/batir/mezclar/secar/picar
       no necesitan cuenta atrás. */
    const PALABRAS_TEMPORIZADOR = [
      "horn","cocer","cocci","cocida","cuece","cuec",
      "hervir","hierv","hervid","hierve",
      "freir","freír","frie","frito","frita","fríe",
      "pochar","poche","pochad","poch",
      "sofre","sofrí","sofri",
      "ferment",
      "enfri",
      "repos",
      "refriger","nevera",
      "descans",
      "asar","asado","asada","ase ",
      "gratina","gratin",
      "estirar","estir",
      "amas",
      "dorar","dorad","dora ","dore",
      "rehog",
      "saltea","saltée","saltée",
      "esperar","esper",
      "marin",
      "infusio",
      "tost","tueste",
      "blanqu",
      "templar","temple",
      "macer",
      "dejar","deja "
    ];

    /** Decide si un paso necesita botón de temporizador. */
    function necesitaTemporizador(p) {
      if (!p || p.tiempo == null || p.tiempo < 30) return false;
      const txt = ((p.texto || "") + " " + (p.titulo || "")).toLowerCase();
      return PALABRAS_TEMPORIZADOR.some(w => txt.includes(w));
    }

    /**
     * Destaca la primera palabra del paso (el verbo de acción) en negrita.
     * "Batir los huevos…" -> "<strong>Batir</strong> los huevos…"
     * Si no encuentra una palabra inicial razonable, devuelve el texto escapado tal cual.
     */
    function destacarAccion(texto) {
      const escaped = esc(texto);
      return escaped.replace(/^([A-Za-zÁÉÍÓÚÜÑáéíóúüñ][^\s,.:;]+)/, "<strong>$1</strong>");
    }

    /* --------- FILTRADO DE BUSQUEDA --------------------------------------
       Texto: acento/mayusc-insensible (normaliza, NFD) sobre nombre, tags y
       nombres de ingredientes. Filtros COMBINAN AND. Ingredientes via `ref` (T3).
       --------------------------------------------------------------------- */

    function filtrarRecetasBusqueda(b) {
      const txt = normaliza(b.texto || "").trim();
      return estado.recetas.filter(r => {
        // texto libre
        if (txt) {
          const enNombre = normaliza(r.nombre).includes(txt);
          const enTags   = (r.tags || []).some(t => normaliza(t).includes(txt));
          const enIngs   = r.ingredientes.some(i => normaliza(i.nombre).includes(txt));
          if (!enNombre && !enTags && !enIngs) return false;
        }
        // tipo (cualquiera de los seleccionados sirve = OR)
        if (b.tipos.size > 0 && !b.tipos.has(r.tipo)) return false;
        // dieta (la receta debe cumplir TODAS las dietas marcadas)
        if (b.dietas.size > 0) {
          const dietasR = new Set(r.dieta || []);
          for (const d of b.dietas) if (!dietasR.has(d)) return false;
        }
        // tiempo total (T7: calculado, no persistido)
        if (b.tiempo !== "cualquiera") {
          const max = Number(b.tiempo);
          if (tiempoTotalMin(r) >= max) return false;
        }
        // dificultad
        if (b.dificultad && r.dificultad !== b.dificultad) return false;
        // ingredientes INCLUIR / EXCLUIR — siempre por ref (T3)
        if (b.incluir.size > 0 || b.excluir.size > 0) {
          const refsR = new Set(r.ingredientes.filter(i => i.ref).map(i => i.ref));
          for (const ref of b.incluir) if (!refsR.has(ref)) return false;
          for (const ref of b.excluir) if (refsR.has(ref))  return false;
        }
        return true;
      });
    }

    /* --------- COBERTURA (inversa) ---------------------------------------
       Solo cuentan ingredientes NO opcionales con ref (los ad-hoc no suman
       entre recetas, T3). Los opcionales NUNCA penalizan. % calculado (T7).
       --------------------------------------------------------------------- */

    function coberturaReceta(r, disponibles) {
      const obligatorios = r.ingredientes.filter(i => !i.opcional && i.ref);
      const total = obligatorios.length;
      if (total === 0) return { total: 0, cubiertos: 0, faltantes: [], pct: 1 };
      const faltantes = [];
      let cubiertos = 0;
      for (const ing of obligatorios) {
        if (disponibles.has(ing.ref)) cubiertos++;
        else faltantes.push(ing);
      }
      return { total, cubiertos, faltantes, pct: cubiertos / total };
    }

    /** Dedupe de faltantes por ref para mostrar (p. ej. pizza: aceite-oliva 2 grupos -> 1 chip). */
    function faltantesUnicos(faltantes) {
      const set = new Set();
      const res = [];
      for (const f of faltantes) {
        if (set.has(f.ref)) continue;
        set.add(f.ref); res.push(f);
      }
      return res;
    }

    /* --------- AUDIO (T9), VIBRACION (T8), WAKE LOCK (T8) ----------------
       Todo con deteccion de soporte y fallback silencioso (try/catch).
       --------------------------------------------------------------------- */

    let _audioCtx = null;
    function audioContext() {
      try {
        if (_audioCtx) return _audioCtx;
        const Ctor = window.AudioContext || window.webkitAudioContext;
        if (!Ctor) return null;
        _audioCtx = new Ctor();
        return _audioCtx;
      } catch (_) { return null; }
    }
    /** Desbloquea el AudioContext (debe llamarse en respuesta a un click). */
    function desbloquearAudio() {
      const ctx = audioContext();
      if (ctx && ctx.state === "suspended") { try { ctx.resume(); } catch (_) {} }
    }
    /** Beep de N pulsos con Web Audio API (oscillator) — sin ficheros (T9). */
    function beep(n) {
      n = Math.max(1, Math.min(6, n || 1));
      try {
        const ctx = audioContext();
        if (!ctx) return;
        if (ctx.state === "suspended") ctx.resume();
        const t0 = ctx.currentTime;
        for (let i = 0; i < n; i++) {
          const osc = ctx.createOscillator();
          const g = ctx.createGain();
          osc.connect(g); g.connect(ctx.destination);
          osc.type = "sine";
          osc.frequency.value = 880;
          const start = t0 + i * 0.32;
          const dur = 0.18;
          g.gain.setValueAtTime(0.0001, start);
          g.gain.exponentialRampToValueAtTime(0.35, start + 0.012);
          g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
          osc.start(start);
          osc.stop(start + dur + 0.05);
        }
      } catch (_) {/* fallback silencioso */}
    }
    /** Vibracion con patron, si el navegador la soporta (T8). */
    function vibrar(patron) {
      try { if (navigator.vibrate) navigator.vibrate(patron); } catch (_) {/* silencio */}
    }

    let _wakeLock = null;
    async function pedirWakeLock() {
      try {
        if (!("wakeLock" in navigator)) return; // sin soporte: silencio
        if (_wakeLock) return;
        _wakeLock = await navigator.wakeLock.request("screen");
        _wakeLock.addEventListener("release", () => { _wakeLock = null; });
      } catch (_) {/* p.ej. permiso denegado: silencio */}
    }
    function liberarWakeLock() {
      try {
        if (!_wakeLock) return;
        const tmp = _wakeLock; _wakeLock = null;
        tmp.release && tmp.release();
      } catch (_) {/* silencio */}
    }

    /* --------- LISTA DE LA COMPRA (T3) -----------------------------------
       Regla de suma:
         - clave = ref + "|" + unidad
         - misma clave (misma ref y misma unidad) -> sumar cantidades (rangos
           incluidos: tratar cantidadMax como cantidad cuando no hay rango).
         - distinta unidad para misma ref -> linea SEPARADA (no inventar
           conversiones).
         - ref:null -> ad-hoc, NUNCA suma entre recetas.
       Devuelve un objeto { cat: [lineas...] } agrupado por categoriaCompra.
       --------------------------------------------------------------------- */

    function generarListaCompra(items) {
      const lineas = new Map();   // clave -> linea
      let adhocSeq = 0;

      for (const it of (items || [])) {
        const r = recetaPorId(it.id);
        if (!r) continue;
        const rac = (typeof it.raciones === "number" && it.raciones > 0)
          ? it.raciones : r.racionesBase;
        const factor = rac / r.racionesBase;

        for (const ing of r.ingredientes) {
          const cant    = ing.cantidad    == null ? null : ing.cantidad    * factor;
          const cantMax = ing.cantidadMax == null ? null : ing.cantidadMax * factor;

          if (ing.ref == null) {
            // T3: ad-hoc no se suma entre recetas — siempre linea propia.
            const k = `_adhoc_${adhocSeq++}`;
            lineas.set(k, {
              clave: k,
              ref: null,
              nombre: ing.nombre,
              unidad: ing.unidad,
              cantidad: cant,
              cantidadMax: cantMax,
              recetas: [r.nombre],
              opcional: !!ing.opcional
            });
            continue;
          }

          const clave = `${ing.ref}|${ing.unidad || ""}`;
          if (lineas.has(clave)) {
            const prev = lineas.get(clave);
            // Sumar rangos: [min, max]; sin max => max=min.
            const prevMin = prev.cantidad == null ? 0 : prev.cantidad;
            const prevMax = prev.cantidadMax != null ? prev.cantidadMax : prevMin;
            const bMin    = cant == null ? 0 : cant;
            const bMax    = cantMax != null ? cantMax : bMin;
            const sumMin = prevMin + bMin;
            const sumMax = prevMax + bMax;
            // Si ambas vinieron null (al_gusto repetido), mantener null.
            prev.cantidad    = (prev.cantidad == null && cant == null) ? null : sumMin;
            prev.cantidadMax = (sumMax === sumMin) ? null : sumMax;
            if (!prev.recetas.includes(r.nombre)) prev.recetas.push(r.nombre);
            // Opcional solo si TODAS las apariciones lo eran.
            if (!ing.opcional) prev.opcional = false;
          } else {
            // Usar el nombre del catalogo si existe (mas estable que el de la receta).
            const ingDef = estado.ingredientes.find(x => x.clave === ing.ref);
            lineas.set(clave, {
              clave,
              ref: ing.ref,
              nombre: ingDef ? ingDef.nombre : ing.nombre,
              unidad: ing.unidad,
              cantidad: cant,
              cantidadMax: cantMax,
              recetas: [r.nombre],
              opcional: !!ing.opcional
            });
          }
        }
      }

      // Agrupar por categoriaCompra.
      const grupos = {};
      for (const linea of lineas.values()) {
        const ingDef = linea.ref ? estado.ingredientes.find(x => x.clave === linea.ref) : null;
        const cat = (ingDef && ingDef.categoriaCompra) || "otros";
        if (!grupos[cat]) grupos[cat] = [];
        grupos[cat].push(linea);
      }
      // Ordenar dentro de cada categoria por nombre normalizado.
      for (const c in grupos) {
        grupos[c].sort((a,b) => normaliza(a.nombre).localeCompare(normaliza(b.nombre)));
      }
      return grupos;
    }

    /* --------- CONVERSORES ------------------------------------------------ */

    /** Devuelve cantidad equivalente en ml para una unidad volumetrica conocida. */
    function aMl(cant, unidad) {
      if (!Number.isFinite(cant)) return null;
      const k = ML_POR[unidad];
      return k == null ? null : cant * k;
    }
    /** Convierte ml a la unidad volumetrica indicada. */
    function deMl(cant, unidad) {
      const k = ML_POR[unidad];
      return k == null ? null : cant / k;
    }
    /** °C -> °F. */
    function cAf(c) { return c * 9/5 + 32; }
    /** °F -> °C. */
    function fAc(f) { return (f - 32) * 5/9; }
    /** °C -> nº de gas: devuelve el mark mas cercano (string "1/4", "1", ...). */
    function cAgas(c) {
      let mejor = GAS_MARKS[0];
      let dist = Math.abs(c - mejor.c);
      for (const m of GAS_MARKS) {
        const d = Math.abs(c - m.c);
        if (d < dist) { dist = d; mejor = m; }
      }
      return mejor.gas;
    }
    function gasAc(g) {
      const m = GAS_MARKS.find(x => x.gas === Number(g));
      return m ? m.c : null;
    }
    /** Etiqueta legible para el gas (1/4, 1/2, enteros). */
    function fmtGas(g) {
      if (g === 0.25) return "¼";
      if (g === 0.5)  return "½";
      return String(g);
    }


    /* --------- VALIDACION DE INVARIANTES (1-6) ---------------------------- */

    function validarIngredienteCatalogo(ing) {
      const e = [];
      if (!ing || typeof ing !== "object") return ["ingrediente no es un objeto"];
      // Invariante 1: clave es slug.
      if (!ing.clave || ing.clave !== slugify(ing.clave))
        e.push(`clave inválida (debe ser slug): "${ing.clave}"`);
      if (!ing.nombre || !String(ing.nombre).trim())
        e.push("nombre vacío");
      // Invariante: categoriaCompra ∈ enum 4.
      if (!ENUM_CATEGORIA.includes(ing.categoriaCompra))
        e.push(`categoriaCompra no válida: "${ing.categoriaCompra}"`);
      if (ing.densidad != null && (!Number.isFinite(ing.densidad) || ing.densidad <= 0))
        e.push("densidad no es número positivo");
      if (ing.gramosPorUnidad != null && (!Number.isFinite(ing.gramosPorUnidad) || ing.gramosPorUnidad <= 0))
        e.push("gramosPorUnidad no es número positivo");
      if (!Array.isArray(ing.alias))
        e.push("alias no es array");
      return e;
    }

    /** Valida invariantes 1, 3, 4, 5, 6 (la 2, refs huérfanas, se aplica aparte). */
    function validarReceta(r) {
      const e = [];
      if (!r || typeof r !== "object") return ["receta no es un objeto"];
      // Invariante 1: id slug.
      if (!r.id || r.id !== slugify(r.id))
        e.push(`id inválido (debe ser slug): "${r.id}"`);
      if (!r.nombre || !String(r.nombre).trim())
        e.push("nombre vacío");
      // Invariante 3: enums.
      if (!ENUM_TIPO.includes(r.tipo))
        e.push(`tipo no válido: "${r.tipo}"`);
      for (const d of (r.dieta || [])) {
        if (!ENUM_DIETA.includes(d)) e.push(`dieta no válida: "${d}"`);
      }
      if (!ENUM_DIFICULTAD.includes(r.dificultad))
        e.push(`dificultad no válida: "${r.dificultad}"`);
      if (!Number.isFinite(r.racionesBase) || r.racionesBase <= 0)
        e.push(`racionesBase debe ser > 0`);
      if (r.tiempoPrep != null && (!Number.isFinite(r.tiempoPrep) || r.tiempoPrep < 0))
        e.push("tiempoPrep inválido (minutos)");
      if (r.tiempoCoccion != null && (!Number.isFinite(r.tiempoCoccion) || r.tiempoCoccion < 0))
        e.push("tiempoCoccion inválido (minutos)");
      // Tags y colecciones: invariante 1 (slugs).
      for (const t of (r.tags || [])) {
        if (typeof t !== "string" || t !== slugify(t)) e.push(`tag no slug: "${t}"`);
      }
      // Ingredientes.
      if (!Array.isArray(r.ingredientes))
        e.push("ingredientes no es array");
      else {
        r.ingredientes.forEach((ing, i) => {
          // Invariante 1: ref es slug si no es null.
          if (ing.ref != null && (typeof ing.ref !== "string" || ing.ref !== slugify(ing.ref)))
            e.push(`ingrediente[${i}].ref no es slug: "${ing.ref}"`);
          // Invariante 3: unidad ∈ enum 3 o null.
          if (ing.unidad != null && !ENUM_UNIDAD.includes(ing.unidad))
            e.push(`ingrediente[${i}].unidad no válida: "${ing.unidad}"`);
          // Invariante 4: cantidadMax >= cantidad.
          if (ing.cantidadMax != null && ing.cantidad != null && ing.cantidadMax < ing.cantidad)
            e.push(`ingrediente[${i}].cantidadMax < cantidad`);
          if (ing.cantidad != null && !Number.isFinite(ing.cantidad))
            e.push(`ingrediente[${i}].cantidad no es número`);
          if (ing.cantidadMax != null && !Number.isFinite(ing.cantidadMax))
            e.push(`ingrediente[${i}].cantidadMax no es número`);
        });
      }
      // Pasos.
      if (!Array.isArray(r.pasos))
        e.push("pasos no es array");
      else {
        // Invariante 6: n consecutivos desde 1.
        r.pasos.forEach((p, i) => {
          if (p.n !== i + 1) e.push(`paso[${i}].n=${p.n}, esperado ${i+1}`);
          if (!p.texto || !String(p.texto).trim()) e.push(`paso[${i}] sin texto`);
          if (p.tiempo != null && (!Number.isFinite(p.tiempo) || p.tiempo < 0))
            e.push(`paso[${i}].tiempo inválido (segundos)`);
          if (p.temperatura != null && !Number.isFinite(p.temperatura))
            e.push(`paso[${i}].temperatura inválida`);
        });
      }
      // Invariante 5: modificado >= creado.
      if (r.creado && r.modificado && r.modificado < r.creado)
        e.push("modificado < creado");
      return e;
    }


    /* --------- IMPORT / EXPORT (T6: SOLO modelo puro) --------------------- */

    /**
     * Serializa solo el modelo de datos puro (sin nodos DOM ni campos
     * calculados ni efimeros). Acepta filtros:
     *   - "todo":     {schemaVersion, ingredientes, recetas, estadoUsuario}
     *   - "modelo":   {schemaVersion, ingredientes, recetas}
     *   - "usuarios": {schemaVersion, estadoUsuario}
     */
    function serializarLimpio(filtro) {
      const obj = { schemaVersion: 1 };
      if (filtro === "todo" || filtro === "modelo") {
        obj.ingredientes = estado.ingredientes;
        obj.recetas      = estado.recetas;
      }
      if (filtro === "todo" || filtro === "usuarios") {
        obj.estadoUsuario = estado.estadoUsuario;
      }
      return JSON.stringify(obj, null, 2);
    }

    function descargarTexto(contenido, nombreArchivo, mime) {
      const blob = new Blob([contenido], { type: mime || "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = nombreArchivo;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    /**
     * Aplica invariante 2: refs no existentes en catálogo se convierten a
     * ad-hoc y se reportan. Muta la receta y devuelve la lista de avisos.
     */
    function aplicarInvariante2(receta, catalogo) {
      const avisos = [];
      const claves = new Set(catalogo.map(x => x.clave));
      for (let i = 0; i < (receta.ingredientes || []).length; i++) {
        const ing = receta.ingredientes[i];
        if (ing.ref && !claves.has(ing.ref)) {
          avisos.push(`Receta "${receta.id}": ref "${ing.ref}" (ing. #${i+1}) no existe en el catálogo → tratada como ad-hoc.`);
          ing.ref = null;
        }
      }
      return avisos;
    }

    /**
     * Importa un objeto JSON con la misma forma que serializarLimpio.
     * Devuelve { incidencias: string[], aplicados: { ingredientes, recetas, perfiles } }.
     * Reglas:
     *   - ingredientes/recetas inválidos no se aplican (van a incidencias).
     *   - invariante 2: refs huérfanas se ad-hoquizan con aviso.
     *   - estadoUsuario: solo perfiles conocidos.
     *   - last-write-wins por modificado en recetas.
     */
    function importarObjeto(obj) {
      const incidencias = [];
      const huerfMap = new Map();   // ref -> {nombre}
      const out = { ingredientes: 0, recetas: 0, perfiles: 0 };
      if (!obj || typeof obj !== "object") {
        return { incidencias: ["JSON sin contenido o no es un objeto"], aplicados: out, huerfanas: [] };
      }
      // Construir el nuevo documento mezclando con el actual.
      const nuevo = JSON.parse(JSON.stringify(estado));

      // Ingredientes primero (para que invariante 2 funcione en recetas).
      if (Array.isArray(obj.ingredientes)) {
        for (const ing of obj.ingredientes) {
          const errs = validarIngredienteCatalogo(ing);
          if (errs.length) {
            incidencias.push(`Ingrediente "${ing && ing.clave}": ${errs.join("; ")}`);
            continue;
          }
          const idx = nuevo.ingredientes.findIndex(x => x.clave === ing.clave);
          // Normalizar arr alias.
          const limpio = {
            clave: ing.clave, nombre: ing.nombre,
            categoriaCompra: ing.categoriaCompra,
            densidad: ing.densidad == null ? null : Number(ing.densidad),
            gramosPorUnidad: ing.gramosPorUnidad == null ? null : Number(ing.gramosPorUnidad),
            alias: Array.isArray(ing.alias) ? ing.alias.map(String) : []
          };
          if (idx >= 0) nuevo.ingredientes[idx] = limpio;
          else nuevo.ingredientes.push(limpio);
          out.ingredientes++;
        }
      }

      // Recetas (invariantes 1, 3-6 + 2 con catálogo ya mezclado).
      if (Array.isArray(obj.recetas)) {
        for (const recCrudo of obj.recetas) {
          const r = recCrudo && typeof recCrudo === "object" ? { ...recCrudo } : null;
          if (!r) { incidencias.push("Receta no es objeto, ignorada"); continue; }
          // Renumerar pasos por si llegan mal.
          if (Array.isArray(r.pasos)) {
            r.pasos = r.pasos.map((p, i) => ({ ...p, n: i + 1 }));
          }
          // Detectar refs huérfanas SIN convertirlas a null. Se registran
          // para ofrecer el botón "Crear estos ingredientes en el catálogo".
          if (Array.isArray(r.ingredientes)) {
            const claves = new Set(nuevo.ingredientes.map(x => x.clave));
            for (const ing of r.ingredientes) {
              if (ing.ref && !claves.has(ing.ref) && !huerfMap.has(ing.ref)) {
                huerfMap.set(ing.ref, {
                  nombre: ing.nombre || ing.ref
                });
              }
            }
          }
          const errs = validarReceta(r);
          if (errs.length) {
            incidencias.push(`Receta "${r.id}": ${errs.join("; ")}`);
            continue;
          }
          const idx = nuevo.recetas.findIndex(x => x.id === r.id);
          if (idx >= 0) {
            // last-write-wins por modificado.
            const prev = nuevo.recetas[idx];
            if (!prev.modificado || (r.modificado && r.modificado >= prev.modificado)) {
              nuevo.recetas[idx] = r;
              out.recetas++;
            } else {
              incidencias.push(`Receta "${r.id}" no sobrescrita: versión local es más reciente.`);
            }
          } else {
            nuevo.recetas.push(r);
            out.recetas++;
          }
        }
      }

      // estadoUsuario: solo perfiles conocidos.
      if (obj.estadoUsuario && typeof obj.estadoUsuario === "object") {
        for (const perfil of Object.keys(obj.estadoUsuario)) {
          if (!PERFILES.includes(perfil)) {
            incidencias.push(`estadoUsuario: perfil "${perfil}" desconocido, ignorado.`);
            continue;
          }
          if (!nuevo.estadoUsuario[perfil]) nuevo.estadoUsuario[perfil] = {};
          // Mezcla por id de receta.
          const bloque = obj.estadoUsuario[perfil];
          if (!bloque || typeof bloque !== "object") continue;
          for (const idR of Object.keys(bloque)) {
            const eu = bloque[idR];
            if (!eu || typeof eu !== "object") continue;
            // Validacion ligera: estado en enum 6, colecciones slugs.
            if (eu.estado != null && !ENUM_ESTADO.includes(eu.estado)) {
              incidencias.push(`estadoUsuario.${perfil}.${idR}: estado "${eu.estado}" inválido, se aplica null.`);
              eu.estado = null;
            }
            if (Array.isArray(eu.colecciones)) {
              const bad = eu.colecciones.filter(c => typeof c !== "string" || c !== slugify(c));
              if (bad.length) incidencias.push(`estadoUsuario.${perfil}.${idR}: colecciones no slug: ${bad.join(", ")}`);
              eu.colecciones = eu.colecciones.map(c => slugify(c)).filter(Boolean);
            }
            nuevo.estadoUsuario[perfil][idR] = { ...nuevo.estadoUsuario[perfil][idR], ...eu };
          }
          out.perfiles++;
        }
      }

      // Aplicar a estado y guardar.
      estado = nuevo;
      guardarEstado();

      // Guardar refs huérfanas detectadas para mostrar botón "Crear catálogo".
      const huerfanas = [...huerfMap.entries()].map(([clave, info]) => ({
        clave,
        nombre: info.nombre,
        categoriaCompra: "otros"
      }));
      sesion.refsHuerfanas = huerfanas;
      if (huerfanas.length) {
        incidencias.push(`${huerfanas.length} refs no existían en el catálogo. Puedes crearlas en bloque con el botón "Crear ${huerfanas.length} ingredientes al catálogo".`);
      }

      return { incidencias, aplicados: out, huerfanas };
    }

    /** Crea en el catálogo los ingredientes huérfanos detectados en la última importación. */
    function crearIngredientesHuerfanos() {
      const huerf = sesion.refsHuerfanas || [];
      let creados = 0;
      for (const h of huerf) {
        if (estado.ingredientes.find(x => x.clave === h.clave)) continue;
        estado.ingredientes.push({
          clave: h.clave,
          nombre: h.nombre,
          categoriaCompra: h.categoriaCompra || "otros",
          densidad: null,
          gramosPorUnidad: null,
          alias: []
        });
        creados++;
      }
      sesion.refsHuerfanas = [];
      guardarEstado();
      renderTodo();
      programarAutoSync();
      return creados;
    }


    /* ========================================================================
       SUPABASE — auth (magic link) + sync bidireccional last-write-wins.
       Sin SDK ni CDN: solo fetch contra la REST API y /auth/v1/* de GoTrue.
       ======================================================================== */

    /** Llamada genérica a Supabase. Renueva token si recibe 401. */
    async function supaFetch(path, options, retry) {
      if (retry === undefined) retry = true;
      const s = sesion.supabase;
      if (!s.url || !s.anonKey) throw new Error("Supabase no configurado");
      const headers = Object.assign({
        "apikey": s.anonKey,
        "Content-Type": "application/json"
      }, (options && options.headers) || {});
      if (s.token) headers["Authorization"] = "Bearer " + s.token;
      const opts = Object.assign({}, options, { headers });
      const res = await fetch(s.url + path, opts);
      if (res.status === 401 && retry && s.refreshToken) {
        if (await refrescarToken()) return supaFetch(path, options, false);
      }
      if (!res.ok) {
        const txt = await res.text().catch(() => "");
        throw new Error("Supabase " + res.status + ": " + txt);
      }
      if (res.status === 204) return null;
      const ct = res.headers.get("Content-Type") || "";
      if (ct.indexOf("application/json") >= 0) return res.json();
      return res.text();
    }

    async function refrescarToken() {
      const s = sesion.supabase;
      if (!s.refreshToken) return false;
      try {
        const res = await fetch(s.url + "/auth/v1/token?grant_type=refresh_token", {
          method: "POST",
          headers: { "apikey": s.anonKey, "Content-Type": "application/json" },
          body: JSON.stringify({ refresh_token: s.refreshToken })
        });
        if (!res.ok) return false;
        const data = await res.json();
        s.token = data.access_token;
        s.refreshToken = data.refresh_token || s.refreshToken;
        guardarSupabase();
        return true;
      } catch (_) { return false; }
    }

    /* Mapping email -> perfil. Si no aparece, va a "invitado". */
    const EMAIL_A_PERFIL = {
      "benteslez@gmail.com": "ruben",
      "rubenfuentesgonzalez@gmail.com": "sergio"
    };
    function perfilDesdeEmail(email) {
      const em = (email || "").toLowerCase().trim();
      return EMAIL_A_PERFIL[em] || "invitado";

    function gateNecesario() {
      return !sesion.supabase.token;
    }
    function mostrarGate() {
      const g = document.getElementById("gate");
      if (g) g.hidden = false;
      document.body.classList.add("gate-activo");
      // Cerrar overlays abiertos
      if (sesion.modoCocina && sesion.modoCocina.activo) cerrarCocina();
      setTimeout(() => {
        const i = document.getElementById("gate-email");
        if (i && !i.value) i.focus();
      }, 50);
    }
    function ocultarGate() {
      const g = document.getElementById("gate");
      if (g) g.hidden = true;
      document.body.classList.remove("gate-activo");
    }

    /** Inicia sesión con email + contraseña. */
    async function iniciarSesionPassword(email, password) {
      const s = sesion.supabase;
      const res = await fetch(s.url + "/auth/v1/token?grant_type=password", {
        method: "POST",
        headers: { "apikey": s.anonKey, "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });
      if (!res.ok) {
        const t = await res.text();
        let msg = "Email o contraseña incorrectos.";
        try {
          const j = JSON.parse(t);
          if (j && j.msg) msg = j.msg;
        } catch (_) {}
        throw new Error(msg);
      }
      const data = await res.json();
      s.token = data.access_token;
      s.refreshToken = data.refresh_token;
      s.email = (data.user && data.user.email) || email;
      guardarSupabase();
    }

    /** Pide a Supabase que envíe un magic link al email indicado. */
    async function enviarMagicLink(email) {
      const s = sesion.supabase;
      const redirect = window.location.href.split("#")[0];
      const res = await fetch(s.url + "/auth/v1/otp", {
        method: "POST",
        headers: { "apikey": s.anonKey, "Content-Type": "application/json" },
        body: JSON.stringify({
          email,
          create_user: false,
          options: { emailRedirectTo: redirect }
        })
      });
      if (!res.ok) {
        const t = await res.text();
        throw new Error("No se pudo enviar el magic link: " + t);
      }
    }

    /** Al volver del magic link, Supabase incluye el token en el hash. */
    async function procesarCallbackAuth() {
      if (!window.location.hash) return false;
      const params = new URLSearchParams(window.location.hash.slice(1));
      const at = params.get("access_token");
      const rt = params.get("refresh_token");
      if (!at) return false;
      sesion.supabase.token = at;
      sesion.supabase.refreshToken = rt;
      guardarSupabase();
      // Limpiar el hash de la URL (sin recargar)
      history.replaceState(null, "", window.location.pathname + window.location.search);
      // Obtener el email del usuario logueado
      try {
        const u = await supaFetch("/auth/v1/user", { method: "GET" });
        if (u && u.email) {
          sesion.supabase.email = u.email;
          guardarSupabase();
        }
      } catch (_) {/* ignora */}
      return true;
    }

    async function cerrarSesionSupabase() {
      try { await supaFetch("/auth/v1/logout", { method: "POST" }, false); } catch (_) {}
      sesion.supabase.token = null;
      sesion.supabase.refreshToken = null;
      sesion.supabase.email = null;
      guardarSupabase();
      mostrarGate();
    }

    /* --------- Borrados (DELETE en Supabase + cola offline) -------------- */

    /** Ejecuta un DELETE en Supabase. Devuelve true si OK, false si falló. */
    async function borrarEnSupabase(tabla, campo, valor) {
      try {
        await supaFetch(
          `/rest/v1/${tabla}?${campo}=eq.${encodeURIComponent(valor)}`,
          { method: "DELETE", headers: { "Prefer": "return=minimal" } }
        );
        return true;
      } catch (_) {
        return false;
      }
    }

    /** Añade un borrado a la cola y lo intenta enviar inmediatamente. */
    function encolarBorrado(tabla, valor) {
      const cola = sesion.borradosPendientes[tabla] || [];
      if (!cola.includes(valor)) {
        cola.push(valor);
        sesion.borradosPendientes[tabla] = cola;
        guardarBorradosPendientes();
      }
      // Intentar borrar inmediatamente en Supabase (fire-and-forget).
      if (sesion.supabase.token) {
        const campo = tabla === "recetas" ? "id" : "clave";
        borrarEnSupabase(tabla, campo, valor).then(ok => {
          if (ok) {
            sesion.borradosPendientes[tabla] =
              (sesion.borradosPendientes[tabla] || []).filter(v => v !== valor);
            guardarBorradosPendientes();
          }
        });
      }
    }

    /** Procesa toda la cola de borrados pendientes. Llamado al sincronizar. */
    async function procesarBorradosPendientes() {
      if (!sesion.supabase.token) return;
      for (const tabla of ["recetas", "ingredientes"]) {
        const lista = sesion.borradosPendientes[tabla] || [];
        if (!lista.length) continue;
        const campo = tabla === "recetas" ? "id" : "clave";
        const restantes = [];
        for (const valor of lista) {
          const ok = await borrarEnSupabase(tabla, campo, valor);
          if (!ok) restantes.push(valor);
        }
        sesion.borradosPendientes[tabla] = restantes;
      }
      guardarBorradosPendientes();
    }

    /* --------- Mappers entre modelo SPEC (camelCase) y Supabase (snake_case) ----- */

    function recetaSupaALocal(r) {

    function euLocalASupa(perfil, idReceta, eu) {
      return {
        perfil,
        id_receta: idReceta,
        favorito: !!eu.favorito,

    /* --------- Sync bidireccional last-write-wins ----------------------- */

    async function sincronizar() {
      const s = sesion.supabase;
      if (!s.token) throw new Error("Inicia sesión primero");
      s.estadoSync = "syncing";
      s.ultimoError = null;
      renderDatos();
      try {
        const desde = s.ultimoSync || "1970-01-01T00:00:00Z";

        // 0) Procesar cola de borrados pendientes ANTES de bajar
        await procesarBorradosPendientes();
        const idsRecBorradas = new Set(sesion.borradosPendientes.recetas || []);
        const idsIngBorradas = new Set(sesion.borradosPendientes.ingredientes || []);

        // 1) Bajar cambios remotos desde `desde`.
        const filtro = "modificado=gte." + encodeURIComponent(desde);
        const [remIng, remRec, remEU] = await Promise.all([
          supaFetch("/rest/v1/ingredientes?" + filtro),
          supaFetch("/rest/v1/recetas?" + filtro),
          supaFetch("/rest/v1/estado_usuario?" + filtro)
        ]);

        // 2) Aplicar last-write-wins (ignorando items que tengamos borrados pendientes)
        let aplicados = 0;
        for (const rem of (remIng || [])) {
          if (idsIngBorradas.has(rem.clave)) continue; // lo hemos borrado nosotros
          const local = estado.ingredientes.find(x => x.clave === rem.clave);
          const remL = ingSupaALocal(rem);
          if (!local) { estado.ingredientes.push(remL); aplicados++; }
          else if (!local.modificado || (remL.modificado || "") > local.modificado) {
            Object.assign(local, remL); aplicados++;
          }
        }
        for (const rem of (remRec || [])) {
          if (idsRecBorradas.has(rem.id)) continue;
          const local = estado.recetas.find(x => x.id === rem.id);
          const remL = recetaSupaALocal(rem);
          if (!local) { estado.recetas.push(remL); aplicados++; }
          else if (!local.modificado || (remL.modificado || "") > local.modificado) {
            const i = estado.recetas.indexOf(local);
            estado.recetas[i] = remL; aplicados++;
          }
        }
        for (const rem of (remEU || [])) {
          if (!PERFILES.includes(rem.perfil)) continue;
          if (!estado.estadoUsuario[rem.perfil]) estado.estadoUsuario[rem.perfil] = {};
          const local = estado.estadoUsuario[rem.perfil][rem.id_receta];
          const remL = euSupaALocal(rem);
          if (!local || !local.modificado || (remL.modificado || "") > local.modificado) {
            estado.estadoUsuario[rem.perfil][rem.id_receta] = remL; aplicados++;
          }
        }
        guardarEstado();

        // 3) Subir locales con modificado > desde (o todos si primer sync).
        const subirIng = estado.ingredientes
          .filter(x => !desde || !x.modificado || x.modificado > desde || s.ultimoSync == null)
          .map(ingLocalASupa);
        const subirRec = estado.recetas
          .filter(x => !desde || !x.modificado || x.modificado > desde || s.ultimoSync == null)
          .map(recetaLocalASupa);
        const subirEU = [];
        PERFILES.forEach(p => {
          const usu = estado.estadoUsuario[p] || {};
          for (const idR in usu) {
            const eu = usu[idR];
            if (!s.ultimoSync || !eu.modificado || eu.modificado > desde) {
              subirEU.push(euLocalASupa(p, idR, eu));
            }
          }
        });

        const upsertHdr = { "Prefer": "resolution=merge-duplicates,return=minimal" };
        if (subirIng.length) await supaFetch("/rest/v1/ingredientes", {
          method: "POST", headers: upsertHdr, body: JSON.stringify(subirIng)
        });
        if (subirRec.length) await supaFetch("/rest/v1/recetas", {
          method: "POST", headers: upsertHdr, body: JSON.stringify(subirRec)
        });
        if (subirEU.length)  await supaFetch("/rest/v1/estado_usuario", {
          method: "POST", headers: upsertHdr, body: JSON.stringify(subirEU)
        });

        // 4) Detectar BORRADOS REMOTOS: si una receta/ingrediente NO está en
        //    Supabase pero sí en local Y ya había sido sincronizada antes,
        //    fue borrada en otro dispositivo -> eliminar local.
        //    Solo aplicamos esto si ya hubo un sync previo (para no perder
        //    recetas locales que aún no se hubieran subido por error).
        let borradosLocal = 0;
        if (s.ultimoSync) {
          const [todosIdsRec, todosClavesIng] = await Promise.all([
            supaFetch("/rest/v1/recetas?select=id"),
            supaFetch("/rest/v1/ingredientes?select=clave")
          ]);
          const setRec = new Set((todosIdsRec || []).map(r => r.id));
          const setIng = new Set((todosClavesIng || []).map(r => r.clave));
          const antesRec = estado.recetas.length;
          const antesIng = estado.ingredientes.length;
          estado.recetas      = estado.recetas.filter(r => setRec.has(r.id));
          estado.ingredientes = estado.ingredientes.filter(i => setIng.has(i.clave));
          borradosLocal = (antesRec - estado.recetas.length) + (antesIng - estado.ingredientes.length);
          // Si se borraron localmente, limpiar referencias en compra, plan, etc.
          if (antesRec !== estado.recetas.length) {
            const setLocal = new Set(estado.recetas.map(r => r.id));
            sesion.compra.items = sesion.compra.items.filter(x => setLocal.has(x.id));
            Object.keys(sesion.planificador.mes).forEach(fecha => {
              const d = sesion.planificador.mes[fecha];
              COMIDAS.forEach(c => { if (d[c] && !setLocal.has(d[c])) d[c] = null; });
              if (!d.desayuno && !d.comida && !d.cena) delete sesion.planificador.mes[fecha];
            });
            if (sesion.recetaAbierta && !setLocal.has(sesion.recetaAbierta)) {
              sesion.recetaAbierta = null;
            }
            guardarCompra(); guardarPlan();
          }
          if (borradosLocal) guardarEstado();
        }

        s.ultimoSync = nowISO();
        s.estadoSync = "idle";
        guardarSupabase();
        renderTodo();
        return {
          aplicados,
          subidos: subirIng.length + subirRec.length + subirEU.length,
          borradosLocal
        };
      } catch (e) {
        s.estadoSync = "error";
        s.ultimoError = e.message || String(e);
        renderDatos();
        throw e;
      }
    }

    /** Lazy loading: observa el sentinel y carga 30 más cuando entra en viewport. */
    let _biblioObserver = null;
    function configurarObserverBiblioteca() {
      if (!("IntersectionObserver" in window)) return;
      if (_biblioObserver) _biblioObserver.disconnect();
      const sentinel = document.getElementById("biblio-sentinel");
      if (!sentinel) return;
      _biblioObserver = new IntersectionObserver((entries) => {
        if (entries.some(e => e.isIntersecting)) {
          sesion.bibliotecaLimite = (sesion.bibliotecaLimite || 30) + 30;
          actualizarResultadosBiblioteca();
        }
      }, { rootMargin: "300px" });
      _biblioObserver.observe(sentinel);
    }
    /** Reset al cambiar filtros: vuelve a mostrar solo los primeros 30. */
    function resetLimiteBiblioteca() {
      sesion.bibliotecaLimite = 30;

    /** Aplica búsqueda + filtro de favoritos + tipos + cocinas + etiquetas. */
    function bibliotecaFiltrada() {
      const txt = normaliza(sesion.bibliotecaTexto || "").trim();
      let lista = estado.recetas;
      if (txt) {
        lista = lista.filter(r =>
          normaliza(r.nombre).includes(txt) ||
          (r.tags || []).some(t => normaliza(t).includes(txt)) ||
          (r.cocina && normaliza(r.cocina).includes(txt)) ||
          (r.pais   && normaliza(r.pais).includes(txt)) ||
          r.ingredientes.some(i => normaliza(i.nombre).includes(txt))
        );
      }
      if (sesion.bibliotecaTipos.size > 0) {
        lista = lista.filter(r => sesion.bibliotecaTipos.has(r.tipo));
      }
      if (sesion.bibliotecaCocinas.size > 0) {
        lista = lista.filter(r => r.cocina && sesion.bibliotecaCocinas.has(r.cocina));
      }
      if (sesion.bibliotecaPaises.size > 0) {
        lista = lista.filter(r => r.pais && sesion.bibliotecaPaises.has(r.pais));
      }
      if (sesion.bibliotecaEtiquetas.size > 0) {
        lista = lista.filter(r => {
          const etqs = Array.isArray(r.etiquetas) ? r.etiquetas : [];
          const dietas = Array.isArray(r.dieta) ? r.dieta : [];
          for (const e of sesion.bibliotecaEtiquetas) {
            if (e === "vegetariano") { if (!dietas.includes("vegetariano")) return false; }
            else if (!etqs.includes(e)) return false;
          }
          return true;
        });
      }
      if (sesion.bibliotecaSoloFav) {
        lista = lista.filter(r => getEstado(perfilActivo, r.id).favorito);
      }
      return ordenarRecetas(lista);
    }

    function tarjetaListaHTML(r) {
      const eu = getEstado(perfilActivo, r.id);

      return `

          </span>

    function ordenarRecetas(lista) {
      const arr = [...lista];
      const ord = sesion.ordenBiblioteca;
      arr.sort((a, b) => {
        if (ord === "nombre") {
          return normaliza(a.nombre).localeCompare(normaliza(b.nombre));
        }
        if (ord === "tiempo") {
          return tiempoTotalMin(a) - tiempoTotalMin(b);
        }
        if (ord === "valoracion") {
          const va = getEstado(perfilActivo, a.id).valoracion || 0;
          const vb = getEstado(perfilActivo, b.id).valoracion || 0;
          return vb - va; // descendente
        }
        if (ord === "veces") {
          const va = getEstado(perfilActivo, a.id).vecesCocinada || 0;
          const vb = getEstado(perfilActivo, b.id).vecesCocinada || 0;
          return vb - va;
        }
        if (ord === "ultima") {
          const va = getEstado(perfilActivo, a.id).ultimaVez || "";
          const vb = getEstado(perfilActivo, b.id).ultimaVez || "";
          return vb.localeCompare(va);
        }
        return 0;
      });
      return arr;
    }

    /** Trocea la lista por el límite de lazy loading y añade un sentinel si hay más. */
    function renderResultadosBibliotecaHTML(recetas, modo) {
      const limite = sesion.bibliotecaLimite || 30;
      const visibles = recetas.slice(0, limite);

        ? `<div id="biblio-sentinel" class="biblio-sentinel">Cargando más recetas…</div>`

        return `<div class="tarjetas-lista">${visibles.map(tarjetaListaHTML).join("")}</div>${sentinel}`;

      return `<div class="tarjetas">${visibles.map(tarjetaHTML).join("")}</div>${sentinel}`;

    /* ---- Biblioteca: detalle de receta ---------------------------------- */

    function renderIngredientesZona() {
      const r = recetaPorId(sesion.recetaAbierta);
      if (!r) return "";
      const factor = sesion.raciones / r.racionesBase;
      // Agrupar por grupo (preservando orden).
      const grupos = new Map();
      r.ingredientes.forEach((ing, idx) => {
        const g = ing.grupo || "_sin_";
        if (!grupos.has(g)) grupos.set(g, []);
        grupos.get(g).push({ ing, idx });
      });

      const renderItem = ({ing, idx}) => {
        const cant = ing.cantidad == null ? null : ing.cantidad * factor;
        const cantMax = ing.cantidadMax == null ? null : ing.cantidadMax * factor;
        const { html: pillHTML, aviso } = pillCantidadHTML(cant, cantMax, ing.unidad);
        const avisoHTML = aviso ? `<span class="ing-aviso">(${esc(aviso)})</span>` : "";
        const opc = ing.opcional ? `<span class="ing-opcional">opcional</span>` : "";
        const nota = ing.nota ? `<span class="ing-nota">${esc(ing.nota)}</span>` : "";
        const tachado = sesion.ticsIng.has(idx) ? " tachado" : "";
        const hayDetalles = pillHTML || avisoHTML || opc;
        const detallesHTML = hayDetalles
          ? `<span class="ing-detalles">${pillHTML}${avisoHTML}${opc}</span>` : "";

        return `
          <li class="${tachado.trim()}" data-tic-ing="${idx}">
            <input type="checkbox" ${sesion.ticsIng.has(idx) ? "checked" : ""}
                   aria-label="Tachar ${esc(ing.nombre)}">
            <span class="ing-texto">
              <span class="ing-nombre">${esc(ing.nombre)}</span>
              ${detallesHTML}
              ${nota}
            </span>
          </li>`;
      };

      let html = "";
      // Render: primero los items sin grupo, luego cada grupo nombrado en orden de aparicion.
      const sinGrupo = grupos.get("_sin_") || [];
      if (sinGrupo.length) {
        html += `<ul class="lista-ing">${sinGrupo.map(renderItem).join("")}</ul>`;
      }
      grupos.forEach((items, g) => {
        if (g === "_sin_") return;
        html += `
          <div class="grupo-ing">
            <div class="grupo-ing-titulo">${esc(g)}</div>
            <ul class="lista-ing">${items.map(renderItem).join("")}</ul>
          </div>`;
      });
      return html;
    }
